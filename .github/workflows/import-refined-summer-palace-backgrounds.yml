name: Import refined Summer Palace backgrounds

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  import-backgrounds:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/two-level-journey-picker
          fetch-depth: 0

      - name: Find and validate the reviewed image archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import base64
          import io
          import json
          import os
          import tarfile
          import urllib.request
          from pathlib import Path, PurePosixPath

          candidates = [
              '02c0ddf5ed8e4278c9eee316d6e938d574bfa118',
              '8064c36b3e9ff1ca2969d6e0a0cbb974f2d68900',
              '23d592277d4652831baedc1f7d580a768f43f5ec',
              'd0405e410bc43bdb8984458d123256d8ee808261',
          ]
          expected_names = {
              '11-serene-lakeside-temple-dawn.webp',
              '12-sunlit-pavilion-kunming-lake.webp',
              '13-golden-mist-longevity-hill.webp',
              '14-classic-garden-by-lake.webp',
              '15-golden-lakeside-pavilion.webp',
              '16-lotus-lake-pagoda.webp',
              '17-golden-lakeside-path.webp',
              '18-sunset-lakeside-temple.webp',
              '19-palace-at-dusk.webp',
              '20-moonlit-lake-pavilion.webp',
          }
          prefix = PurePosixPath('app/assets/images/backgrounds/generated/beijing/summer-palace')
          selected = None
          for blob_sha in candidates:
              url = f'https://api.github.com/repos/{os.environ["GITHUB_REPOSITORY"]}/git/blobs/{blob_sha}'
              request = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': f'Bearer {os.environ["GH_TOKEN"]}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      payload = json.load(response)
                  data = base64.b64decode(payload['content'])
                  with tarfile.open(fileobj=io.BytesIO(data), mode='r:gz') as archive:
                      files = [member for member in archive.getmembers() if member.isfile()]
                      names = set()
                      for member in files:
                          path = PurePosixPath(member.name)
                          if path.is_absolute() or '..' in path.parts or path.parent != prefix:
                              raise ValueError(f'Unsafe archive path: {member.name}')
                          names.add(path.name)
                      if names == expected_names:
                          selected = data
                          print(f'Selected reviewed archive {blob_sha} ({len(data)} bytes)')
                          break
              except Exception as error:
                  print(f'Skipping {blob_sha}: {error}')
          if selected is None:
              raise SystemExit('No reviewed Summer Palace archive matched the expected ten images.')
          archive_path = Path('/tmp/summer-palace-backgrounds.tar.gz')
          archive_path.write_bytes(selected)
          with tarfile.open(archive_path, 'r:gz') as archive:
              archive.extractall('.', filter='data')
          PY

      - name: Register twenty Summer Palace backgrounds
        run: |
          python3 - <<'PY'
          from pathlib import Path

          catalog_path = Path('app/lib/data/journey_background_generated.dart')
          catalog = catalog_path.read_text()
          anchor = "    '10-moonlit-lake-panorama',\n"
          additions = """    '11-serene-lakeside-temple-dawn',
              '12-sunlit-pavilion-kunming-lake',
              '13-golden-mist-longevity-hill',
              '14-classic-garden-by-lake',
              '15-golden-lakeside-pavilion',
              '16-lotus-lake-pagoda',
              '17-golden-lakeside-path',
              '18-sunset-lakeside-temple',
              '19-palace-at-dusk',
              '20-moonlit-lake-pavilion',
          """
          if "'20-moonlit-lake-pavilion'" not in catalog:
              summer_start = catalog.index("'01-dawn-kunming-lake'")
              anchor_index = catalog.index(anchor, summer_start) + len(anchor)
              catalog = catalog[:anchor_index] + additions + catalog[anchor_index:]
              catalog_path.write_text(catalog)

          test_path = Path('app/test/journey_background_policy_test.dart')
          test = test_path.read_text()
          test = test.replace(
              "test('Summer Palace ships ten reviewed location-bound backgrounds'",
              "test('Summer Palace ships twenty reviewed location-bound backgrounds'",
          )
          section_start = test.index('Summer Palace ships twenty')
          length_index = test.index('expect(assets, hasLength(10));', section_start)
          test = test[:length_index] + test[length_index:].replace(
              'expect(assets, hasLength(10));',
              'expect(assets, hasLength(20));',
              1,
          )
          test_path.write_text(test)
          PY

      - name: Remove temporary upload files
        run: |
          rm -rf .github/sp-upload .github/sp400-upload .github/sp400b-upload
          rm -f .github/direct-import-marker.txt
          rm -f .github/workflows/import-summer-palace-backgrounds.yml
          rm -f .github/workflows/import-refined-summer-palace-backgrounds.yml

      - name: Commit imported backgrounds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add ten refined Summer Palace backgrounds [summer-palace-imported]"
          git push origin HEAD:feat/two-level-journey-picker
