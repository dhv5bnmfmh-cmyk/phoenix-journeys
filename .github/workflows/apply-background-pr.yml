name: Apply destination backgrounds in PR

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-background-pr.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/destination-background-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Capture Phoenix agent regressions
        shell: bash
        run: node --test worker/*.test.mjs > app/background-agent-test.txt 2>&1 || true

      - name: Publish agent diagnostic
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/background-agent-test.txt
          git commit -m 'chore: capture background agent validation'
          git push origin HEAD:${{ github.head_ref }}
