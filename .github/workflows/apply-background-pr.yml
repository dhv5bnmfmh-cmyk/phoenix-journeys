name: Apply destination backgrounds in PR

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-background-pr.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/destination-background-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply final source fix
        run: python tools/patch_background_explore.py

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format and install dependencies
        working-directory: app
        run: |
          dart format lib/screens/explore_screen.dart
          flutter pub get

      - name: Analyze Flutter app
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build Flutter web
        working-directory: app
        run: flutter build web --release

      - name: Validate Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Remove temporary installers and diagnostics
        shell: bash
        run: |
          rm -f app/background-analyze.txt app/background-agent-test.txt .github/workflows/apply-background-runtime.yml .github/workflows/apply-background-pr.yml worker/run-background-runtime.txt tools/generate_seed_backgrounds.py tools/patch_background_home.py tools/patch_background_explore.py tools/patch_background_journey.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: finalize destination background system'
          git push origin HEAD:${{ github.head_ref }}
