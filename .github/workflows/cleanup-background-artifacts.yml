name: Clean destination background artifacts

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/cleanup-background-artifacts.yml

permissions:
  contents: write

jobs:
  clean:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'feature/destination-background-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Remove generated and temporary files
        shell: bash
        run: |
          rm -rf app/.dart_tool app/build
          rm -f app/.flutter-plugins app/.flutter-plugins-dependencies app/background-analyze.txt app/background-agent-test.txt
          rm -f .github/workflows/apply-background-runtime.yml .github/workflows/apply-background-pr.yml .github/workflows/cleanup-background-artifacts.yml
          rm -f worker/run-background-runtime.txt tools/generate_seed_backgrounds.py tools/patch_background_home.py tools/patch_background_explore.py tools/patch_background_journey.py

      - name: Commit clean feature branch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove generated background build artifacts'
          git push origin HEAD:${{ github.head_ref }}
