name: Fix one-screen lint hints

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/global-one-screen-layout' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/global-one-screen-layout
          fetch-depth: 0

      - name: Apply const lint fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/lib/screens/journey_screen.dart')
          source = path.read_text()
          source = source.replace(
              '          Text(\n            wonderQuestion,',
              '          const Text(\n            wonderQuestion,',
              1,
          )
          source = source.replace(
              '          Text(\n            expressQuestion,',
              '          const Text(\n            expressQuestion,',
              1,
          )
          path.write_text(source)
          PY
          rm .github/workflows/fix-one-screen-lints-pr.yml

      - uses: dart-lang/setup-dart@v1

      - name: Format and commit
        run: |
          dart format app/lib/screens/journey_screen.dart
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: clear final one-screen lint hints"
          git push origin HEAD:feature/global-one-screen-layout
