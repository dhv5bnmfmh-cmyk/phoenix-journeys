name: Fix Guangzhou background journey id

on:
  push:
    branches:
      - feature/complete-seven-city-background-library
    paths:
      - .github/workflows/fix-guangzhou-background-id-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/complete-seven-city-background-library
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install image encoder
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Correct production journey id and regenerate
        shell: bash
        run: |
          sed -i 's/("guangzhou-chen-clan", "guangzhou")/("guangzhou-chen-clan-academy", "guangzhou")/' .github/scripts/generate_offline_city_backgrounds.py
          python .github/scripts/generate_offline_city_backgrounds.py
          test "$(find app/assets/images/backgrounds/generated -maxdepth 1 -name '*.webp' | wc -l)" -eq 70
          test "$(find app/assets/images/backgrounds/generated -maxdepth 1 -name 'guangzhou-chen-clan-academy-*.webp' | wc -l)" -eq 10
          grep -q "journeyId: 'guangzhou-chen-clan-academy'" app/lib/data/journey_background_generated.dart

      - name: Commit corrected WebP library
        shell: bash
        run: |
          git config user.name 'phoenix-background-librarian[bot]'
          git config user.email 'phoenix-background-librarian[bot]@users.noreply.github.com'
          git add .github/scripts/generate_offline_city_backgrounds.py app/assets/images/backgrounds/generated app/lib/data/journey_background_generated.dart
          git commit -m 'fix: key Guangzhou backgrounds to production journey id'
          git push origin HEAD:feature/complete-seven-city-background-library
