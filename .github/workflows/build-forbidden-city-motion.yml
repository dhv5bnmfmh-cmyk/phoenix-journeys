name: Build Forbidden City motion

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: forbidden-city-dynamic-background
  cancel-in-progress: true

jobs:
  build-verify-publish:
    if: github.head_ref == 'feature/forbidden-city-dynamic-background'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/forbidden-city-dynamic-background
          fetch-depth: 0

      - name: Apply Forbidden City motion
        run: |
          set -euo pipefail
          python3 tools/add_forbidden_city_dynamic_background.py
          rm -f tools/add_forbidden_city_dynamic_background.py
          rm -f .github/workflows/build-forbidden-city-motion.yml
          git diff --check

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart file
        run: dart format app/lib/widgets/destination_background.dart

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Validate Cloudflare Worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir /tmp/phoenix-wrangler-dry-run

      - name: Publish clean feature commit
        run: |
          set -euo pipefail
          rm -rf .wrangler-dry-run
          rm -f worker-test.log worker-build.log
          rm -f app/analyze.log app/test.log app/build-web.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Forbidden City cinematic background motion'
          git push origin HEAD:feature/forbidden-city-dynamic-background
