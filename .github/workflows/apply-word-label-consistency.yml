name: Apply word label consistency

on:
  push:
    branches:
      - fix/word-label-consistency
    paths:
      - '.github/workflows/apply-word-label-consistency.yml'
      - 'tools/patch_word_label_consistency.py'
  pull_request:
    branches:
      - main
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/word-label-consistency
          fetch-depth: 0

      - name: Apply explorer-facing word labels
        run: python3 tools/patch_word_label_consistency.py

      - name: Validate focused label rules
        run: |
          node --test worker/compact_word_study.test.mjs
          node --test worker/word_label_consistency.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate Flutter app
        working-directory: app
        run: |
          dart format lib/state/app_state.dart lib/screens/journey_screen.dart lib/widgets/word_detail_sheet.dart lib/screens/me_screen.dart
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --release

      - name: Commit verified product changes
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/lib app/test worker
          git commit -m 'fix: use 单词 consistently in the interface'
          git push origin HEAD:fix/word-label-consistency
