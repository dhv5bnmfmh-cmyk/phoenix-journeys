name: Apply no horizontal paging on push

on:
  push:
    branches:
      - feature/no-horizontal-paging

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/no-horizontal-paging
          fetch-depth: 0

      - name: Execute migration script
        shell: python
        run: |
          from pathlib import Path

          workflow = Path('.github/workflows/apply-no-horizontal-paging.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == '- name: Replace horizontal paging with static one-screen layouts')
          run_line = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(workflow)) if workflow[i].strip() == '- uses: dart-lang/setup-dart@v1')
          script_lines = workflow[run_line + 1:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script_lines)
          exec(compile(script, 'no_horizontal_paging.py', 'exec'))

      - uses: dart-lang/setup-dart@v1

      - name: Format changed Dart files
        run: dart format app/lib/screens/journey_screen.dart app/lib/screens/me_screen.dart app/lib/widgets/interactive_story_text.dart app/lib/widgets/narration_player_card.dart

      - name: Remove pager and migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f app/lib/widgets/compact_pager.dart
          rm -f app/test/compact_pager_test.dart
          git rm .github/workflows/apply-no-horizontal-paging.yml .github/workflows/apply-no-horizontal-paging-push.yml
          if grep -R "CompactPager\|PageView(\|TabBarView(" app/lib/screens; then
            echo "Horizontal paging reference remains in a primary screen"
            exit 1
          fi
          git add app/lib/screens/journey_screen.dart app/lib/screens/me_screen.dart app/lib/widgets/interactive_story_text.dart app/lib/widgets/narration_player_card.dart docs/one-screen-interface-rule.md worker/one_screen_layout.test.mjs app/test || true
          git commit -m "ui: remove horizontal paging from every Phoenix screen"
          git push origin HEAD:feature/no-horizontal-paging
