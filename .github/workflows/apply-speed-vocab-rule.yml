name: Apply speed and vocabulary rule

on:
  push:
    branches: [feature/seven-day-journey-library]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0
      - name: Apply core changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def rep(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'missing block: {path}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          rep('app/lib/services/narration_controller.dart', """  static const speedOptions = <NarrationSpeedOption>[
              NarrationSpeedOption(label: '0.5×', rate: .5),
              NarrationSpeedOption(label: '0.75×', rate: .75),
              NarrationSpeedOption(label: '1.0×', rate: 1.0),
              NarrationSpeedOption(label: '1.25×', rate: 1.25),
              NarrationSpeedOption(label: '1.5×', rate: 1.5),
            ];
          """, """  static const double speechRateStep = 0.1;

            static const speedOptions = <NarrationSpeedOption>[
              NarrationSpeedOption(label: '0.5×', rate: .5),
              NarrationSpeedOption(label: '0.6×', rate: .6),
              NarrationSpeedOption(label: '0.7×', rate: .7),
              NarrationSpeedOption(label: '0.8×', rate: .8),
              NarrationSpeedOption(label: '0.9×', rate: .9),
              NarrationSpeedOption(label: '1.0×', rate: 1.0),
              NarrationSpeedOption(label: '1.1×', rate: 1.1),
              NarrationSpeedOption(label: '1.2×', rate: 1.2),
              NarrationSpeedOption(label: '1.3×', rate: 1.3),
              NarrationSpeedOption(label: '1.4×', rate: 1.4),
              NarrationSpeedOption(label: '1.5×', rate: 1.5),
            ];
          """)

          rep('app/lib/widgets/interactive_story_text.dart', """    final nativeDefinition = entry.nativeDefinition(state.translationLanguage);
              final english = entry.englishDefinition.trim();
          """, """    final nativeLabel = entry.nativeLabel(state.translationLanguage);
              final nativeDefinition = entry.nativeDefinition(state.translationLanguage);
              final englishDefinition = entry.englishDefinition.trim();
          """)

          rep('app/lib/widgets/interactive_story_text.dart', """                  const SizedBox(height: 3),
                            Text(
                              nativeDefinition,
                              style: const TextStyle(fontSize: 13, height: 1.3),
                            ),
                            if (english.isNotEmpty &&
                                state.translationLanguage != '英语') ...[
                              const SizedBox(height: 2),
                              Text(
                                english,
                                style: TextStyle(
                                  color: PhoenixTheme.ink.withValues(alpha: .58),
                                  fontSize: 11.5,
                                  height: 1.25,
                                ),
                              ),
                            ],
          """, """                  const SizedBox(height: 3),
                            Text(
                              state.displayText(entry.partOfSpeech),
                              key: ValueKey('story-discovery-word-pos-${entry.word}'),
                              style: TextStyle(color: PhoenixTheme.red.withValues(alpha: .78), fontSize: 10.5, fontWeight: FontWeight.w900),
                            ),
                            const SizedBox(height: 5),
                            Text(
                              state.displayText(nativeLabel),
                              key: ValueKey('story-discovery-word-native-label-${entry.word}'),
                              style: TextStyle(color: PhoenixTheme.ink.withValues(alpha: .52), fontSize: 9.5, fontWeight: FontWeight.w900),
                            ),
                            const SizedBox(height: 1),
                            Text(
                              nativeDefinition,
                              key: ValueKey('story-discovery-word-native-${entry.word}'),
                              style: const TextStyle(fontSize: 13, height: 1.3),
                            ),
                            const SizedBox(height: 4),
                            Text(
                              'English',
                              key: ValueKey('story-discovery-word-english-label-${entry.word}'),
                              style: TextStyle(color: PhoenixTheme.ink.withValues(alpha: .52), fontSize: 9.5, fontWeight: FontWeight.w900),
                            ),
                            const SizedBox(height: 1),
                            Text(
                              englishDefinition.isEmpty ? '—' : englishDefinition,
                              key: ValueKey('story-discovery-word-english-${entry.word}'),
                              style: TextStyle(color: PhoenixTheme.ink.withValues(alpha: .7), fontSize: 11.5, height: 1.25),
                            ),
          """)

          Path('.github/workflows/apply-speed-vocab-rule.yml').unlink()
          PY
      - name: Commit core changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: use 0.1 narration steps and shared bilingual word popovers"
          git push origin HEAD:feature/seven-day-journey-library
