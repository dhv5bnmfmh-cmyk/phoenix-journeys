name: Temporary narration sync refinement

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: temporary-narration-sync-refinement
  cancel-in-progress: true

jobs:
  refine-narration-sync:
    if: >-
      github.event.pull_request.number == 109 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'trigger/remove-journey-triangles'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          path: automation
          fetch-depth: 1

      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          path: phoenix
          fetch-depth: 0

      - name: Apply monotonic narration refinement
        working-directory: phoenix
        run: |
          python3 ../automation/.github/scripts/refine_narration_sync.py
          dart format app/lib/widgets/interactive_story_text.dart \
            app/lib/services/narration_controller.dart \
            app/lib/screens/journey_screen.dart \
            app/test/narration_progressive_reveal_test.dart
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/lib/widgets/interactive_story_text.dart \
            app/lib/services/narration_controller.dart \
            app/lib/screens/journey_screen.dart \
            app/test/narration_progressive_reveal_test.dart \
            worker/cinematic_narration_reveal_rule.test.mjs \
            worker/monotonic_text_reveal_rule.test.mjs
          git diff --cached --check
          git commit -m 'fix: keep narration text reveal smooth and monotonic'
          git push origin HEAD:feature/shanghai-bund-dynamic-background
