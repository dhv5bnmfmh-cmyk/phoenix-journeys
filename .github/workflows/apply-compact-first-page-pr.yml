name: Apply compact first page on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/compact-first-page' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/compact-first-page
          fetch-depth: 0

      - name: Execute compact layout patch
        shell: python
        run: |
          from pathlib import Path

          workflow = Path('.github/workflows/flutter-ci.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == '- name: Compact Explore first page')
          run_line = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(workflow)) if workflow[i].strip() == '- uses: dart-lang/setup-dart@v1')
          script_lines = workflow[run_line + 1:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script_lines)
          exec(compile(script, 'compact_first_page.py', 'exec'))

      - uses: dart-lang/setup-dart@v1

      - name: Format compact Explore files
        run: dart format app/lib/screens/explore_screen.dart app/test/explore_compact_layout_test.dart

      - name: Commit compact first page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm .github/workflows/apply-compact-first-page-pr.yml docs/compact-first-page-trigger.md
          git add app/lib/screens/explore_screen.dart app/test/explore_compact_layout_test.dart .github/workflows/flutter-ci.yml
          git commit -m "ui: fit Explore content into one phone screen"
          git push origin HEAD:feature/compact-first-page
