name: Diagnose Journey location binding

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  diagnose-location-binding:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reapply canonical location patch
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          import re
          from pathlib import Path

          workflow = Path('.github/workflows/preview-cloudflare.yml').read_text()
          match = re.search(r"payload = '([^']+)'", workflow)
          if match is None:
              raise SystemExit('Location patch payload was not found')
          source = gzip.decompress(base64.b64decode(match.group(1)))
          exec(compile(source, 'apply_location_binding.py', 'exec'))
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Capture formatter diagnostics
        shell: bash
        run: |
          set +e
          dart format \
            app/lib/services/journey_location_binding.dart \
            app/lib/data/daily_journey_experience.dart \
            app/lib/state/app_state.dart \
            app/lib/widgets/destination_background.dart \
            app/lib/services/journey_background_policy.dart \
            app/lib/screens/explore_screen.dart \
            app/test/journey_location_binding_test.dart \
            app/test/journey_background_policy_test.dart \
            > location-binding-format.log 2>&1
          status=$?
          cat location-binding-format.log
          echo "FORMAT_EXIT_CODE=$status" >> location-binding-format.log
          exit 0

      - name: Commit patched files and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/preview-cloudflare.yml
          git rm .github/workflows/location-binding-debug.yml
          git add -A
          git commit -m "chore: capture journey location binding diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
