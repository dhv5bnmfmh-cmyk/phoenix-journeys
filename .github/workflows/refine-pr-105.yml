name: Refine PR 105

on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Remove boat and smooth cinematic text
        run: |
          python3 <<'PY'
          from pathlib import Path

          background_path = Path('app/lib/widgets/destination_background.dart')
          background = background_path.read_text()
          background = background.replace(
              '                final boatProgress = reduceMotion ? 1.0 : raw;\n',
              '',
          )
          background = background.replace(
              '                      _ShanghaiBundBoatShadow(progress: boatProgress),\n',
              '',
          )
          boat_start = background.find('class _ShanghaiBundBoatShadow extends StatelessWidget {')
          summer_start = background.find('class _SummerPalaceDynamicBackground')
          if boat_start < 0 or summer_start < 0 or summer_start <= boat_start:
              raise SystemExit('Could not locate Shanghai boat layer boundaries')
          background = background[:boat_start] + background[summer_start:]
          if 'shanghai-bund-boat-shadow' in background or 'boatProgress' in background:
              raise SystemExit('Shanghai boat layer was not fully removed')
          background_path.write_text(background)

          interactive_path = Path('app/lib/widgets/interactive_story_text.dart')
          interactive = interactive_path.read_text()
          interactive = interactive.replace(
              "import 'dart:ui' show ImageFilter, lerpDouble;",
              "import 'dart:ui' show lerpDouble;",
          )
          old_duration = '''  final milliseconds =
      (210 + characterDistance.abs() * 34).round().clamp(260, 720).toInt();'''
          new_duration = '''  final milliseconds =
      (90 + characterDistance.abs() * 28).round().clamp(120, 420).toInt();'''
          if old_duration not in interactive:
              raise SystemExit('Could not locate cinematic duration formula')
          interactive = interactive.replace(old_duration, new_duration)

          old_cursor = '''  double get _currentRevealCursor {
    final eased = Curves.easeOutCubic.transform(
      _cinematicRevealController.value,
    );
    return lerpDouble(_revealFrom, _revealTo, eased) ?? _revealTo;
  }'''
          new_cursor = '''  double get _currentRevealCursor {
    // Linear cursor movement avoids the tiny acceleration reset that used to
    // happen every time mobile speech supplied a new short progress callback.
    final progress = _cinematicRevealController.value;
    return lerpDouble(_revealFrom, _revealTo, progress) ?? _revealTo;
  }'''
          if old_cursor not in interactive:
              raise SystemExit('Could not locate cinematic cursor interpolation')
          interactive = interactive.replace(old_cursor, new_cursor)

          glyph_start = interactive.find('class _CinematicRevealGlyph extends StatelessWidget {')
          marker_start = interactive.find('class _InlineReadingMarker extends StatelessWidget {')
          if glyph_start < 0 or marker_start < 0 or marker_start <= glyph_start:
              raise SystemExit('Could not locate cinematic glyph class boundaries')
          optimized_glyph = '''class _CinematicRevealGlyph extends StatelessWidget {
  const _CinematicRevealGlyph({
    required this.text,
    required this.style,
    required this.progress,
    required this.highlighted,
    super.key,
  });

  final String text;
  final TextStyle style;
  final double progress;
  final bool highlighted;

  @override
  Widget build(BuildContext context) {
    final t = progress.clamp(0.0, 1.0).toDouble();
    final contrast = Curves.easeOutCubic.transform(t);
    final lift = (1 - t) * 1.8;
    final opacity = lerpDouble(.4, 1, t) ?? 1;
    final finalColor = style.color ?? Colors.white;
    final paleColor =
        highlighted ? const Color(0xFFFFE7AA) : const Color(0xFFD8D0C2);
    final cinematicColor =
        Color.lerp(paleColor, finalColor, contrast) ?? finalColor;
    final fontSize = style.fontSize ?? 14;
    final lineHeight = style.height ?? 1.22;

    // Avoid ImageFiltered blur per glyph. On iPhone Flutter Web that created
    // several offscreen layers every frame and made short passages stutter.
    return Transform.translate(
      offset: Offset(0, lift),
      child: Opacity(
        opacity: opacity,
        child: SizedBox(
          height: fontSize * lineHeight,
          child: Stack(
            clipBehavior: Clip.hardEdge,
            alignment: Alignment.center,
            children: [
              Padding(
                padding: EdgeInsets.only(bottom: highlighted ? 3 : 0),
                child: Text(
                  text,
                  style: style.copyWith(
                    color: cinematicColor,
                    height: lineHeight,
                    shadows: style.shadows,
                  ),
                ),
              ),
              if (highlighted)
                const Positioned(
                  left: 0,
                  right: 0,
                  bottom: 0,
                  child: Center(
                    child: CustomPaint(
                      size: Size(7, 4),
                      painter: _ReadingTrianglePainter(),
                    ),
                  ),
                ),
            ],
          ),
        ),
      ),
    );
  }
}

'''
          interactive = interactive[:glyph_start] + optimized_glyph + interactive[marker_start:]
          if 'ImageFilter.blur' in interactive or 'ImageFiltered(' in interactive:
              raise SystemExit('Heavy per-glyph blur is still present')
          interactive_path.write_text(interactive)

          flutter_test_path = Path('app/test/narration_progressive_reveal_test.dart')
          flutter_test = flutter_test_path.read_text()
          flutter_test = flutter_test.replace(
              'expect(cinematicRevealDuration(1).inMilliseconds, 260);',
              'expect(cinematicRevealDuration(1).inMilliseconds, 120);',
          ).replace(
              'expect(cinematicRevealDuration(30).inMilliseconds, 720);',
              'expect(cinematicRevealDuration(30).inMilliseconds, 420);',
          )
          flutter_test_path.write_text(flutter_test)

          Path('worker/shanghai_bund_motion.test.mjs').write_text('''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const background = readFileSync(
  'app/lib/widgets/destination_background.dart',
  'utf8',
);

test('Shanghai Bund uses calm cinematic river and skyline motion', () => {
  assert.match(background, /_shanghaiBundJourneyId = 'shanghai-bund'/);
  assert.match(background, /class _ShanghaiBundDynamicBackground/);
  assert.match(background, /Duration\\(seconds: 15\\)/);
  assert.match(background, /shanghai-bund-camera-transform/);
  assert.match(background, /shanghai-bund-skyline-glow/);
  assert.match(background, /shanghai-bund-river-light/);
  assert.doesNotMatch(background, /shanghai-bund-boat-shadow|boatProgress/);
});

test('Shanghai Bund keeps low-cost looped motion without decorative objects', () => {
  const start = background.indexOf('class _ShanghaiBundDynamicBackground');
  const end = background.indexOf('class _SummerPalaceDynamicBackground');
  const bund = background.slice(start, end);
  assert.doesNotMatch(bund, /CustomPaint|VideoPlayer|\\.mp4|animated.*webp/i);
  assert.match(bund, /RepaintBoundary/);
  assert.match(bund, /_motion\\.repeat\\(\\)/);
  assert.doesNotMatch(bund, /_motion\\.repeat\\(reverse: true\\)/);
  assert.match(bund, /final sceneProgress/);
  assert.doesNotMatch(bund, /Boat|boat|ship|vessel/);
});
''')

          Path('worker/cinematic_narration_reveal_rule.test.mjs').write_text('''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const interactive = readFileSync(
  'app/lib/widgets/interactive_story_text.dart',
  'utf8',
);

// Permanent guard: narration progress must animate between speech callbacks
// while remaining light enough for iPhone Flutter Web.
test('narration reveal uses smooth lightweight cinematic interpolation', () => {
  assert.match(interactive, /SingleTickerProviderStateMixin/);
  assert.match(interactive, /AnimationController/);
  assert.match(interactive, /cinematicRevealProgress/);
  assert.match(interactive, /cinematicDepthProgress/);
  assert.match(interactive, /cinematicRevealTailLength = 6/);
  assert.match(interactive, /Color\\.lerp\\(paleColor, finalColor/);
  assert.match(interactive, /lerpDouble\\(\\.4, 1, t\\)/);
  assert.match(interactive, /reading-triangle-\\$\\{widget\\.narrationItemId/);
  assert.match(interactive, /cinematicRevealDuration/);
  assert.match(interactive, /clamp\\(120, 420\\)/);
  assert.doesNotMatch(interactive, /ImageFilter\\.blur|ImageFiltered\\(/);
  assert.match(interactive, /Transform\\.translate/);
  assert.match(interactive, /final progress = _cinematicRevealController\\.value/);
  assert.match(interactive, /Listenable\\.merge/);
});

test('future text remains layout-stable and non-interactive', () => {
  assert.match(interactive, /color: Colors\\.transparent/);
  assert.match(interactive, /interactive: false/);
  assert.match(interactive, /hidden: true/);
});
''')
          PY

      - name: Commit refinement
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/destination_background.dart \
            app/lib/widgets/interactive_story_text.dart \
            app/test/narration_progressive_reveal_test.dart \
            worker/shanghai_bund_motion.test.mjs \
            worker/cinematic_narration_reveal_rule.test.mjs
          git commit -m "fix: remove Bund boat and smooth short narration"
          git push origin HEAD:feature/shanghai-bund-dynamic-background
