name: Temporary format journey screen

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format journey screen
        shell: bash
        run: |
          set -euo pipefail
          dart format app/lib/screens/journey_screen.dart
          node --test \
            worker/no_duplicate_journey_page_title.test.mjs \
            worker/keyboard_safe_writing_pages_rule.test.mjs

          if git diff --quiet; then
            echo 'Already formatted'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/lib/screens/journey_screen.dart
          git diff --cached --check
          git commit -m 'style: format shared journey page shell'
          git push origin HEAD:feature/shanghai-bund-dynamic-background
