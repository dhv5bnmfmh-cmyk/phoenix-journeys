          )
          if count != 1:
              raise SystemExit(f'panel replacement count: {count}')
          me_path.write_text(me)

          Path('docs/one-screen-interface-rule.md').write_text('''# Phoenix one-screen interface rule

All primary Phoenix Journeys screens must show their main information and main action within one phone viewport.

- Keep the top identity/progress area fixed and compact.
- Keep the main action area fixed and visible.
- Show related short content together in the same viewport whenever it can fit.
- Use explicit tap tabs, grouped cards, collapsible areas, or modal sheets for additional content.
- Do not use horizontal paging, swipe-to-change pages, `PageView`, `TabBarView`, or `CompactPager` in Phoenix interfaces.
- Do not add a top-level vertically scrolling feature stack.
- Secondary reference details may scroll only inside a modal sheet or a single focused card.
- New features must join an existing group, tab, or modal instead of increasing screen height.
- This rule applies to Explore, Passport, Me, every Journey step, and all future primary screens.
- CI must reject future primary-screen changes that restore horizontal paging or top-level vertical feature stacking.
''')

          Path('worker/one_screen_layout.test.mjs').write_text(r'''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const read = (path) => readFileSync(path, 'utf8');

const primaryScreens = [
  'app/lib/screens/explore_screen.dart',
  'app/lib/screens/passport_screen.dart',
  'app/lib/screens/me_screen.dart',
  'app/lib/screens/journey_screen.dart',
];

test('primary Phoenix screens obey the one-screen layout rule', () => {
  const sources = primaryScreens.map(read).join('\n');
  const passport = read('app/lib/screens/passport_screen.dart');
  const me = read('app/lib/screens/me_screen.dart');
  const journey = read('app/lib/screens/journey_screen.dart');

  assert.doesNotMatch(passport, /return ListView\(/);
  assert.doesNotMatch(me, /return ListView\(/);
  assert.match(journey, /Expanded\(child: child\)/);
  assert.doesNotMatch(sources, /CompactPager\s*\(/);
  assert.doesNotMatch(sources, /PageView\s*\(/);
  assert.doesNotMatch(sources, /TabBarView\s*\(/);
  assert.doesNotMatch(journey, /左右翻页/);
  assert.doesNotMatch(journey, /scrollDirection:\s*Axis\.horizontal/);
});

test('story and Discovery place every short paragraph in the same screen', () => {
  const journey = read('app/lib/screens/journey_screen.dart');
  assert.match(journey, /四段短文同屏阅读/);
  assert.match(journey, /四段发现同屏显示/);
  assert.doesNotMatch(journey, /本页重点词语/);
});

test('one-screen rule forbids horizontal paging in future development', () => {
  const policy = read('docs/one-screen-interface-rule.md');
  assert.match(policy, /one phone viewport/i);
  assert.match(policy, /Do not use horizontal paging/i);
  assert.match(policy, /PageView/);
  assert.match(policy, /Do not add a top-level vertically scrolling feature stack/i);
});
''')

