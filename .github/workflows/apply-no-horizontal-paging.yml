name: Apply no horizontal paging

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/no-horizontal-paging' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/no-horizontal-paging
          fetch-depth: 0

      - name: Replace horizontal paging with static one-screen layouts
        shell: python
        run: |
          from pathlib import Path
          import re

          journey_path = Path('app/lib/screens/journey_screen.dart')
          journey = journey_path.read_text()
          for unused in [
              "import '../widgets/annotated_reading_card.dart';\n",
              "import '../widgets/compact_pager.dart';\n",
              "import '../widgets/word_mark.dart';\n",
          ]:
              journey = journey.replace(unused, '')

          support_methods = r'''
  Future<void> _showReadingSupport({
    required String title,
    required String pinyin,
    required String nativeLabel,
    required String nativeText,
    required String english,
  }) async {
    if (!mounted) return;
    await showModalBottomSheet<void>(
      context: context,
      isScrollControlled: true,
      showDragHandle: true,
      useSafeArea: true,
      builder: (_) => FractionallySizedBox(
        heightFactor: .72,
        child: SingleChildScrollView(
          padding: const EdgeInsets.fromLTRB(16, 0, 16, 20),
          child: _ReadingSupportSheet(
            title: title,
            pinyin: pinyin,
            nativeLabel: nativeLabel,
            nativeText: nativeText,
            english: english,
          ),
        ),
      ),
    );
  }

'''
          anchor = '  void _onWonderChanged(String _) {'
          if support_methods.strip() not in journey:
              journey = journey.replace(anchor, support_methods + anchor, 1)

          story_method = r'''  Widget _storyPage() {
