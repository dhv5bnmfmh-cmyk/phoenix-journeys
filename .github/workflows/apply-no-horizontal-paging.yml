          helper_widgets = r'''
class _CompactTextBlock extends StatelessWidget {
  const _CompactTextBlock({
    required this.index,
    required this.active,
    required this.child,
    required this.onSupport,
  });

  final int index;
  final bool active;
  final Widget child;
  final VoidCallback onSupport;

  @override
  Widget build(BuildContext context) {
    return Container(
      width: double.infinity,
      margin: const EdgeInsets.only(bottom: 4),
      padding: const EdgeInsets.fromLTRB(6, 4, 3, 4),
      decoration: BoxDecoration(
        color: active
            ? PhoenixTheme.gold.withValues(alpha: .18)
            : Colors.white.withValues(alpha: .94),
        borderRadius: BorderRadius.circular(11),
        border: Border.all(
          color: active
              ? PhoenixTheme.gold
              : PhoenixTheme.gold.withValues(alpha: .22),
        ),
      ),
      child: Row(
        children: [
          CircleAvatar(
            radius: 11,
            backgroundColor: active
                ? PhoenixTheme.red
                : PhoenixTheme.gold.withValues(alpha: .18),
            child: active
                ? const Icon(Icons.graphic_eq_rounded, size: 12, color: Colors.white)
                : Text(
                    '$index',
                    style: const TextStyle(
                      color: PhoenixTheme.red,
                      fontSize: 8,
                      fontWeight: FontWeight.w900,
                    ),
                  ),
          ),
          const SizedBox(width: 5),
          Expanded(
            child: SingleChildScrollView(
              physics: const ClampingScrollPhysics(),
              child: child,
            ),
          ),
          SizedBox(
            width: 27,
            height: 27,
            child: TextButton(
              onPressed: onSupport,
              style: TextButton.styleFrom(
                padding: EdgeInsets.zero,
                minimumSize: const Size(27, 27),
                tapTargetSize: MaterialTapTargetSize.shrinkWrap,
                visualDensity: VisualDensity.compact,
              ),
              child: const Text(
                '注',
                style: TextStyle(
                  color: PhoenixTheme.red,
                  fontSize: 9,
                  fontWeight: FontWeight.w900,
                ),
              ),
            ),
          ),
        ],
      ),
    );
  }
}

class _ReadingSupportSheet extends StatelessWidget {
