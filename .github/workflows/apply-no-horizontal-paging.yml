          me, count = re.subn(
              r'class _VocabularyPanel extends StatelessWidget \{[\s\S]*?\n\}\n\nclass _MemoryPanel extends StatelessWidget \{[\s\S]*?\n\}\n\n(?=class _EmptyVocabularyCard)',
              panels,
