name: Capture remaining Summer Palace validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  capture-summer-palace-validation:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Reapply catalog validation fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/fix-summer-palace-validation.yml').read_text()
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Set up Flutter"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          source = workflow[start:end]
          source = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in source.splitlines()
          )
          exec(compile(source, 'fix_summer_palace_validation.py', 'exec'))
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed files
        run: |
          dart format \
            app/lib/data/daily_journey_catalog.dart \
            app/test/journey_feedback_persistence_test.dart \
            app/test/seven_day_journey_catalog_test.dart

      - name: Capture verification output
        shell: bash
        run: |
          set +e
          node --test worker/*.test.mjs > summer-palace-final-verify.log 2>&1
          agent_status=$?
          (cd app && flutter analyze) >> summer-palace-final-verify.log 2>&1
          analyze_status=$?
          (cd app && flutter test) >> summer-palace-final-verify.log 2>&1
          test_status=$?
          printf '\nAGENT_EXIT_CODE=%s\nANALYZE_EXIT_CODE=%s\nTEST_EXIT_CODE=%s\n' \
            "$agent_status" "$analyze_status" "$test_status" >> summer-palace-final-verify.log
          cat summer-palace-final-verify.log
          exit 0

      - name: Commit fixes and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-summer-palace-validation.yml
          git rm .github/workflows/capture-summer-palace-validation.yml
          git add -A
          git commit -m "chore: capture final Summer Palace validation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
