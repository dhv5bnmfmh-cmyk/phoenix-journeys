name: Remove global AI unfocus once

on:
  push:
    branches:
      - fix/ai-actions-response

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: fix/ai-actions-response
          fetch-depth: 0

      - name: Remove global unfocus
        run: python tools/remove_global_ai_unfocus.py

      - name: Commit production change
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart
          if git diff --cached --quiet; then
            echo "Focused AI keyboard patch already applied."
            exit 0
          fi
          git commit -m "fix: preserve stable keyboard focus rules"
          git push origin HEAD:fix/ai-actions-response
