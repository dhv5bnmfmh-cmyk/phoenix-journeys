name: Apply keyboard AI actions once

on:
  push:
    branches:
      - feature/share-journey-passport

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'chore: trigger keyboard AI action patch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/share-journey-passport
          fetch-depth: 0

      - name: Apply keyboard-safe AI actions
        run: python tools/apply_keyboard_ai_actions_patch.py

      - name: Commit product changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart \
                  worker/keyboard_safe_writing_pages_rule.test.mjs
          git commit -m "fix: keep writing AI actions above the iPhone keyboard"
          git push origin HEAD:feature/share-journey-passport
