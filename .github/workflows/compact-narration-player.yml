name: Compact narration player

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: compact-narration-player
  cancel-in-progress: true

jobs:
  compact-verify-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/summer-palace-parallax-background
          fetch-depth: 0

      - name: Apply compact layout
        run: |
          set -euo pipefail
          python3 tools/compact_narration_player.py
          rm -f tools/compact_narration_player.py
          rm -f .github/workflows/compact-narration-player.yml
          git diff --check

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart file
        run: dart format app/lib/widgets/narration_player_card.dart

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Validate Cloudflare Worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir /tmp/phoenix-wrangler-dry-run

      - name: Publish compact player commit
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          rm -rf .wrangler-dry-run
          rm -f worker-test.log worker-build.log
          rm -f app/analyze.log app/test.log app/build-web.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: compact narration player layout'
          git push origin HEAD:feature/summer-palace-parallax-background
