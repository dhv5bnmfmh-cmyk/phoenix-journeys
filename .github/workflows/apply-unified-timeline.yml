name: Apply unified narration timeline

on:
  push:
    branches:
      - feature/unified-narration-timeline

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/unified-narration-timeline
          fetch-depth: 0

      - name: Apply unified timeline patch
        run: python tools/apply_unified_timeline_fix.py

      - uses: dart-lang/setup-dart@v1

      - name: Format changed Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart

      - name: Commit unified timeline fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-unified-timeline.yml tools/apply_unified_timeline_fix.py
          git add app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart worker/live_narration_highlight.test.mjs worker/compact_word_study.test.mjs
          git commit -m "fix: unify narration audio progress and word highlights"
          git push origin HEAD:feature/unified-narration-timeline
