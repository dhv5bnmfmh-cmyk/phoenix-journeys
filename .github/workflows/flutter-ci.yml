name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0

      - name: Fix adaptive narration integration
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          from pathlib import Path

          narration_path = Path('app/lib/services/narration_controller.dart')
          narration = narration_path.read_text(encoding='utf-8')
          broken = """          for (final preferredName in preferredNames) {
            if (lowerName.contains(preferredName)) score += 42;
          }
          }

          if (score > bestScore"""
          fixed = """          for (final preferredName in preferredNames) {
            if (lowerName.contains(preferredName)) score += 42;
          }

          if (score > bestScore"""
          if broken not in narration:
              raise SystemExit('extra voice-selection brace not found')
          narration_path.write_text(narration.replace(broken, fixed, 1), encoding='utf-8')

          journey_path = Path('app/lib/screens/journey_screen.dart')
          journey = journey_path.read_text(encoding='utf-8')
          target = """    await showWordDetail(
      context,
      entry,
      entries: _experience.words,"""
          replacement = """    await showWordDetail(
      context,
      entry,
      narrationController: _narration,
      entries: _experience.words,"""
          if target not in journey:
              raise SystemExit('word detail call target not found')
          journey_path.write_text(journey.replace(target, replacement, 1), encoding='utf-8')
          PY

      - name: Persist integration fix
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git add app/lib/services/narration_controller.dart app/lib/screens/journey_screen.dart .github/workflows/flutter-ci.yml
          git commit -m "fix: complete adaptive narration integration"
          git push origin HEAD:feature/seven-day-journey-library

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
