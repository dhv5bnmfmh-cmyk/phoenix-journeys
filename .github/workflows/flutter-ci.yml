name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-exact-pause-fix:
    if: (github.ref == 'refs/heads/feature/exact-word-pause-resume' || github.head_ref == 'feature/exact-word-pause-resume') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v4
        with:
          ref: feature/exact-word-pause-resume
          fetch-depth: 0

      - name: Patch exact pause and resume offset
        shell: python
        run: |
          from pathlib import Path

          player_path = Path('app/lib/widgets/narration_player_card.dart')
          player = player_path.read_text()

          insertion_anchor = """  return candidate.clamp(0, totalCharacters).toInt();
}

class NarrationPlayerCard extends StatefulWidget {
"""
          insertion = """  return candidate.clamp(0, totalCharacters).toInt();
}

@visibleForTesting
int resolveNarrationPauseOffset({
  required int controllerOffset,
  required int estimatedOffset,
  required int totalCharacters,
}) {
  if (totalCharacters <= 0) return 0;
  // Never resume ahead of the native/highlight position. Repeating part of the
  // current word is preferable to skipping characters the user has not heard.
  final candidate = math.min(controllerOffset, estimatedOffset);
  return candidate.clamp(0, math.max(0, totalCharacters - 1)).toInt();
}

class NarrationPlayerCard extends StatefulWidget {
"""
          if insertion_anchor not in player:
              raise SystemExit('pause offset insertion anchor not found')
          player = player.replace(insertion_anchor, insertion, 1)

          old_pause = """  Future<void> _pauseSession(int commandId) async {
    final controllerIsCurrent = widget.controller.contentId == widget.contentId;
    final offset = _sessionPlaying
        ? _estimatedSessionOffset()
        : controllerIsCurrent
        ? widget.controller.currentOffset
        : _displayOffset;
    if (!mounted || commandId != _commandVersion) return;
    _positionClock?.cancel();
    setState(() {
      _sessionPlaying = false;
      _sessionPaused = true;
      _displayOffset = offset;
      _resumeOffset = offset;
      _anchorOffset = offset;
      _anchorTime = null;
      _displayItemIndex =
          widget.controller.currentItemIndex ?? _displayItemIndex;
    });
    await widget.controller.stop(resetPosition: false);
  }
"""
          new_pause = """  Future<void> _pauseSession(int commandId) async {
    final controllerIsCurrent = widget.controller.contentId == widget.contentId;
    final estimatedOffset = _sessionPlaying
        ? _estimatedSessionOffset()
        : _displayOffset;
    final offset = controllerIsCurrent
        ? resolveNarrationPauseOffset(
            controllerOffset: widget.controller.currentOffset,
            estimatedOffset: estimatedOffset,
            totalCharacters: widget.controller.totalCharacters,
          )
        : estimatedOffset;
    if (!mounted || commandId != _commandVersion) return;
    _positionClock?.cancel();
    setState(() {
      _sessionPlaying = false;
      _sessionPaused = true;
      _displayOffset = offset;
      _resumeOffset = offset;
      _anchorOffset = offset;
      _anchorTime = null;
      _displayItemIndex =
          widget.controller.currentItemIndex ?? _displayItemIndex;
    });
    await widget.controller.stop(resetPosition: false);
  }
"""
          if old_pause not in player:
              raise SystemExit('pause session anchor not found')
          player = player.replace(old_pause, new_pause, 1)

          old_resume = """    setState(() {
      _anchorOffset = math.max(safeOffset, widget.controller.currentOffset);
      _anchorTime = DateTime.now();
    });
"""
          new_resume = """    setState(() {
      // Keep visual progress anchored to the same character used for audio.
      _displayOffset = safeOffset;
      _resumeOffset = safeOffset;
      _anchorOffset = safeOffset;
      _anchorTime = DateTime.now();
    });
"""
          if old_resume not in player:
              raise SystemExit('resume anchor not found')
          player = player.replace(old_resume, new_resume, 1)
          player_path.write_text(player)

          test_path = Path('app/test/widgets/narration_player_card_test.dart')
          test = test_path.read_text()
          extra_tests = """

  test('pause offset never jumps ahead of the native word position', () {
    final offset = resolveNarrationPauseOffset(
      controllerOffset: 23,
      estimatedOffset: 28,
      totalCharacters: 120,
    );

    expect(offset, 23);
  });

  test('pause offset remains inside the narration range', () {
    final offset = resolveNarrationPauseOffset(
      controllerOffset: 150,
      estimatedOffset: 145,
      totalCharacters: 120,
    );

    expect(offset, 119);
  });
"""
          end = test.rfind('\n}')
          if end == -1:
              raise SystemExit('test file closing brace not found')
          test = test[:end] + extra_tests + test[end:]
          test_path.write_text(test)

      - uses: dart-lang/setup-dart@v1

      - name: Format patched Dart files
        run: dart format app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart

      - name: Commit exact pause and resume fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm .github/workflows/apply-exact-word-pause-resume.yml .github/workflows/run-exact-word-patch.yml
          git add app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart .github/workflows/flutter-ci.yml
          git commit -m "fix: keep narration resume on the paused word"
          git push origin HEAD:feature/exact-word-pause-resume

  verify:
    if: (github.ref != 'refs/heads/feature/exact-word-pause-resume' && github.head_ref != 'feature/exact-word-pause-resume') || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
