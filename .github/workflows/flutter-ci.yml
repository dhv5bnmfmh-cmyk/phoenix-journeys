name: Flutter CI

on:
  push:
    branches:
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 1
          show-progress: false

      - name: Run upgrade script
        id: upgrade
        continue-on-error: true
        run: |
          python3 .github/scripts/apply_adaptive_word_audio_upgrade.py > upgrade-diagnostic.txt 2>&1

      - name: Publish diagnostic
        if: steps.upgrade.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo '### Adaptive word/audio upgrade diagnostic'
            echo '```text'
            cat upgrade-diagnostic.txt
            echo '```'
          } > comment.txt
          gh pr comment 61 --body-file comment.txt

      - name: Fail when upgrade failed
        if: steps.upgrade.outcome != 'success'
        run: exit 1
