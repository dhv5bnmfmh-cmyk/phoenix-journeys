name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "feat/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feat/two-level-journey-picker
          fetch-depth: 0

      - name: Wire two-level picker into Explore
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/feat/two-level-journey-picker'
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/screens/explore_screen.dart')
          text = path.read_text()

          import_anchor = "import '../widgets/destination_background.dart';\n"
          if "journey_picker_sheet.dart" not in text:
              if import_anchor not in text:
                  raise SystemExit('Explore import anchor not found')
              text = text.replace(
                  import_anchor,
                  import_anchor + "import '../widgets/journey_picker_sheet.dart';\n",
                  1,
              )

          start_marker = "    Future<void> chooseJourney() async {"
          end_marker = "\n    return Stack("
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('Journey picker boundaries not found')

          replacement = """    Future<void> chooseJourney() async {
              final journeyId = await showJourneyPickerSheet(
                context: context,
                state: state,
              );
              if (journeyId != null) {
                await openJourneyById(journeyId);
              }
            }
          """

          text = text[:start] + replacement.rstrip() + "\n" + text[end:]
          path.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/explore_screen.dart
          git commit -m "feat: connect city and destination picker [picker-wired]"
          git push origin HEAD:feat/two-level-journey-picker

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
