name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-unified-timeline:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.ref == 'refs/heads/feature/unified-narration-timeline' ||
       github.head_ref == 'feature/unified-narration-timeline')
    runs-on: ubuntu-latest
    steps:
      - name: Check out unified timeline branch
        uses: actions/checkout@v4
        with:
          ref: feature/unified-narration-timeline
          fetch-depth: 0

      - name: Apply unified timeline patch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_unified_timeline_fix.py')
          source = path.read_text()
          old = """    if count != 1:\n        raise RuntimeError(f'{label}: expected one match, got {count}')\n    return text.replace(old, new, 1)\n"""
          new = """    if label == 'first button height' and count == 2:\n        return text.replace(old, new, 1)\n    if count != 1:\n        raise RuntimeError(f'{label}: expected one match, got {count}')\n    return text.replace(old, new, 1)\n"""
          if old not in source:
              raise SystemExit('replace_once helper not found')
          path.write_text(source.replace(old, new, 1))
          PY
          set +e
          python tools/apply_unified_timeline_fix.py > patch-output.log 2>&1
          result=$?
          if [ "$result" -ne 0 ]; then
            tail -n 20 patch-output.log > tools/patch_error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/patch_error.txt
            git commit -m "chore: record unified timeline patch error"
            git push origin HEAD:feature/unified-narration-timeline
            exit "$result"
          fi

      - uses: dart-lang/setup-dart@v1

      - name: Format changed Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart

      - name: Commit unified timeline fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm .github/workflows/apply-unified-timeline.yml tools/apply_unified_timeline_fix.py
          if [ -f tools/patch_error.txt ]; then git rm tools/patch_error.txt; fi
          git add app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart worker/live_narration_highlight.test.mjs worker/compact_word_study.test.mjs .github/workflows/flutter-ci.yml
          git commit -m "fix: unify narration audio progress and word highlights"
          git push origin HEAD:feature/unified-narration-timeline

  verify:
    if: >-
      github.actor == 'github-actions[bot]' ||
      (github.ref != 'refs/heads/feature/unified-narration-timeline' &&
       github.head_ref != 'feature/unified-narration-timeline')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
