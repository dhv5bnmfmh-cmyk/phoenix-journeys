name: Apply guided course flow upgrade

on:
  push:
    branches:
      - feature/seven-day-journey-library
    paths:
      - .github/workflows/flutter-ci.yml
      - .github/scripts/apply_guided_course_upgrade.py

permissions:
  contents: write

concurrency:
  group: guided-course-flow-upgrade
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0

      - name: Apply approved guided course upgrade
        run: python3 .github/scripts/apply_guided_course_upgrade.py

      - name: Commit upgrade and restore normal CI
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm .github/scripts/apply_guided_course_upgrade.py
          git add -A
          git commit -m "feat: guide learners through each journey step"
          git push origin HEAD:feature/seven-day-journey-library
