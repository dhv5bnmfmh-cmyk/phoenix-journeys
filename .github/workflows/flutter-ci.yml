name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-saved-vocabulary-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/seven-day-journey-library'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0

      - name: Apply saved vocabulary fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected pattern not found in {path}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              'app/lib/data/daily_journey_catalog.dart',
              """  ...extendedJourneyExperiences,\n];\n\nDailyJourneyExperience requireDailyJourneyExperience(String id) {""",
              """  ...extendedJourneyExperiences,\n];\n\nfinal List<WordEntry> allDailyJourneyWords = List<WordEntry>.unmodifiable(\n  <String, WordEntry>{\n    for (final journey in dailyJourneyExperiences)\n      for (final entry in journey.words) entry.word: entry,\n  }.values,\n);\n\nDailyJourneyExperience requireDailyJourneyExperience(String id) {""",
          )

          replace_once(
              'app/lib/screens/me_screen.dart',
              """import '../data/journey_data.dart';\n""",
              """import '../data/daily_journey_catalog.dart';\nimport '../data/journey_data.dart';\n""",
          )
          replace_once(
              'app/lib/screens/me_screen.dart',
              """    final savedEntries = words\n        .where((entry) => state.savedWords.contains(entry.word))\n        .toList(growable: false);""",
              """    final savedEntries = allDailyJourneyWords\n        .where((entry) => state.savedWords.contains(entry.word))\n        .toList(growable: false);""",
          )

          replace_once(
              'app/lib/widgets/word_detail_sheet.dart',
              """                      label: Text(\n                        state.displayText(isSaved ? '已收藏' : '收藏生词'),\n                        style: const TextStyle(fontSize: 11),\n                      ),""",
              """                      label: FittedBox(\n                        fit: BoxFit.scaleDown,\n                        child: Text(\n                          state.displayText(isSaved ? '已收藏' : '收藏生词'),\n                          maxLines: 1,\n                          softWrap: false,\n                          style: const TextStyle(fontSize: 11),\n                        ),\n                      ),""",
          )

          Path('app/test/saved_vocabulary_library_test.dart').write_text(r'''import 'package:flutter/material.dart';
import 'package:flutter_test/flutter_test.dart';
import 'package:provider/provider.dart';
import 'package:shared_preferences/shared_preferences.dart';

import 'package:phoenix_journeys/data/daily_journey_catalog.dart';
import 'package:phoenix_journeys/screens/me_screen.dart';
import 'package:phoenix_journeys/state/app_state.dart';

void main() {
  TestWidgetsFlutterBinding.ensureInitialized();

  setUp(() {
    SharedPreferences.setMockInitialValues(<String, Object>{});
  });

  test('the shared vocabulary library contains words from every journey', () {
    final catalogWords = allDailyJourneyWords.map((entry) => entry.word).toSet();

    for (final journey in dailyJourneyExperiences) {
      for (final entry in journey.words) {
        expect(catalogWords, contains(entry.word));
      }
    }
    expect(catalogWords, contains('牌坊'));
    expect(catalogWords.length, allDailyJourneyWords.length);
  });

  testWidgets('a saved Nanjing word appears in My Vocabulary', (tester) async {
    final state = AppState(clock: () => DateTime(2026, 7, 21));
    await state.load();
    await state.toggleSavedWord('牌坊');

    await tester.pumpWidget(
      ChangeNotifierProvider.value(
        value: state,
        child: const MaterialApp(home: Scaffold(body: MeScreen())),
      ),
    );
    await tester.pumpAndSettle();

    expect(find.text('我的生词 · 1'), findsOneWidget);
    expect(find.text('牌坊'), findsOneWidget);
  });
}
''')

          Path('worker/saved_vocabulary_rule.test.mjs').write_text(r'''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const catalog = readFileSync('app/lib/data/daily_journey_catalog.dart', 'utf8');
const meScreen = readFileSync('app/lib/screens/me_screen.dart', 'utf8');
const wordSheet = readFileSync('app/lib/widgets/word_detail_sheet.dart', 'utf8');

test('My Vocabulary uses the shared seven-city vocabulary catalog', () => {
  assert.match(catalog, /allDailyJourneyWords/);
  assert.match(catalog, /for \(final journey in dailyJourneyExperiences\)/);
  assert.match(meScreen, /final savedEntries = allDailyJourneyWords/);
  assert.doesNotMatch(meScreen, /final savedEntries = words\n/);
});

test('the save-vocabulary label is permanently constrained to one line', () => {
  assert.match(wordSheet, /state\.displayText\(isSaved \? '已收藏' : '收藏生词'\)/);
  assert.match(wordSheet, /maxLines: 1/);
  assert.match(wordSheet, /softWrap: false/);
  assert.match(wordSheet, /fit: BoxFit\.scaleDown/);
});
''')
          PY

      - name: Set up Flutter for formatting
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format changed Dart files
        working-directory: app
        run: dart format lib/data/daily_journey_catalog.dart lib/screens/me_screen.dart lib/widgets/word_detail_sheet.dart test/saved_vocabulary_library_test.dart

      - name: Commit fix and restore CI
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout HEAD^ -- .github/workflows/flutter-ci.yml
          git rm .github/workflows/fix-saved-vocabulary-once.yml
          git add .github/workflows/flutter-ci.yml app/lib/data/daily_journey_catalog.dart app/lib/screens/me_screen.dart app/lib/widgets/word_detail_sheet.dart app/test/saved_vocabulary_library_test.dart worker/saved_vocabulary_rule.test.mjs
          git commit -m "fix: save vocabulary across every journey"
          git push origin HEAD:feature/seven-day-journey-library

  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
