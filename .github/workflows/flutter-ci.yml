name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-verification-logs
          path: |
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        if: >-
          steps.analyze.outcome != 'success' ||
          steps.test.outcome != 'success' ||
          steps.build.outcome != 'success'
        run: exit 1
