name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-exact-pause-fix:
    if: github.ref == 'refs/heads/feature/exact-word-pause-resume' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v4
        with:
          ref: feature/exact-word-pause-resume
          fetch-depth: 0

      - name: Execute exact-word patch
        shell: python
        run: |
          from pathlib import Path

          workflow = Path('.github/workflows/apply-exact-word-pause-resume.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(workflow) if line.strip() == '- name: Patch exact pause and resume position')
          run_line = next(i for i in range(start, len(workflow)) if workflow[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(workflow)) if workflow[i].strip() == '- uses: dart-lang/setup-dart@v1')
          script_lines = workflow[run_line + 1:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script_lines)
          exec(compile(script, 'exact_word_patch.py', 'exec'))

      - uses: dart-lang/setup-dart@v1

      - name: Format patched Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart

      - name: Commit exact-word pause and resume fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm .github/workflows/apply-exact-word-pause-resume.yml .github/workflows/run-exact-word-patch.yml
          git add app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart .github/workflows/flutter-ci.yml
          git commit -m "fix: resume narration from the exact highlighted word"
          git push origin HEAD:feature/exact-word-pause-resume

  verify:
    if: github.ref != 'refs/heads/feature/exact-word-pause-resume' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
