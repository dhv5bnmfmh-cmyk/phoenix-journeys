name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: flutter analyze --no-fatal-infos 2>&1 | tee analyze.log

      - name: Test
        run: flutter test

      - name: Build web release
        run: flutter build web --release

      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-log
          path: app/analyze.log
          if-no-files-found: error

      - name: Enforce analyzer result
        if: steps.analyze.outcome != 'success'
        run: exit 1
