name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/summer-palace-parallax-background
          fetch-depth: 0

      - name: Apply narration layout stability fix
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          python3 tools/fix_narration_chrome_stability.py
          rm -f tools/fix_narration_chrome_stability.py
          rm -f .github/workflows/apply-narration-layout-stability-fix.yml
          git diff --check

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed Dart files
        working-directory: ${{ github.workspace }}
        run: |
          dart format \
            app/lib/screens/journey_screen.dart \
            app/lib/widgets/interactive_story_text.dart

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"

      - name: Publish clean narration stability fix
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: keep narration side controls layout-stable'
          git push origin HEAD:feature/summer-palace-parallax-background
