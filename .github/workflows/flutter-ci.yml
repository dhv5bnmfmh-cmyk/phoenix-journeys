name: Apply Summer Palace live cinemagraph through Flutter CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: summer-palace-live-cinemagraph-final
  cancel-in-progress: true

jobs:
  generate-verify-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/summer-palace-parallax-background
          fetch-depth: 0

      - name: Set up Python imaging tools
        run: python3 -m pip install --disable-pip-version-check pillow numpy

      - name: Generate and integrate live background
        run: |
          set -euo pipefail
          python3 tools/apply_summer_palace_live_cinemagraph.py
          rm -f tools/apply_summer_palace_live_cinemagraph.py
          rm -f .github/workflows/apply-summer-palace-live-cinemagraph.yml
          git diff --check
          asset=app/assets/images/backgrounds/generated/beijing/summer-palace/live/11-live-cinemagraph.webp
          test -s "$asset"
          test "$(stat -c%s "$asset")" -lt 1100000

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee /tmp/phoenix-agent-live.log

      - name: Upload Agent diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summer-palace-live-agent-log
          path: /tmp/phoenix-agent-live.log
          if-no-files-found: error

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/data/journey_background_catalog.dart \
            app/lib/widgets/destination_background.dart \
            app/test/summer_palace_dynamic_background_test.dart

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Validate Cloudflare Worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir /tmp/phoenix-wrangler-dry-run

      - name: Enforce Agent result
        run: test "${{ steps.agents.outcome }}" = success

      - name: Publish clean live background commit
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          rm -rf .wrangler-dry-run
          rm -f worker-test.log worker-build.log
          rm -f app/analyze.log app/test.log app/build-web.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add Summer Palace live cinemagraph background'
          git push origin HEAD:feature/summer-palace-parallax-background
