name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Apply Shanghai Bund motion
        if: github.ref == 'refs/heads/feature/shanghai-bund-dynamic-background' || github.head_ref == 'feature/shanghai-bund-dynamic-background'
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PYRUN'
          from pathlib import Path

          workflow = Path('.github/workflows/build-shanghai-bund-motion.yml')
          lines = workflow.read_text().splitlines()
          start = lines.index("          python3 - <<'PY'") + 1
          end = lines.index('          PY', start)
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines[start:end]
          )
          exec(compile(script, str(workflow), 'exec'))
          PYRUN

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format Shanghai Bund motion
        if: github.ref == 'refs/heads/feature/shanghai-bund-dynamic-background' || github.head_ref == 'feature/shanghai-bund-dynamic-background'
        run: dart format lib/widgets/destination_background.dart

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"

      - name: Publish Shanghai Bund motion
        if: github.ref == 'refs/heads/feature/shanghai-bund-dynamic-background' || github.head_ref == 'feature/shanghai-bund-dynamic-background'
        working-directory: ${{ github.workspace }}
        run: |
          git checkout HEAD^ -- .github/workflows/flutter-ci.yml
          rm -f .github/workflows/build-shanghai-bund-motion.yml
          rm -f .github/workflows/enable-shanghai-bund-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/destination_background.dart worker/shanghai_bund_motion.test.mjs .github/workflows
          git commit -m "feat: add Shanghai Bund cinematic background motion"
          git push origin HEAD:feature/shanghai-bund-dynamic-background
