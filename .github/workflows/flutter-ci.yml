          marker = r'''class _CityMarker extends StatelessWidget {
  const _CityMarker({
    required this.label,
    required this.subtitle,
    required this.active,
    required this.pulse,
  });

  final String label;
  final String subtitle;
  final bool active;
  final double pulse;

  @override
  Widget build(BuildContext context) {
    final scale = 1 + math.sin(pulse * math.pi * 2) * .035;
    final color = active ? const Color(0xFFFFD879) : Colors.white;

    return Transform.scale(
      scale: scale,
      child: Column(
        children: [
          Container(
            width: 31,
            height: 31,
            decoration: BoxDecoration(
              color: const Color(0xFF08252D).withValues(alpha: .88),
              shape: BoxShape.circle,
              border: Border.all(color: color.withValues(alpha: .85), width: 1.4),
              boxShadow: [
                BoxShadow(
                  color: color.withValues(alpha: active ? .28 : .13),
                  blurRadius: active ? 10 : 6,
                  spreadRadius: active ? 1.5 : .5,
                ),
              ],
            ),
            child: Icon(
              active ? Icons.star_rounded : Icons.location_on_rounded,
              color: color,
              size: 16,
            ),
          ),
          const SizedBox(height: 1),
          Container(
            padding: const EdgeInsets.symmetric(horizontal: 5, vertical: 2),
            decoration: BoxDecoration(
              color: const Color(0xFF071D26).withValues(alpha: .84),
              borderRadius: BorderRadius.circular(7),
            ),
            child: Text(
              '$label $subtitle',
              style: const TextStyle(
                color: Colors.white,
                fontSize: 7.5,
                height: 1,
                fontWeight: FontWeight.w800,
              ),
            ),
          ),
        ],
      ),
    );
  }
}
'''
