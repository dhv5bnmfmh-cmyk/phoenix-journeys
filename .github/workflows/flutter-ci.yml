name: Format two-level picker

on:
  push:
    branches:
      - feat/two-level-journey-picker

permissions:
  contents: write

jobs:
  format:
    if: "!contains(github.event.head_commit.message, '[picker-formatted]')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/two-level-journey-picker
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format picker sources
        run: |
          dart format \
            app/lib/screens/explore_screen.dart \
            app/lib/widgets/journey_picker_sheet.dart \
            app/test/journey_picker_sheet_test.dart

      - name: Commit formatted sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/lib/screens/explore_screen.dart \
            app/lib/widgets/journey_picker_sheet.dart \
            app/test/journey_picker_sheet_test.dart
          git commit -m "style: format city and destination picker [picker-formatted]"
          git push origin HEAD:feat/two-level-journey-picker
