name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Commit verified force-resume patch
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          rm -f \
            .github/workflows/apply-force-resume.yml \
            docs/force-resume-verification.md \
            worker/force_resume_patch.test.mjs
          git add \
            app/lib/screens/journey_screen.dart \
            app/lib/services/narration_controller.dart \
            .github/workflows/flutter-ci.yml \
            .github/workflows/apply-force-resume.yml \
            docs/force-resume-verification.md \
            worker/force_resume_patch.test.mjs
          git commit -m "fix: force narration resume after word sheet dismissal"
          git push origin HEAD:feature/force-resume-after-word-sheet

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
