name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-direct-highlight:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.ref == 'refs/heads/feature/direct-highlight-half-word-sheet' ||
       github.head_ref == 'feature/direct-highlight-half-word-sheet')
    runs-on: ubuntu-latest
    steps:
      - name: Check out direct highlight branch
        uses: actions/checkout@v4
        with:
          ref: feature/direct-highlight-half-word-sheet
          fetch-depth: 0

      - name: Apply direct highlight and half sheet patch
        run: |
          set +e
          python tools/apply_direct_highlight_half_sheet.py > patch-output.log 2>&1
          result=$?
          if [ "$result" -ne 0 ]; then
            tail -n 20 patch-output.log > tools/patch_error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/patch_error.txt
            git commit -m "chore: record direct highlight patch error"
            git push origin HEAD:feature/direct-highlight-half-word-sheet
            exit "$result"
          fi

      - uses: dart-lang/setup-dart@v1

      - name: Format changed Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/interactive_story_text.dart app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart

      - name: Commit direct highlight fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git rm tools/apply_direct_highlight_half_sheet.py
          if [ -f tools/patch_error.txt ]; then git rm tools/patch_error.txt; fi
          git add -A
          git commit -m "fix: bind text highlights directly to narration"
          git push origin HEAD:feature/direct-highlight-half-word-sheet

  verify:
    if: >-
      github.actor == 'github-actions[bot]' ||
      (github.ref != 'refs/heads/feature/direct-highlight-half-word-sheet' &&
       github.head_ref != 'feature/direct-highlight-half-word-sheet')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
