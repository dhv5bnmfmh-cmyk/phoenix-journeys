          source, count = re.subn(
              r'class _DiscoveryCard extends StatelessWidget \{[\s\S]*?\n\}\n\nclass _Pill extends StatelessWidget \{[\s\S]*?\n\}\n\nclass _FeatureChip extends StatelessWidget \{[\s\S]*?\n\}\n\n(?=class _PremiumMapPainter)',
