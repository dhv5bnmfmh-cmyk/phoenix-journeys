name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-resume-fix:
    if: (github.ref == 'refs/heads/feature/resume-offset-and-compact-story-v2' || github.head_ref == 'feature/resume-offset-and-compact-story-v2') && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/resume-offset-and-compact-story-v2
          fetch-depth: 0

      - name: Execute narration patch
        shell: python
        run: |
          from pathlib import Path

          lines = Path('.github/workflows/apply-resume-offset-fix.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == '- name: Patch narration resume and story density')
          run_line = next(i for i in range(start, len(lines)) if lines[i].strip() == 'run: |')
          end = next(i for i in range(run_line + 1, len(lines)) if lines[i].strip() == '- uses: dart-lang/setup-dart@v1')
          script_lines = lines[run_line + 1:end]
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in script_lines)
          exec(compile(script, 'resume_fix.py', 'exec'))

      - uses: dart-lang/setup-dart@v1

      - name: Format changed files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/test/narration_resume_offset_test.dart

      - name: Commit source fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart app/lib/widgets/narration_player_card.dart app/lib/screens/journey_screen.dart app/test/narration_resume_offset_test.dart
          git commit -m "fix: resume narration from the paused word"
          git push origin HEAD:feature/resume-offset-and-compact-story-v2

  verify:
    if: ((github.ref != 'refs/heads/feature/resume-offset-and-compact-story-v2' && github.head_ref != 'feature/resume-offset-and-compact-story-v2') || github.actor == 'github-actions[bot]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
