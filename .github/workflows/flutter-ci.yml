name: Flutter CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-compact-first-page:
    if: github.ref == 'refs/heads/feature/compact-first-page' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out compact layout branch
        uses: actions/checkout@v4
        with:
          ref: feature/compact-first-page
          fetch-depth: 0

      - name: Compact Explore first page
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('app/lib/screens/explore_screen.dart')
          source = path.read_text()

          explore = r'''@visibleForTesting
double compactExploreMapHeight(double viewportHeight) {
  if (viewportHeight < 700) return 160;
  if (viewportHeight < 820) return 174;
  return 188;
}

class ExploreScreen extends StatelessWidget {
  const ExploreScreen({super.key});

  @override
  Widget build(BuildContext context) {
    final state = context.watch<AppState>();
    final viewportHeight = MediaQuery.sizeOf(context).height;
    final mapHeight = compactExploreMapHeight(viewportHeight);

    Future<void> openJourney() async {
      if (state.journeyCompleted) {
        await state.restartJourney();
      }
      if (!context.mounted) return;
      Navigator.of(context).push(
        MaterialPageRoute(builder: (_) => const JourneyScreen()),
      );
    }

    return Stack(
      children: [
        const Positioned.fill(child: _JourneyBackground()),
        ListView(
          padding: const EdgeInsets.fromLTRB(14, 10, 14, 60),
          children: [
            _TopBar(state: state),
            const SizedBox(height: 7),
            Text(
              state.displayText('欢迎回来，Explorer'),
              style: Theme.of(context).textTheme.titleMedium?.copyWith(
                    fontSize: 17,
                    fontWeight: FontWeight.w900,
                    height: 1.1,
                  ),
            ),
            const SizedBox(height: 2),
            Text(
              state.displayText('世界很大，从一门语言开始。'),
              style: Theme.of(context).textTheme.bodySmall?.copyWith(
                    fontSize: 11.5,
                    height: 1.15,
                    color: Colors.black54,
                  ),
            ),
            const SizedBox(height: 8),
            _FlightMapCard(state: state, height: mapHeight),
            const SizedBox(height: 8),
            _JourneyCard(state: state, onOpen: openJourney),
            const SizedBox(height: 8),
            const _DiscoveryCard(),
          ],
        ),
      ],
    );
  }
}
'''
