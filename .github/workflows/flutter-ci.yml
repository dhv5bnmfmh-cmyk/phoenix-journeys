          test = Path('app/test/explore_compact_layout_test.dart')
          test.write_text(r'''import 'package:flutter_test/flutter_test.dart';
import 'package:phoenix_journeys/screens/explore_screen.dart';

void main() {
  test('uses a compact map height for short phone viewports', () {
    expect(compactExploreMapHeight(680), 160);
    expect(compactExploreMapHeight(760), 174);
  });

  test('caps the regular phone map at a one-screen-friendly height', () {
    expect(compactExploreMapHeight(850), 188);
  });
}
''')

      - uses: dart-lang/setup-dart@v1

      - name: Format compact Explore files
        run: dart format app/lib/screens/explore_screen.dart app/test/explore_compact_layout_test.dart

      - name: Commit compact first page
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          git add app/lib/screens/explore_screen.dart app/test/explore_compact_layout_test.dart .github/workflows/flutter-ci.yml
          git commit -m "ui: fit Explore content into one phone screen"
          git push origin HEAD:feature/compact-first-page

  verify:
    if: github.ref != 'refs/heads/feature/compact-first-page' || github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee worker-test.log

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        id: analyze
        continue-on-error: true
        run: |
          set -o pipefail
          flutter analyze 2>&1 | tee analyze.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          flutter test 2>&1 | tee test.log

      - name: Build web release
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build web --release 2>&1 | tee build-web.log

      - name: Validate Cloudflare Worker bundle
        id: worker
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run 2>&1 | tee worker-build.log

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-verification-logs
          path: |
            worker-test.log
            worker-build.log
            app/analyze.log
            app/test.log
            app/build-web.log
          if-no-files-found: error

      - name: Enforce verification results
        shell: bash
        run: |
          failures=0
          for result in \
            "${{ steps.agents.outcome }}" \
            "${{ steps.analyze.outcome }}" \
            "${{ steps.test.outcome }}" \
            "${{ steps.build.outcome }}" \
            "${{ steps.worker.outcome }}"; do
            if [[ "$result" != "success" ]]; then
              failures=1
            fi
          done
          exit "$failures"
