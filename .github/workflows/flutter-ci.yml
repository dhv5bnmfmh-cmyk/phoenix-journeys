name: Clean two-level picker import

on:
  push:
    branches:
      - feat/two-level-journey-picker

permissions:
  contents: write

jobs:
  clean:
    if: "!contains(github.event.head_commit.message, '[picker-import-cleaned]')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/two-level-journey-picker
          fetch-depth: 0

      - name: Remove obsolete import
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/lib/screens/explore_screen.dart')
          text = path.read_text()
          obsolete = "import '../data/daily_journey_catalog.dart';\n"
          if obsolete not in text:
              raise SystemExit('Obsolete import not found')
          path.write_text(text.replace(obsolete, '', 1))
          PY

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/explore_screen.dart
          git commit -m "fix: remove obsolete journey catalog import [picker-import-cleaned]"
          git push origin HEAD:feat/two-level-journey-picker
