name: Capture Phoenix agent failure

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  capture-agent-log:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Capture Phoenix Agent output
        shell: bash
        run: |
          set +e
          node --test worker/*.test.mjs > phoenix-agent-location.log 2>&1
          status=$?
          printf '\nAGENT_EXIT_CODE=%s\n' "$status" >> phoenix-agent-location.log
          cat phoenix-agent-location.log
          exit 0

      - name: Commit diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/capture-agent-log.yml
          git add phoenix-agent-location.log
          git commit -m "chore: capture Phoenix location agent failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
