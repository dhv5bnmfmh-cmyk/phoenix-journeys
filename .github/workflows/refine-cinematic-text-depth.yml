name: Refine cinematic narration depth

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: refine-cinematic-text-depth
  cancel-in-progress: true

jobs:
  refine-verify-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/summer-palace-parallax-background
          fetch-depth: 0

      - name: Apply refinement
        run: |
          set -euo pipefail
          python3 tools/refine_cinematic_text_and_background.py
          python3 tools/fix_cinematic_refinement_followup.py
          rm -f tools/refine_cinematic_text_and_background.py
          rm -f tools/fix_cinematic_refinement_followup.py
          rm -f .github/workflows/refine-cinematic-text-depth.yml
          git diff --check

      - name: Test Phoenix agents
        id: agents
        continue-on-error: true
        run: |
          set -o pipefail
          node --test worker/*.test.mjs 2>&1 | tee /tmp/cinematic-refinement-agent.log

      - name: Upload Agent diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-refinement-agent-log
          path: /tmp/cinematic-refinement-agent.log
          if-no-files-found: error

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/widgets/destination_background.dart \
            app/lib/widgets/interactive_story_text.dart \
            app/test/narration_progressive_reveal_test.dart \
            app/test/summer_palace_dynamic_background_test.dart

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        id: flutter_tests
        continue-on-error: true
        working-directory: app
        run: |
          set -o pipefail
          flutter test 2>&1 | tee /tmp/cinematic-refinement-flutter-test.log

      - name: Upload Flutter diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cinematic-refinement-flutter-test-log
          path: /tmp/cinematic-refinement-flutter-test.log
          if-no-files-found: error

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Validate Cloudflare Worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir /tmp/phoenix-wrangler-dry-run

      - name: Enforce verification results
        run: |
          test "${{ steps.agents.outcome }}" = success
          test "${{ steps.flutter_tests.outcome }}" = success

      - name: Publish clean refinement commit
        run: |
          set -euo pipefail
          git checkout origin/main -- .github/workflows/flutter-ci.yml
          rm -rf .wrangler-dry-run
          rm -f worker-test.log worker-build.log
          rm -f app/analyze.log app/test.log app/build-web.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: refine cinematic text depth and remove water ripples'
          git push origin HEAD:feature/summer-palace-parallax-background
