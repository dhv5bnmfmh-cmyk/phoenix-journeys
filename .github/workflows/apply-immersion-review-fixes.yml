name: Apply immersion review fixes

on:
  pull_request:
    branches:
      - main
    types:
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: apply-immersion-review-fixes
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'feature/immersive-journey-content-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/immersive-journey-content-v2
          fetch-depth: 0

      - name: Apply reviewed immersion fixes
        run: |
          set -euo pipefail
          python3 tools/fix_immersion_review.py
          rm -f tools/fix_immersion_review.py
          rm -f .github/workflows/apply-immersion-review-fixes.yml
          node --test worker/journey_immersion_rule.test.mjs
          git diff --check

      - name: Commit reviewed immersion fixes
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: keep journey immersion safe around modal sheets'
          git push origin HEAD:feature/immersive-journey-content-v2
