name: Remove journey reading triangles

on:
  pull_request_target:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  remove-triangles:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'trigger/remove-journey-triangles'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Remove triangles and update permanent rules
        run: |
          python3 <<'PY'
          from pathlib import Path

          interactive_path = Path('app/lib/widgets/interactive_story_text.dart')
          interactive = interactive_path.read_text()
          interactive = interactive.replace('reading-triangle-', 'reading-highlight-')

          start = interactive.index('class _CinematicRevealGlyph extends StatelessWidget {')
          end = interactive.index('class _VocabularyPopover extends StatelessWidget {')
          replacement = '''class _CinematicRevealGlyph extends StatelessWidget {
  const _CinematicRevealGlyph({
    required this.text,
    required this.style,
    required this.progress,
    required this.highlighted,
    super.key,
  });

  final String text;
  final TextStyle style;
  final double progress;
  final bool highlighted;

  @override
  Widget build(BuildContext context) {
    final t = progress.clamp(0.0, 1.0).toDouble();
    final contrast = Curves.easeOutCubic.transform(t);
    final lift = (1 - t) * 1.8;
    final opacity = lerpDouble(.4, 1, t) ?? 1;
    final finalColor = style.color ?? Colors.white;
    final paleColor =
        highlighted ? const Color(0xFFFFE7AA) : const Color(0xFFD8D0C2);
    final cinematicColor =
        Color.lerp(paleColor, finalColor, contrast) ?? finalColor;
    final fontSize = style.fontSize ?? 14;
    final lineHeight = style.height ?? 1.22;

    return Transform.translate(
      offset: Offset(0, lift),
      child: Opacity(
        opacity: opacity,
        child: SizedBox(
          height: fontSize * lineHeight,
          child: Center(
            widthFactor: 1,
            child: Text(
              text,
              style: style.copyWith(
                color: cinematicColor,
                height: lineHeight,
                shadows: style.shadows,
              ),
            ),
          ),
        ),
      ),
    );
  }
}

class _InlineReadingMarker extends StatelessWidget {
  const _InlineReadingMarker({
    required this.text,
    required this.style,
    super.key,
  });

  final String text;
  final TextStyle style;

  @override
  Widget build(BuildContext context) {
    final fontSize = style.fontSize ?? 14;
    final lineHeight = style.height ?? 1.22;
    return SizedBox(
      height: fontSize * lineHeight,
      child: Center(
        widthFactor: 1,
        child: Text(
          text,
          style: style.copyWith(
            color: const Color(0xFFFFE7AA),
            height: lineHeight,
            fontWeight: FontWeight.w900,
          ),
        ),
      ),
    );
  }
}

'''
          interactive = interactive[:start] + replacement + interactive[end:]
          forbidden = ('_ReadingTrianglePainter', 'reading-triangle-', 'size: Size(9, 5)')
          for token in forbidden:
              if token in interactive:
                  raise SystemExit(f'Triangle implementation remains: {token}')
          interactive_path.write_text(interactive)

          Path('app/test/widgets/interactive_story_text_visual_test.dart').write_text('''import 'package:flutter/material.dart';
import 'package:flutter_test/flutter_test.dart';
import 'package:phoenix_journeys/data/journey_data.dart';
import 'package:phoenix_journeys/state/app_state.dart';
import 'package:phoenix_journeys/widgets/interactive_story_text.dart';
import 'package:provider/provider.dart';

void main() {
  testWidgets(
    'explicit narration range highlights active text without a triangle',
    (tester) async {
      final state = AppState();
      await tester.pumpWidget(
        ChangeNotifierProvider<AppState>.value(
          value: state,
          child: const MaterialApp(
            home: Scaffold(
              body: InteractiveStoryText(
                text: '故宫很美',
                entries: <WordEntry>[],
                narrationItemId: 'visual-test',
                highlightStart: 0,
                highlightEnd: 1,
              ),
            ),
          ),
        ),
      );

      expect(
        find.byKey(const ValueKey('reading-highlight-visual-test')),
        findsOneWidget,
      );
      expect(find.byType(CustomPaint), findsNothing);
    },
  );
}
''')

          Path('worker/triangle_progress_rule.test.mjs').write_text('''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const controller = readFileSync('app/lib/services/narration_controller.dart', 'utf8');
const player = readFileSync('app/lib/widgets/narration_player_card.dart', 'utf8');
const interactive = readFileSync('app/lib/widgets/interactive_story_text.dart', 'utf8');
const journey = readFileSync('app/lib/screens/journey_screen.dart', 'utf8');

test('Safari progress watchdog is scheduled before speak', () => {
  const watchdog = controller.indexOf('unawaited(_startProgressWatchdog(sessionToken, safeOffset))');
  const speak = controller.indexOf('final result = await _tts.speak(remainingText)');
  assert.ok(watchdog >= 0 && speak > watchdog);
});

test('Story and Discovery use text-only narration highlights', () => {
  assert.match(interactive, /class _InlineReadingMarker/);
  assert.match(interactive, /reading-highlight-/);
  assert.match(interactive, /alignment: PlaceholderAlignment\.middle/);
  assert.match(interactive, /height: fontSize \* lineHeight/);
  assert.match(interactive, /color: const Color\(0xFFFFE7AA\)/);
  assert.doesNotMatch(interactive, /_ReadingTrianglePainter|reading-triangle-|CustomPaint/);
  assert.equal((journey.match(/InteractiveStoryText\(/g) ?? []).length >= 2, true);
  assert.match(journey, /contentId: 'story'/);
  assert.match(journey, /contentId: 'discovery'/);
});

test('playing percent never appears stuck at zero', () => {
  assert.match(
    player,
    /final percent\s*=\s*isPlaying[\s\S]*roundedPercent\.clamp\(1, 99\)/,
  );
});
''')

          Path('worker/explicit_visual_highlight.test.mjs').write_text('''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const controller = readFileSync(
  'app/lib/services/narration_controller.dart',
  'utf8',
);
const interactive = readFileSync(
  'app/lib/widgets/interactive_story_text.dart',
  'utf8',
);
const journey = readFileSync('app/lib/screens/journey_screen.dart', 'utf8');
const widgetTest = readFileSync(
  'app/test/widgets/interactive_story_text_visual_test.dart',
  'utf8',
);

test('position derives from playback and is passed to Story and Discovery', () => {
  assert.match(controller, /NarrationHighlightSnapshot\? get highlightSnapshot \{/);
  assert.match(interactive, /final int\? highlightStart/);
  assert.equal(
    (journey.match(
      /highlightStart:\s*isActive\s*\?\s*snapshot!\.start\s*:\s*null/g,
    ) ?? []).length,
    2,
  );
});

test('Flutter verifies active narration uses text highlight without triangles', () => {
  assert.match(interactive, /class _InlineReadingMarker/);
  assert.match(interactive, /reading-highlight-/);
  assert.match(interactive, /alignment: PlaceholderAlignment\.middle/);
  assert.match(interactive, /height: fontSize \* lineHeight/);
  assert.doesNotMatch(interactive, /_ReadingTrianglePainter|reading-triangle-|CustomPaint/);
  assert.match(widgetTest, /reading-highlight-visual-test/);
  assert.match(widgetTest, /find\.byType\(CustomPaint\), findsNothing/);
});
''')

          cinematic_path = Path('worker/cinematic_narration_reveal_rule.test.mjs')
          cinematic = cinematic_path.read_text()
          cinematic = cinematic.replace('reading-triangle-', 'reading-highlight-')
          if '_ReadingTrianglePainter|reading-triangle-|CustomPaint' not in cinematic:
              cinematic = cinematic.replace(
                  "  assert.match(interactive, /reading-highlight-\\$\\{widget\\.narrationItemId/);",
                  "  assert.match(interactive, /reading-highlight-\\$\\{widget\\.narrationItemId/);\n  assert.doesNotMatch(interactive, /_ReadingTrianglePainter|reading-triangle-|CustomPaint/);",
              )
          cinematic_path.write_text(cinematic)
          PY

      - name: Commit text-only highlights to feature branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/lib/widgets/interactive_story_text.dart \
            app/test/widgets/interactive_story_text_visual_test.dart \
            worker/triangle_progress_rule.test.mjs \
            worker/explicit_visual_highlight.test.mjs \
            worker/cinematic_narration_reveal_rule.test.mjs
          git diff --cached --check
          git commit -m 'fix: remove reading triangles from all journeys'
          git push origin HEAD:feature/shanghai-bund-dynamic-background
