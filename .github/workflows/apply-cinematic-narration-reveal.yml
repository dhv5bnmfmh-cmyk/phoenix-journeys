name: Apply cinematic narration reveal

on:
  push:
    branches:
      - feature/cinematic-narration-reveal
    paths:
      - .github/workflows/apply-cinematic-narration-reveal.yml

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: cinematic-narration-reveal
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-99
  PREVIEW_URL: https://phoenix-journeys-pr-99.7hn5tyrjgh.workers.dev

jobs:
  apply-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cinematic branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinematic-narration-reveal
          fetch-depth: 0

      - name: Apply cinematic reveal integration
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_cinematic_narration_reveal.py
          rm -f tools/apply_cinematic_narration_reveal.py
          rm -f .github/workflows/apply-cinematic-narration-reveal.yml
          git diff --check

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format cinematic files
        run: |
          dart format \
            app/lib/widgets/interactive_story_text.dart \
            app/test/narration_progressive_reveal_test.dart

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Publish clean feature commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add cinematic narration reveal'
          git push origin HEAD:feature/cinematic-narration-reveal
          echo "PREVIEW_RELEASE=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          set -euo pipefail
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          for attempt in $(seq 1 20); do
            body="$(curl -fsS "$health_url" || true)"
            if printf '%s' "$body" | grep -Fq "$PREVIEW_RELEASE"; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Publish experience link
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          short_release="${PREVIEW_RELEASE:0:8}"
          body="<!-- phoenix-cinematic-reveal-preview -->
          ## Phoenix 电影级朗读显现体验版 ✅

          [打开电影级朗读体验版](${PREVIEW_URL}/?unlock=all&v=${short_release})

          - PR：#99
          - Commit：\`${short_release}\`
          - 连续补帧，不再逐字硬切
          - 淡入、轻微上浮、模糊转清晰
          - 全部旅程已开放
          - 与 main 隔离"
          gh api "repos/${GITHUB_REPOSITORY}/issues/99/comments" -f body="$body"
