name: Apply iOS live-word progress fix

on:
  push:
    branches:
      - feature/ios-live-word-highlight

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ios-live-word-highlight
          fetch-depth: 0

      - name: Apply iOS live-word fix
        run: python tools/apply_ios_live_word_fix.py

      - uses: dart-lang/setup-dart@v1

      - name: Format Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/screens/journey_screen.dart

      - name: Commit production fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-ios-live-word-fix.yml tools/apply_ios_live_word_fix.py
          git add app/lib/services/narration_controller.dart app/lib/screens/journey_screen.dart worker/ios_live_word_progress.test.mjs worker/compact_reading_support.test.mjs
          git commit -m "fix: keep iOS narration progress and inline highlight moving"
          git push origin HEAD:feature/ios-live-word-highlight
