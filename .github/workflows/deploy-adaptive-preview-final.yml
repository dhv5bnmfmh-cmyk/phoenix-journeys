name: Deploy adaptive Summer Palace preview final

on:
  push:
    branches:
      - feature/adaptive-summer-palace
    paths:
      - .github/workflows/deploy-adaptive-preview-final.yml

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: adaptive-summer-palace-final-preview
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/adaptive-summer-palace
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install dependencies
        working-directory: app
        run: flutter pub get
      - name: Verify agents
        run: node --test worker/*.test.mjs
      - name: Verify Flutter
        working-directory: app
        run: |
          flutter analyze
          flutter test
          flutter build web --release
      - name: Deploy preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 deploy \
            --name phoenix-journeys-pr-97 \
            --var "PHOENIX_RELEASE:${GITHUB_SHA}"
      - name: Verify preview
        run: |
          for attempt in $(seq 1 20); do
            body="$(curl -fsS "https://phoenix-journeys-pr-97.7hn5tyrjgh.workers.dev/api/health?commit=${GITHUB_SHA}" || true)"
            if printf '%s' "$body" | grep -Fq "$GITHUB_SHA"; then exit 0; fi
            sleep 3
          done
          exit 1
      - name: Publish link
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          short="${GITHUB_SHA:0:8}"
          gh api repos/${GITHUB_REPOSITORY}/issues/97/comments -f body="<!-- phoenix-adaptive-final -->
          ## Phoenix 颐和园三级旅程体验版 ✅

          [打开体验版](https://phoenix-journeys-pr-97.7hn5tyrjgh.workers.dev/?unlock=all&v=${short})

          - 轻松／标准／挑战
          - 首次选择并保存
          - 旅程中可切换
          - 全部旅程开放
          - Commit：\`${short}\`"
