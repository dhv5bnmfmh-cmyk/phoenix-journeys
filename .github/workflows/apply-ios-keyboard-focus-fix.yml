name: Apply iOS keyboard focus fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'fix/ios-keyboard-focus-stability' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply focus stability patch
        run: python tools/apply_ios_keyboard_focus_fix.py

      - name: Commit production changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart \
                  worker/keyboard_safe_writing_pages_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Focus stability patch already applied."
            exit 0
          fi
          git commit -m "fix: keep iPhone writing focus stable [ios-keyboard-focus]"
          git push origin HEAD:${{ github.head_ref }}
