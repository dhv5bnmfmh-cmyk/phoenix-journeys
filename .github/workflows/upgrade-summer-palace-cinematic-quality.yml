name: Upgrade Summer Palace cinematic quality

on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background
    paths:
      - .github/workflows/upgrade-summer-palace-cinematic-quality.yml

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Upgrade Summer Palace motion
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/widgets/destination_background.dart')
          source = path.read_text()
          start = source.index('class _SummerPalaceDynamicBackground extends StatefulWidget')
          end = source.index('class _JourneyBackgroundScrim', start)

          replacement = r'''class _SummerPalaceDynamicBackground extends StatefulWidget {
            const _SummerPalaceDynamicBackground({
              required this.assetPath,
              required this.scrimStrength,
              required this.child,
            });

            final String? assetPath;
            final double scrimStrength;
            final Widget child;

            @override
            State<_SummerPalaceDynamicBackground> createState() =>
                _SummerPalaceDynamicBackgroundState();
          }

          class _SummerPalaceDynamicBackgroundState
              extends State<_SummerPalaceDynamicBackground>
              with SingleTickerProviderStateMixin {
            late final AnimationController _motion;
            String? _preloadedAssetPath;

            @override
            void initState() {
              super.initState();
              _motion = AnimationController(
                vsync: this,
                duration: const Duration(seconds: 21),
              );
            }

            @override
            void didChangeDependencies() {
              super.didChangeDependencies();
              _syncMotionPreference();
              _preloadAsset();
            }

            @override
            void didUpdateWidget(covariant _SummerPalaceDynamicBackground oldWidget) {
              super.didUpdateWidget(oldWidget);
              if (oldWidget.assetPath != widget.assetPath) {
                _preloadedAssetPath = null;
                _preloadAsset();
              }
            }

            void _syncMotionPreference() {
              final reduceMotion = _destinationReduceMotion(context);
              if (reduceMotion) {
                _motion.stop();
                _motion.value = .44;
              } else if (!_motion.isAnimating) {
                _motion.value = .08;
                _motion.repeat(reverse: true);
              }
            }

            void _preloadAsset() {
              final path = widget.assetPath;
              if (path == null || path == _preloadedAssetPath) return;
              _preloadedAssetPath = path;
              precacheImage(AssetImage(path), context);
            }

            @override
            void dispose() {
              _motion.dispose();
              super.dispose();
            }

            @override
            Widget build(BuildContext context) {
              final reduceMotion = _destinationReduceMotion(context);
              return RepaintBoundary(
                key: const ValueKey('summer-palace-dynamic-background'),
                child: ClipRect(
                  child: Stack(
                    fit: StackFit.expand,
                    children: [
                      AnimatedBuilder(
                        animation: _motion,
                        builder: (context, _) {
                          final raw = reduceMotion ? .44 : _motion.value;
                          final progress = Curves.easeInOutSine.transform(raw);
                          return ExcludeSemantics(
                            child: Stack(
                              fit: StackFit.expand,
                              children: [
                                _SummerPalaceCameraLayer(
                                  assetPath: widget.assetPath,
                                  progress: progress,
                                ),
                                _SummerPalaceColorGrade(progress: progress),
                                _SummerPalaceCloudLight(progress: progress),
                                _SummerPalaceMistVeil(progress: progress),
                                _SummerPalaceWaterShimmer(progress: progress),
                                _SummerPalaceForegroundBreath(progress: progress),
                              ],
                            ),
                          );
                        },
                      ),
                      _JourneyBackgroundScrim(strength: widget.scrimStrength),
                      widget.child,
                    ],
                  ),
                ),
              );
            }
          }

          class _SummerPalaceCameraLayer extends StatelessWidget {
            const _SummerPalaceCameraLayer({
              required this.assetPath,
              required this.progress,
            });

            final String? assetPath;
            final double progress;

            @override
            Widget build(BuildContext context) {
              final path = assetPath;
              if (path == null) return const _BackgroundFallback();
              return RepaintBoundary(
                key: const ValueKey('summer-palace-camera-layer'),
                child: Transform.translate(
                  key: const ValueKey('summer-palace-camera-transform'),
                  offset: Offset(-9 + 18 * progress, -7 + 9 * progress),
                  child: Transform.scale(
                    scale: 1.045 + .045 * progress,
                    child: Image.asset(
                      path,
                      fit: BoxFit.cover,
                      filterQuality: FilterQuality.medium,
                      gaplessPlayback: true,
                      errorBuilder: (_, __, ___) => const _BackgroundFallback(),
                    ),
                  ),
                ),
              );
            }
          }

          class _SummerPalaceColorGrade extends StatelessWidget {
            const _SummerPalaceColorGrade({required this.progress});

            final double progress;

            @override
            Widget build(BuildContext context) {
              return IgnorePointer(
                child: DecoratedBox(
                  key: const ValueKey('summer-palace-cinematic-color-grade'),
                  decoration: BoxDecoration(
                    gradient: LinearGradient(
                      begin: Alignment.topLeft,
                      end: Alignment.bottomRight,
                      colors: [
                        const Color(0xFFFFE7B8).withValues(
                          alpha: .055 + .025 * progress,
                        ),
                        Colors.transparent,
                        const Color(0xFF163E42).withValues(
                          alpha: .035 + .02 * (1 - progress),
                        ),
                      ],
                      stops: const [0, .52, 1],
                    ),
                  ),
                ),
              );
            }
          }

          class _SummerPalaceCloudLight extends StatelessWidget {
            const _SummerPalaceCloudLight({required this.progress});

            final double progress;

            @override
            Widget build(BuildContext context) {
              return IgnorePointer(
                child: Align(
                  alignment: Alignment.topCenter,
                  child: FractionallySizedBox(
                    widthFactor: 1.7,
                    heightFactor: .72,
                    child: Transform.translate(
                      offset: Offset(-68 + 136 * progress, -12 + 10 * progress),
                      child: DecoratedBox(
                        key: const ValueKey('summer-palace-cloud-light'),
                        decoration: BoxDecoration(
                          gradient: RadialGradient(
                            center: Alignment(-.74 + 1.48 * progress, -.42),
                            radius: 1.12,
                            colors: [
                              Colors.white.withValues(alpha: .16),
                              const Color(0xFFFFDCA3).withValues(alpha: .09),
                              Colors.transparent,
                            ],
                            stops: const [0, .42, 1],
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }

          class _SummerPalaceMistVeil extends StatelessWidget {
            const _SummerPalaceMistVeil({required this.progress});

            final double progress;

            @override
            Widget build(BuildContext context) {
              return IgnorePointer(
                child: Align(
                  alignment: const Alignment(0, .18),
                  child: FractionallySizedBox(
                    widthFactor: 1.55,
                    heightFactor: .4,
                    child: Transform.translate(
                      offset: Offset(42 - 84 * progress, 2 + 4 * progress),
                      child: DecoratedBox(
                        key: const ValueKey('summer-palace-mist-veil'),
                        decoration: BoxDecoration(
                          gradient: LinearGradient(
                            begin: const Alignment(-1.2, -.1),
                            end: const Alignment(1.2, .15),
                            colors: [
                              Colors.transparent,
                              const Color(0xFFEAF3EF).withValues(alpha: .04),
                              Colors.white.withValues(alpha: .09),
                              const Color(0xFFDDEBE8).withValues(alpha: .035),
                              Colors.transparent,
                            ],
                            stops: const [0, .22, .5, .78, 1],
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }

          class _SummerPalaceWaterShimmer extends StatelessWidget {
            const _SummerPalaceWaterShimmer({required this.progress});

            final double progress;

            @override
            Widget build(BuildContext context) {
              return IgnorePointer(
                child: Align(
                  alignment: Alignment.bottomCenter,
                  child: FractionallySizedBox(
                    widthFactor: 1.5,
                    heightFactor: .56,
                    child: Transform.translate(
                      offset: Offset(70 - 140 * progress, 8 - 7 * progress),
                      child: DecoratedBox(
                        key: const ValueKey('summer-palace-water-shimmer'),
                        decoration: BoxDecoration(
                          gradient: RadialGradient(
                            center: Alignment(-.55 + 1.1 * progress, -.08),
                            radius: .95,
                            colors: [
                              const Color(0xFFFFE4B0).withValues(alpha: .115),
                              Colors.white.withValues(alpha: .055),
                              const Color(0xFFB9D9D5).withValues(alpha: .022),
                              Colors.transparent,
                            ],
                            stops: const [0, .3, .6, 1],
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }

          class _SummerPalaceForegroundBreath extends StatelessWidget {
            const _SummerPalaceForegroundBreath({required this.progress});

            final double progress;

            @override
            Widget build(BuildContext context) {
              return IgnorePointer(
                child: Align(
                  alignment: Alignment.bottomCenter,
                  child: FractionallySizedBox(
                    heightFactor: .46,
                    child: Transform.translate(
                      offset: Offset(0, 5 - 10 * progress),
                      child: Transform.scale(
                        alignment: Alignment.bottomCenter,
                        scale: 1 + .012 * progress,
                        child: DecoratedBox(
                          key: const ValueKey('summer-palace-foreground-breath'),
                          decoration: BoxDecoration(
                            gradient: LinearGradient(
                              begin: Alignment.topCenter,
                              end: Alignment.bottomCenter,
                              colors: [
                                Colors.transparent,
                                const Color(0xFF17382E).withValues(alpha: .035),
                                const Color(0xFF081C18).withValues(alpha: .12),
                              ],
                              stops: const [0, .58, 1],
                            ),
                          ),
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }

          '''

          source = source[:start] + replacement + source[end:]
          path.write_text(source)

          Path('worker/summer_palace_premium_motion_rule.test.mjs').write_text(r'''import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const source = readFileSync(
            'app/lib/widgets/destination_background.dart',
            'utf8',
          );
          const start = source.indexOf(
            'class _SummerPalaceDynamicBackground extends StatefulWidget',
          );
          const end = source.indexOf('class _JourneyBackgroundScrim', start);
          const summerPalace = source.slice(start, end);

          test('Summer Palace uses a slow premium cinematic cycle', () => {
            assert.match(summerPalace, /Duration\(seconds: 21\)/);
            assert.match(summerPalace, /repeat\(reverse: true\)/);
            assert.match(summerPalace, /Curves\.easeInOutSine/);
          });

          test('Summer Palace keeps layered depth without artificial ripple lines', () => {
            assert.match(summerPalace, /summer-palace-cinematic-color-grade/);
            assert.match(summerPalace, /summer-palace-mist-veil/);
            assert.match(summerPalace, /summer-palace-water-shimmer/);
            assert.match(summerPalace, /summer-palace-foreground-breath/);
            assert.match(summerPalace, /RadialGradient\(/);
            assert.doesNotMatch(summerPalace, /CustomPainter|drawLine\(|drawPath\(/);
          });

          test('Summer Palace motion respects reduced-motion mode', () => {
            assert.match(summerPalace, /_destinationReduceMotion\(context\)/);
            assert.match(summerPalace, /_motion\.stop\(\)/);
          });
          ''')
          PY

          rm -f .github/workflows/upgrade-summer-palace-cinematic-quality.yml
          dart format app/lib/widgets/destination_background.dart
          node --test worker/summer_palace_premium_motion_rule.test.mjs

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat: upgrade Summer Palace cinematic background quality'
          git push origin HEAD:feature/shanghai-bund-dynamic-background
