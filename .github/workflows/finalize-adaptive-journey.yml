name: Finalize adaptive journey lint

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: finalize-adaptive-journey
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.number == 97
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/adaptive-summer-palace
          fetch-depth: 0
      - name: Apply final lint fix and publish clean head
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('app/lib/data/journey_level_catalog.dart')
          text = path.read_text(encoding='utf-8')
          old = 'final summerPalaceChallengeLevel = JourneyLevelContent('
          new = 'final summerPalaceChallengeLevel = const JourneyLevelContent('
          if text.count(old) != 1:
              raise SystemExit(f'expected one challenge constructor, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/finalize-adaptive-journey.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: finalize adaptive journey content'
          git push origin HEAD:feature/adaptive-summer-palace
