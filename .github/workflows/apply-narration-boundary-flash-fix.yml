name: Apply narration boundary flash fix

# Retriggered through an isolated merge into the cinematic feature branch.
on:
  push:
    branches:
      - feature/cinematic-narration-reveal
    paths:
      - .github/workflows/apply-narration-boundary-flash-fix.yml

permissions:
  contents: write

concurrency:
  group: narration-boundary-flash-fix
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cinematic branch
        uses: actions/checkout@v6
        with:
          ref: feature/cinematic-narration-reveal
          fetch-depth: 0

      - name: Apply boundary flash fix
        run: |
          set -euo pipefail
          python3 tools/fix_narration_boundary_flash.py
          rm -f tools/fix_narration_boundary_flash.py
          rm -f .github/workflows/apply-narration-boundary-flash-fix.yml
          git diff --check

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/screens/journey_screen.dart \
            app/test/narration_progressive_reveal_test.dart

      - name: Test Phoenix rules
        run: node --test worker/*.test.mjs

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Publish clean fix commit
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: prevent narration boundary flash'
          git push origin HEAD:feature/cinematic-narration-reveal
