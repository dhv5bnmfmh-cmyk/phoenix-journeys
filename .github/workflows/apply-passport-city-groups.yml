name: Apply passport city collections

on:
  push:
    branches:
      - feat/two-level-journey-picker

permissions:
  contents: write

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, '[passport-grouped]')"
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feat/two-level-journey-picker
          fetch-depth: 0

      - name: Create city collection UI and connect Passport
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          passport = Path('app/lib/screens/passport_screen.dart')
          text = passport.read_text()

          import_anchor = "import '../data/daily_journey_catalog.dart';\n"
          import_replacement = (
              "import '../data/daily_journey_catalog.dart';\n"
              "import '../data/journey_city_catalog.dart';\n"
          )
          if "journey_city_catalog.dart" not in text:
              if import_anchor not in text:
                  raise SystemExit('Passport data import anchor not found')
              text = text.replace(import_anchor, import_replacement, 1)

          widget_anchor = "import '../widgets/journey_share_button.dart';\n"
          widget_replacement = (
              "import '../widgets/journey_share_button.dart';\n"
              "import '../widgets/passport_city_collection.dart';\n"
          )
          if "passport_city_collection.dart" not in text:
              if widget_anchor not in text:
                  raise SystemExit('Passport widget import anchor not found')
              text = text.replace(widget_anchor, widget_replacement, 1)

          old_list = """          Expanded(
            child: ListView.separated(
              physics: const BouncingScrollPhysics(),
              itemCount: dailyJourneyExperiences.length,
              separatorBuilder: (_, __) => const SizedBox(height: 8),
              itemBuilder: (context, index) {
                return _CityStampCard(
                  state: state,
                  journey: dailyJourneyExperiences[index],
                );
              },
            ),
          ),"""
          new_list = """          Expanded(
            child: ListView.separated(
              physics: const BouncingScrollPhysics(),
              itemCount: journeyCityCatalog.length,
              separatorBuilder: (_, __) => const SizedBox(height: 12),
              itemBuilder: (context, index) {
                final city = journeyCityCatalog[index];
                return PassportCityCollection(
                  state: state,
                  city: city,
                  destinationBuilder: (journey) => _CityStampCard(
                    state: state,
                    journey: journey,
                  ),
                );
              },
            ),
          ),"""
          if old_list not in text:
              raise SystemExit('Legacy Passport journey list not found')
          passport.write_text(text.replace(old_list, new_list, 1))

          Path('app/lib/widgets/passport_city_collection.dart').write_text(r'''import 'package:flutter/material.dart';

import '../data/daily_journey_catalog.dart';
import '../data/journey_city_catalog.dart';
import '../state/app_state.dart';
import '../theme/phoenix_theme.dart';

typedef PassportDestinationBuilder = Widget Function(
  DailyJourneyExperience journey,
);

class PassportCityCollection extends StatelessWidget {
  const PassportCityCollection({
    required this.state,
    required this.city,
    required this.destinationBuilder,
    super.key,
  });

  final AppState state;
  final JourneyCityCatalogEntry city;
  final PassportDestinationBuilder destinationBuilder;

  @override
  Widget build(BuildContext context) {
    final earnedCount = city.destinations
        .where((journey) => state.isJourneyStampEarned(journey.id))
        .length;
    final progress = city.destinationCount == 0
        ? 0.0
        : earnedCount / city.destinationCount;
    final active = state.activeJourney.cityId == city.id;
    final today = state.todayJourney.cityId == city.id;
    final completed =
        city.destinationCount > 0 && earnedCount == city.destinationCount;

    return Column(
      key: ValueKey('passport-city-${city.id}'),
      crossAxisAlignment: CrossAxisAlignment.stretch,
      children: [
        Container(
          padding: const EdgeInsets.fromLTRB(12, 10, 10, 9),
          decoration: BoxDecoration(
            gradient: LinearGradient(
              begin: Alignment.topLeft,
              end: Alignment.bottomRight,
              colors: active
                  ? const [Color(0xFF7B1E1E), Color(0xFFA83A32)]
                  : const [Color(0xFFF8EBD9), Color(0xFFFFF8EC)],
            ),
            borderRadius: BorderRadius.circular(18),
            border: Border.all(
              color: active
                  ? PhoenixTheme.red.withValues(alpha: .55)
                  : PhoenixTheme.gold.withValues(alpha: .45),
            ),
          ),
          child: Column(
            children: [
              Row(
                children: [
                  Container(
                    width: 38,
                    height: 38,
                    alignment: Alignment.center,
                    decoration: BoxDecoration(
                      color: active
                          ? Colors.white.withValues(alpha: .14)
                          : PhoenixTheme.red.withValues(alpha: .09),
                      borderRadius: BorderRadius.circular(12),
                    ),
                    child: Text(
                      city.cityCode,
                      style: TextStyle(
                        color: active ? Colors.white : PhoenixTheme.red,
                        fontSize: 9,
                        fontWeight: FontWeight.w900,
                      ),
                    ),
                  ),
                  const SizedBox(width: 9),
                  Expanded(
                    child: Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        Row(
                          children: [
                            Flexible(
                              child: Text(
                                state.displayText('${city.name}收藏册'),
                                maxLines: 1,
                                overflow: TextOverflow.ellipsis,
                                style: TextStyle(
                                  color: active ? Colors.white : Colors.black87,
                                  fontSize: 14.5,
                                  fontWeight: FontWeight.w900,
                                ),
                              ),
                            ),
                            if (today) ...[
                              const SizedBox(width: 6),
                              _CityBadge(
                                text: state.displayText('今日'),
                                active: active,
                              ),
                            ],
                          ],
                        ),
                        const SizedBox(height: 2),
                        Text(
                          state.displayText(
                            '${city.destinationCount} 个地点 · $earnedCount 枚印章',
                          ),
                          style: TextStyle(
                            color: active ? Colors.white70 : Colors.black54,
                            fontSize: 9.5,
                            fontWeight: FontWeight.w700,
                          ),
                        ),
                      ],
                    ),
                  ),
                  Container(
                    padding: const EdgeInsets.symmetric(
                      horizontal: 9,
                      vertical: 5,
                    ),
                    decoration: BoxDecoration(
                      color: active
                          ? Colors.white.withValues(alpha: .13)
                          : PhoenixTheme.gold.withValues(alpha: .14),
                      borderRadius: BorderRadius.circular(99),
                    ),
                    child: Row(
                      mainAxisSize: MainAxisSize.min,
                      children: [
                        Icon(
                          completed
                              ? Icons.verified_rounded
                              : Icons.auto_stories_rounded,
                          color: active
                              ? const Color(0xFFFFD879)
                              : PhoenixTheme.red,
                          size: 13,
                        ),
                        const SizedBox(width: 4),
                        Text(
                          '$earnedCount/${city.destinationCount}',
                          style: TextStyle(
                            color: active ? Colors.white : PhoenixTheme.red,
                            fontSize: 10,
                            fontWeight: FontWeight.w900,
                          ),
                        ),
                      ],
                    ),
                  ),
                ],
              ),
              const SizedBox(height: 8),
              ClipRRect(
                borderRadius: BorderRadius.circular(99),
                child: LinearProgressIndicator(
                  value: progress,
                  minHeight: 4,
                  color: active ? const Color(0xFFFFD879) : PhoenixTheme.red,
                  backgroundColor: active
                      ? Colors.white.withValues(alpha: .16)
                      : PhoenixTheme.gold.withValues(alpha: .18),
                ),
              ),
            ],
          ),
        ),
        const SizedBox(height: 6),
        for (var index = 0; index < city.destinations.length; index++) ...[
          if (index > 0) const SizedBox(height: 7),
          destinationBuilder(city.destinations[index]),
        ],
      ],
    );
  }
}

class _CityBadge extends StatelessWidget {
  const _CityBadge({required this.text, required this.active});

  final String text;
  final bool active;

  @override
  Widget build(BuildContext context) {
    return Container(
      padding: const EdgeInsets.symmetric(horizontal: 6, vertical: 2),
      decoration: BoxDecoration(
        color: active
            ? const Color(0xFFFFD879).withValues(alpha: .18)
            : PhoenixTheme.red.withValues(alpha: .08),
        borderRadius: BorderRadius.circular(99),
      ),
      child: Text(
        text,
        style: TextStyle(
          color: active ? const Color(0xFFFFD879) : PhoenixTheme.red,
          fontSize: 8,
          fontWeight: FontWeight.w900,
        ),
      ),
    );
  }
}
''')

          Path('app/test/passport_city_collection_test.dart').write_text(r'''import 'package:flutter/material.dart';
import 'package:flutter_test/flutter_test.dart';
import 'package:provider/provider.dart';
import 'package:shared_preferences/shared_preferences.dart';

import 'package:phoenix_journeys/data/journey_city_catalog.dart';
import 'package:phoenix_journeys/state/app_state.dart';
import 'package:phoenix_journeys/widgets/passport_city_collection.dart';

void main() {
  TestWidgetsFlutterBinding.ensureInitialized();

  setUp(() {
    SharedPreferences.setMockInitialValues(<String, Object>{});
  });

  testWidgets('Passport groups destination stamps under their city', (
    tester,
  ) async {
    final state = AppState(clock: () => DateTime(2026, 7, 22));
    await state.load();
    final beijing = requireJourneyCity('beijing');

    await tester.pumpWidget(
      ChangeNotifierProvider.value(
        value: state,
        child: MaterialApp(
          home: Scaffold(
            body: PassportCityCollection(
              state: state,
              city: beijing,
              destinationBuilder: (journey) => Text(
                journey.place,
                key: ValueKey('test-destination-${journey.id}'),
              ),
            ),
          ),
        ),
      ),
    );

    expect(find.byKey(const ValueKey('passport-city-beijing')), findsOneWidget);
    expect(find.text('北京收藏册'), findsOneWidget);
    expect(find.text('1 个地点 · 0 枚印章'), findsOneWidget);
    expect(
      find.byKey(const ValueKey('test-destination-beijing-forbidden-city')),
      findsOneWidget,
    );
  });
}
''')

          Path('worker/passport_city_collection_rule.test.mjs').write_text(r'''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const passport = readFileSync('app/lib/screens/passport_screen.dart', 'utf8');
const collection = readFileSync(
  'app/lib/widgets/passport_city_collection.dart',
  'utf8',
);

test('Passport renders one collection per city instead of one loose list', () => {
  assert.match(passport, /itemCount: journeyCityCatalog\.length/);
  assert.match(passport, /PassportCityCollection\(/);
  assert.match(passport, /destinationBuilder:/);
  assert.doesNotMatch(
    passport,
    /itemCount: dailyJourneyExperiences\.length,\n\s+separatorBuilder/,
  );
});

test('each city collection renders all destination stamp cards', () => {
  assert.match(collection, /city\.destinations\.length/);
  assert.match(collection, /destinationBuilder\(city\.destinations\[index\]\)/);
  assert.match(collection, /city\.destinationCount/);
  assert.match(collection, /earnedCount/);
});
''')
          PY

      - name: Set up Flutter for formatting
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format new Dart sources
        run: |
          dart format \
            app/lib/screens/passport_screen.dart \
            app/lib/widgets/passport_city_collection.dart \
            app/test/passport_city_collection_test.dart

      - name: Commit Passport city collections
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-passport-city-groups.yml
          git add \
            app/lib/screens/passport_screen.dart \
            app/lib/widgets/passport_city_collection.dart \
            app/test/passport_city_collection_test.dart \
            worker/passport_city_collection_rule.test.mjs
          git commit -m "feat: group Passport stamps by city [passport-grouped]"
          git push origin HEAD:feat/two-level-journey-picker