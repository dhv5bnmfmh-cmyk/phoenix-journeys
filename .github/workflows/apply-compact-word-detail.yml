name: Apply compact word detail

on:
  push:
    branches:
      - feature/compact-word-detail

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/compact-word-detail
          fetch-depth: 0

      - name: Compact word detail sheet
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/widgets/word_detail_sheet.dart')
          text = path.read_text()

          replacements = [
              ("        22,\n        4,\n        22,", "        18,\n        2,\n        18,"),
              ("WordMark(word: widget.entry.word, size: 64)", "WordMark(word: widget.entry.word, size: 56)"),
              ("const SizedBox(width: 14)", "const SizedBox(width: 10)"),
              ("fontSize: 17,", "fontSize: 15,"),
              ("const SizedBox(height: 7),\n                        Container(", "const SizedBox(height: 5),\n                        Container("),
              ("              const SizedBox(height: 22),\n              _DefinitionCard(", "              const SizedBox(height: 14),\n              _DefinitionCard("),
              ("              const SizedBox(height: 10),\n              _DefinitionCard(", "              const SizedBox(height: 7),\n              _DefinitionCard("),
              ("              const SizedBox(height: 22),\n              Row(", "              const SizedBox(height: 16),\n              Row("),
              ("      padding: const EdgeInsets.all(14),\n      decoration: BoxDecoration(\n        color: color.withValues(alpha: .07),\n        borderRadius: BorderRadius.circular(16),", "      padding: const EdgeInsets.symmetric(horizontal: 11, vertical: 10),\n      decoration: BoxDecoration(\n        color: color.withValues(alpha: .07),\n        borderRadius: BorderRadius.circular(14),"),
              ("                  fontSize: 12,", "                  fontSize: 11,"),
              ("          const SizedBox(height: 7),\n          Text(text, style: const TextStyle(height: 1.5)),", "          const SizedBox(height: 4),\n          Text(\n            text,\n            style: const TextStyle(fontSize: 13, height: 1.35),\n          ),"),
              ("      margin: const EdgeInsets.only(bottom: 10),\n      padding: const EdgeInsets.all(14),", "      margin: const EdgeInsets.only(bottom: 7),\n      padding: const EdgeInsets.symmetric(horizontal: 11, vertical: 10),"),
              ("        borderRadius: BorderRadius.circular(17),", "        borderRadius: BorderRadius.circular(14),"),
              ("                radius: 12,", "                radius: 10,"),
              ("                    fontSize: 10,", "                    fontSize: 9,"),
              ("              const SizedBox(width: 9),", "              const SizedBox(width: 7),"),
              ("                    fontSize: 15,\n                    fontWeight: FontWeight.w700,\n                    height: 1.45,", "                    fontSize: 14,\n                    fontWeight: FontWeight.w700,\n                    height: 1.32,"),
              ("          const SizedBox(height: 9),\n          _ExampleLine(label: '拼音', text: example.pinyin),\n          const SizedBox(height: 7),\n          _ExampleLine(label: nativeLabel, text: nativeText),\n          const SizedBox(height: 7),\n          _ExampleLine(label: 'English', text: example.english),", "          const SizedBox(height: 6),\n          _ExampleLine(label: '拼音', text: example.pinyin),\n          const SizedBox(height: 4),\n          _ExampleLine(label: nativeLabel, text: nativeText),\n          const SizedBox(height: 4),\n          _ExampleLine(label: 'English', text: example.english),"),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'Expected block not found: {old[:80]!r}')
              text = text.replace(old, new, 1)

          old_line = '''    return Column(
      crossAxisAlignment: CrossAxisAlignment.start,
      children: [
        Text(
          label,
          style: const TextStyle(
            color: Colors.black45,
            fontSize: 10,
            fontWeight: FontWeight.w900,
          ),
        ),
        const SizedBox(height: 2),
        Text(
          text,
          style: const TextStyle(
            color: Colors.black87,
            fontSize: 12.5,
            height: 1.45,
          ),
        ),
      ],
    );'''
          new_line = '''    return Row(
      crossAxisAlignment: CrossAxisAlignment.start,
      children: [
        Container(
          constraints: const BoxConstraints(minWidth: 42, maxWidth: 96),
          padding: const EdgeInsets.symmetric(horizontal: 6, vertical: 2),
          decoration: BoxDecoration(
            color: PhoenixTheme.ink.withValues(alpha: .055),
            borderRadius: BorderRadius.circular(7),
          ),
          child: Text(
            label,
            style: const TextStyle(
              color: Colors.black54,
              fontSize: 9.5,
              fontWeight: FontWeight.w900,
              height: 1.2,
            ),
          ),
        ),
        const SizedBox(width: 6),
        Expanded(
          child: Text(
            text,
            style: const TextStyle(
              color: Colors.black87,
              fontSize: 11.5,
              height: 1.32,
            ),
          ),
        ),
      ],
    );'''
          if old_line not in text:
              raise SystemExit('Example line block not found')
          path.write_text(text.replace(old_line, new_line, 1))
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/apply-compact-word-detail.yml

      - name: Commit compact word detail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/word_detail_sheet.dart .github/workflows/apply-compact-word-detail.yml
          git commit -m "ui: compact word detail translations and examples"
          git push origin HEAD:feature/compact-word-detail
