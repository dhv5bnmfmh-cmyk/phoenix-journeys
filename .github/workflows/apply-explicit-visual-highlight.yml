name: Apply explicit visual narration highlight

on:
  push:
    branches:
      - feature/explicit-visual-narration-highlight

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/explicit-visual-narration-highlight
          fetch-depth: 0

      - name: Apply explicit highlight patch
        run: python tools/apply_explicit_visual_highlight.py

      - uses: dart-lang/setup-dart@v1

      - name: Format changed Dart and test files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/interactive_story_text.dart app/lib/screens/journey_screen.dart app/test/widgets/interactive_story_text_visual_test.dart

      - name: Commit explicit visual highlight
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-explicit-visual-highlight.yml tools/apply_explicit_visual_highlight.py
          git add -A
          git commit -m "fix: paint narration highlight from explicit playback range"
          git push origin HEAD:feature/explicit-visual-narration-highlight
