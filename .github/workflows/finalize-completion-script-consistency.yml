name: Finalize completion script consistency

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

concurrency:
  group: finalize-completion-script-consistency
  cancel-in-progress: true

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'fix/global-script-surfaces'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/global-script-surfaces
          fetch-depth: 0

      - name: Convert completion-page labels through AppState
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/screens/journey_screen.dart')
          text = path.read_text(encoding='utf-8')
          replacements = [
              ("title: '${_experience.city}已点亮',", "title: _appState.displayText('${_experience.city}已点亮'),"),
              ("buttonText: '返回首页',", "buttonText: _appState.displayText('返回首页'),"),
              ("const Text(\n                  '盖章成功',", "Text(\n                  _appState.displayText('盖章成功'),"),
              ("const Text(\n                  '你完成的不是一堂课，而是一段旅程。',", "Text(\n                  _appState.displayText('你完成的不是一堂课，而是一段旅程。'),"),
              ("label: const Text(\n                            '重新体验',", "label: Text(\n                            _appState.displayText('重新体验'),"),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one completion label match, found {count}: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

          required = [
              "_appState.displayText('${_experience.city}已点亮')",
              "_appState.displayText('返回首页')",
              "_appState.displayText('盖章成功')",
              "_appState.displayText('你完成的不是一堂课，而是一段旅程。')",
              "_appState.displayText('重新体验')",
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f'missing converted label: {item}')
          PY

          rm -f .github/workflows/finalize-completion-script-consistency.yml
          git diff --check

      - name: Commit completion-page consistency
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: keep completion page in selected Chinese script'
          git push origin HEAD:fix/global-script-surfaces
