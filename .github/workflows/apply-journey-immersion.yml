name: Apply journey immersion

on:
  push:
    branches:
      - feature/immersive-journey-content
    paths:
      - '.github/workflows/apply-journey-immersion.yml'
      - 'tools/apply_immersion_patch.py'

permissions:
  contents: write

concurrency:
  group: apply-journey-immersion
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: feature/immersive-journey-content
          fetch-depth: 0

      - name: Apply immersive journey behavior
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_immersion_patch.py
          rm -f tools/apply_immersion_patch.py
          rm -f .github/workflows/apply-journey-immersion.yml
          node --test worker/journey_immersion_rule.test.mjs
          git diff --check

      - name: Commit immersive journey behavior
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add calm automatic journey immersion'
          git push origin HEAD:feature/immersive-journey-content
