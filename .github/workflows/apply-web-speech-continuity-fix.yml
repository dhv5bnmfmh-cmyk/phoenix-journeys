name: Apply web speech continuity fix

on:
  push:
    branches:
      - fix/web-speech-native-continuity

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'chore: run web speech continuity patch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: fix/web-speech-native-continuity
          fetch-depth: 0

      - name: Apply continuity patch
        run: python tools/apply_web_speech_continuity_fix.py

      - name: Commit patched code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart \
                  app/lib/widgets/narration_player_card.dart \
                  worker/web_speech_continuity_rule.test.mjs
          git commit -m "fix: use native Safari pause and resume [web-speech-patched]"
          git push origin HEAD:fix/web-speech-native-continuity
