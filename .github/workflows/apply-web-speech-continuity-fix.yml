name: Apply web speech continuity fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'fix/web-speech-native-continuity' && !contains(github.event.pull_request.head.sha, 'web-speech-patched') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply continuity patch
        run: python tools/apply_web_speech_continuity_fix.py

      - name: Commit patched code
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart \
                  app/lib/widgets/narration_player_card.dart \
                  worker/web_speech_continuity_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Patch already applied."
            exit 0
          fi
          git commit -m "fix: use native Safari pause and resume [web-speech-patched]"
          git push origin HEAD:${{ github.head_ref }}
