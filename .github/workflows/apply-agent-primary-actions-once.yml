name: Apply Agent primary actions once

on:
  push:
    branches:
      - feature/agent-primary-actions

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'chore: trigger agent primary action patch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: feature/agent-primary-actions
          fetch-depth: 0

      - name: Apply unified Agent actions
        run: python tools/apply_agent_primary_actions.py

      - name: Commit production changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart \
                  worker/agent_primary_action_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Agent primary actions already applied."
            exit 0
          fi
          git commit -m "feat: unify Agent and Continue actions [agent-primary-applied]"
          git push origin HEAD:feature/agent-primary-actions
