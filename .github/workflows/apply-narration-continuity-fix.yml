name: Apply narration continuity fix

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event.head_commit.message == 'chore: apply narration continuity patch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: python tools/apply_narration_continuity_fix.py
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart \
                  app/lib/widgets/narration_player_card.dart \
                  app/test/narration_resume_offset_test.dart \
                  worker/ios_narration_position_rule.test.mjs \
                  worker/narration_continuity_rule.test.mjs
          git commit -m "fix: keep narration position and sync progress"
          git push origin HEAD:main

# trigger: narration-continuity-v2
