name: Deploy immersive journey preview

on:
  push:
    branches:
      - feature/immersive-journey-final
    paths:
      - .github/workflows/deploy-immersive-preview.yml

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: deploy-immersive-journey-preview
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-92
  PREVIEW_URL: https://phoenix-journeys-pr-92.7hn5tyrjgh.workers.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out final immersion branch
        uses: actions/checkout@v6
        with:
          ref: feature/immersive-journey-final
          fetch-depth: 0

      - name: Remove one-time workflow and publish clean head
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/deploy-immersive-preview.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove one-time immersive preview workflow'
          git push origin HEAD:feature/immersive-journey-final
          echo "PREVIEW_RELEASE=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          set -euo pipefail
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          for attempt in $(seq 1 20); do
            body="$(curl -fsS "$health_url" || true)"
            if printf '%s' "$body" | grep -Fq "$PREVIEW_RELEASE"; then
              exit 0
            fi
            sleep 3
          done
          echo "Preview verification failed for ${PREVIEW_RELEASE}" >&2
          exit 1

      - name: Publish experience link
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          short_release="${PREVIEW_RELEASE:0:8}"
          body="<!-- phoenix-pr-preview -->
          ## Phoenix 独立体验版 ✅

          [打开 PR 体验链接](${PREVIEW_URL}/?unlock=all&v=${short_release})

          - PR：#92
          - Commit：\`${short_release}\`
          - 全部旅程已开放
          - 与正式版 main 完全隔离"
          gh api "repos/${GITHUB_REPOSITORY}/issues/92/comments" -f body="$body"
