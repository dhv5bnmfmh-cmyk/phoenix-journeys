name: Apply narration false-error guard

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/music-style-narration-controls
          fetch-depth: 0

      - name: Ignore false engine errors during an active Phoenix session
        shell: python
        run: |
          from pathlib import Path

          path = Path('app/lib/widgets/narration_player_card.dart')
          text = path.read_text()
          false_error_block = '''      if (widget.controller.status == NarrationStatus.error) {
                _positionClock?.cancel();
                setState(() {
                  _sessionPlaying = false;
                  _sessionPaused = false;
                });
                return;
              }

          '''
          if false_error_block not in text:
              raise SystemExit('False-error block not found')
          text = text.replace(false_error_block, '', 1)
          text = text.replace(
              '        final hasError = controllerStatus == NarrationStatus.error;',
              '''        final hasError = !_sessionPlaying &&
              !_sessionPaused &&
              controllerStatus == NarrationStatus.error;''',
              1,
          )
          path.write_text(text)

      - uses: dart-lang/setup-dart@v1
      - run: dart format app/lib/widgets/narration_player_card.dart

      - name: Commit guard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/narration_player_card.dart
          git commit -m "fix: ignore false Safari TTS errors while audio is active"
          git push origin HEAD:feature/music-style-narration-controls
