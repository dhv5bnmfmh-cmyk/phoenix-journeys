name: Apply Shanghai boat fix

on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Apply one-way boat motion
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/widgets/destination_background.dart')
          text = path.read_text()
          start = text.index('class _ShanghaiBundDynamicBackground extends StatefulWidget')
          end = text.index('class _SummerPalaceDynamicBackground extends StatefulWidget')
          before, bund, after = text[:start], text[start:end], text[end:]

          bund = bund.replace(
              '      _motion.repeat(reverse: true);',
              '      _motion.repeat();',
              1,
          )
          bund = bund.replace(
              '                final progress = Curves.easeInOutSine.transform(raw);',
              """                final sceneProgress = Curves.easeInOutSine.transform(
                  raw <= .5 ? raw * 2 : (1 - raw) * 2,
                );
                final boatProgress = reduceMotion ? 1.0 : raw;""",
              1,
          )
          bund = bund.replace('progress: progress,', 'progress: sceneProgress,', 1)
          bund = bund.replace(
              '_ShanghaiBundSkylineGlow(progress: progress),\n                      _ShanghaiBundRiverLight(progress: progress),\n                      _ShanghaiBundBoatShadow(progress: progress),',
              '_ShanghaiBundSkylineGlow(progress: sceneProgress),\n                      _ShanghaiBundRiverLight(progress: sceneProgress),\n                      _ShanghaiBundBoatShadow(progress: boatProgress),',
              1,
          )
          bund = bund.replace(
              """        builder: (context, constraints) {
          final travel = constraints.maxWidth + 110;
          return Stack(
            fit: StackFit.expand,
            children: [
              Positioned(
                left: -74 + travel * progress,
                bottom: constraints.maxHeight * .2,
                child: Opacity(
                  opacity: .48,
                  child: Transform.scale(
                    scale: .76 + .05 * progress,""",
              """        builder: (context, constraints) {
          const startAt = .08;
          const finishAt = .68;
          final isVisible = progress >= startAt && progress <= finishAt;
          final passage = ((progress - startAt) / (finishAt - startAt))
              .clamp(0.0, 1.0);
          final travel = constraints.maxWidth + 110;
          final fadeIn = (passage / .14).clamp(0.0, 1.0);
          final fadeOut = ((1 - passage) / .14).clamp(0.0, 1.0);
          final opacity = isVisible
              ? .44 * (fadeIn < fadeOut ? fadeIn : fadeOut)
              : 0.0;
          return Stack(
            fit: StackFit.expand,
            children: [
              Positioned(
                left: -74 + travel * Curves.easeInOut.transform(passage),
                bottom: constraints.maxHeight * .2,
                child: Opacity(
                  opacity: opacity,
                  child: Transform.scale(
                    scale: .76 + .05 * passage,""",
              1,
          )
          path.write_text(before + bund + after)

          test = Path('worker/shanghai_bund_motion.test.mjs')
          t = test.read_text()
          t = t.replace(
              '  assert.match(bund, /_motion\\.repeat\\(reverse: true\\)/);',
              """  assert.match(bund, /_motion\\.repeat\\(\\)/);
  assert.match(bund, /final sceneProgress/);
  assert.match(bund, /final boatProgress/);
  assert.match(bund, /const startAt = \\.08/);
  assert.match(bund, /const finishAt = \\.68/);""",
              1,
          )
          test.write_text(t)
          PY

      - name: Format and commit
        run: |
          dart format app/lib/widgets/destination_background.dart || true
          rm .github/workflows/apply-shanghai-boat-fix.yml
          rm -f .github/workflows/fix-shanghai-boat-direction.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/destination_background.dart worker/shanghai_bund_motion.test.mjs .github/workflows
          git commit -m "fix: make Shanghai boat travel one way"
          git push origin HEAD:feature/shanghai-bund-dynamic-background
