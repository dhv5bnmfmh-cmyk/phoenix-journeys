name: Apply journey planner once

on:
  push:
    branches:
      - feature/journey-planner

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[planner-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: feature/journey-planner
          fetch-depth: 0

      - name: Apply journey planner
        run: python tools/apply_journey_planner_patch.py

      - name: Commit production changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/state/app_state.dart \
                  app/lib/screens/explore_screen.dart \
                  app/test/journey_plan_state_test.dart \
                  worker/journey_plan_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Journey planner already applied."
            exit 0
          fi
          git commit -m "feat: add a persistent Beijing journey plan [planner-applied]"
          git push origin HEAD:feature/journey-planner
