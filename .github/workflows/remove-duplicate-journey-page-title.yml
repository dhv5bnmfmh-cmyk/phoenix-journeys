name: Remove duplicate journey page title

on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background

permissions:
  contents: write

concurrency:
  group: remove-duplicate-journey-page-title
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Remove shared duplicate page title
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/screens/journey_screen.dart')
          source = path.read_text()
          start_marker = '''              SizedBox(
                height: keyboardVisible ? 26 : null,
                child: Row(
                  children: [
                    Expanded(
                      child: Text(
                        title,'''
          start = source.find(start_marker)
          if start < 0:
              if 'PhoenixTheme.journeyTitleStyle.copyWith' not in source:
                  print('Duplicate page title already removed')
              else:
                  raise SystemExit('Unable to locate duplicate page title block')
          else:
              end_marker = '''              SizedBox(height: keyboardVisible ? 3 : (compact ? 4 : 6)),
              Expanded(child: child),'''
              end = source.find(end_marker, start)
              if end < 0:
                  raise SystemExit('Unable to locate duplicate page title block end')
              replacement = '''              Expanded(child: child),'''
              source = source[:start] + replacement + source[end + len(end_marker):]
              path.write_text(source)

          test_path = Path('worker/no_duplicate_journey_page_title.test.mjs')
          test_path.write_text("""import test from 'node:test';
          import assert from 'node:assert/strict';
          import { readFileSync } from 'node:fs';

          const source = readFileSync('app/lib/screens/journey_screen.dart', 'utf8');
          const start = source.indexOf('Widget _page({');
          const end = source.indexOf('int? _narrationRevealEnd', start);
          const pageChrome = source.slice(start, end);

          test('journey progress header is the only shared page label', () => {
            assert.match(pageChrome, /JourneyProgressHeader\(/);
            assert.doesNotMatch(pageChrome, /PhoenixTheme\.journeyTitleStyle/);
            assert.doesNotMatch(pageChrome, /Text\(\s*title/);
          });

          test('all journey pages continue using the shared page shell', () => {
            for (const title of ['故事', '单词', '发现', '思考', '表达', '旅程回忆']) {
              assert.match(source, new RegExp(`title: '${title}'`));
            }
          });
          """)
          PY

          dart format app/lib/screens/journey_screen.dart
          node --test worker/no_duplicate_journey_page_title.test.mjs

          if git diff --quiet; then
            echo 'No changes required'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app/lib/screens/journey_screen.dart \
            worker/no_duplicate_journey_page_title.test.mjs
          git diff --cached --check
          git commit -m 'fix: remove duplicate journey page titles'
          git push origin HEAD:feature/shanghai-bund-dynamic-background
