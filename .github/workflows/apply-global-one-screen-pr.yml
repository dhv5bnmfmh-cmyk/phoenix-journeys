name: Apply global one-screen layout

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/global-one-screen-layout' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/global-one-screen-layout
          fetch-depth: 0

      - name: Apply global one-screen migration
        run: python3 tools/apply_global_one_screen.py

      - uses: dart-lang/setup-dart@v1

      - name: Format Dart files
        run: |
          dart format \
            app/lib/screens/explore_screen.dart \
            app/lib/screens/journey_screen.dart \
            app/lib/screens/passport_screen.dart \
            app/lib/screens/me_screen.dart \
            app/lib/widgets/compact_pager.dart

      - name: Remove one-time migration files
        run: |
          rm tools/apply_global_one_screen.py
          rm .github/workflows/apply-global-one-screen-pr.yml

      - name: Commit global one-screen layout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ui: enforce one-screen layout across Phoenix"
          git push origin HEAD:feature/global-one-screen-layout
