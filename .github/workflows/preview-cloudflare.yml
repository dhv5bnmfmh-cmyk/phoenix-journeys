name: Cloudflare PR Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  pull-requests: write
  statuses: write

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-${{ github.event.pull_request.number }}
  PREVIEW_URL: https://phoenix-journeys-pr-${{ github.event.pull_request.number }}.7hn5tyrjgh.workers.dev
  PREVIEW_RELEASE: ${{ github.event.pull_request.head.sha }}

jobs:
  deploy-preview:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          verified="false"

          for attempt in {1..18}; do
            response="$(curl --fail --silent --show-error "$health_url" || true)"
            echo "Preview release check ${attempt}/18: ${response:-no response}"

            if node -e '
              let health;
              try {
                health = JSON.parse(process.argv[1]);
              } catch (_) {
                process.exit(1);
              }
              const expectedRelease = process.argv[2];
              if (!health.ok ||
                  !health.ai ||
                  health.service !== "phoenix-journeys" ||
                  health.release !== expectedRelease) {
                process.exit(1);
              }
            ' "$response" "$PREVIEW_RELEASE"; then
              verified="true"
              break
            fi

            sleep 5
          done

          if [[ "$verified" != "true" ]]; then
            echo "Phoenix PR preview did not propagate the expected release."
            exit 1
          fi

      - name: Publish preview status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload="$(node -e '
            const [url] = process.argv.slice(1);
            process.stdout.write(JSON.stringify({
              state: "success",
              description: "Isolated Phoenix preview is ready",
              context: "cloudflare/preview",
              target_url: url
            }));
          ' "$PREVIEW_URL")"

          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${PREVIEW_RELEASE}" \
            --data "$payload"

      - name: Add or update preview comment
        uses: actions/github-script@v7
        env:
          PHOENIX_PREVIEW_URL: ${{ env.PREVIEW_URL }}
          PHOENIX_PREVIEW_RELEASE: ${{ env.PREVIEW_RELEASE }}
        with:
          script: |
            const marker = '<!-- phoenix-pr-preview -->';
            const shortRelease = process.env.PHOENIX_PREVIEW_RELEASE.slice(0, 8);
            const body = `${marker}\n## Phoenix 独立体验版 ✅\n\n[打开 PR 体验链接](${process.env.PHOENIX_PREVIEW_URL}/?v=${shortRelease})\n\n- PR：#${context.issue.number}\n- Commit：\`${shortRelease}\`\n- 与正式版 main 完全隔离\n- 只有确认通过后才会合并上线`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  remove-preview:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Delete isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Cloudflare credentials unavailable; preview cleanup skipped."
            exit 0
          fi
          printf 'y\n' | npx --yes wrangler@4 delete --name "$PREVIEW_WORKER" || true
