name: Apply Journey location binding

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply-location-binding:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker' &&
      !contains(github.event.pull_request.head.label, '[location-bound]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply canonical Journey location binding
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          payload = ''
          source = gzip.decompress(base64.b64decode(payload))
          exec(compile(source, 'apply_location_binding.py', 'exec'))
          PY

      - name: Set up Flutter for formatting
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format location-bound Dart files
        run: |
          dart format \
            app/lib/services/journey_location_binding.dart \
            app/lib/data/daily_journey_experience.dart \
            app/lib/state/app_state.dart \
            app/lib/widgets/destination_background.dart \
            app/lib/services/journey_background_policy.dart \
            app/lib/screens/explore_screen.dart \
            app/test/journey_location_binding_test.dart \
            app/test/journey_background_policy_test.dart

      - name: Commit canonical location binding
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout origin/main -- .github/workflows/preview-cloudflare.yml
          git add \
            .github/workflows/preview-cloudflare.yml \
            app/lib/services/journey_location_binding.dart \
            app/lib/data/daily_journey_experience.dart \
            app/lib/state/app_state.dart \
            app/lib/widgets/destination_background.dart \
            app/lib/services/journey_background_policy.dart \
            app/lib/screens/explore_screen.dart \
            app/test/journey_location_binding_test.dart \
            app/test/journey_background_policy_test.dart \
            worker/journey_location_binding_rule.test.mjs
          git commit -m "feat: bind map backgrounds and records to location paths [location-bound]"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
