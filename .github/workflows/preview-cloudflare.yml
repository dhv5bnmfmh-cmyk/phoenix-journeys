name: Cloudflare PR Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-${{ github.event.pull_request.number }}
  PREVIEW_URL: https://phoenix-journeys-pr-${{ github.event.pull_request.number }}.7hn5tyrjgh.workers.dev
  PREVIEW_RELEASE: ${{ github.event.pull_request.head.sha }}

jobs:
  deploy-preview:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Prepare approved Summer Palace archive
        if: >-
          github.event.pull_request.number == 85 &&
          github.event.pull_request.head.ref == 'fix/summer-palace-background-refresh'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/summer-palace
          gh api "repos/$GITHUB_REPOSITORY/contents/.github/sp-upload-q10/chunk_00?ref=$PREVIEW_RELEASE" --jq '.content' \
            | tr -d '\n' \
            | base64 --decode > /tmp/summer-palace-archive.b64
          tr -d '\r\n ' < /tmp/summer-palace-archive.b64 \
            | base64 --decode > /tmp/summer-palace.tar.gz
          echo "Archive bytes: $(wc -c < /tmp/summer-palace.tar.gz)"
          tar -tzf /tmp/summer-palace.tar.gz
          tar -xzf /tmp/summer-palace.tar.gz -C /tmp/summer-palace

      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install approved Summer Palace backgrounds
        if: >-
          github.event.pull_request.number == 85 &&
          github.event.pull_request.head.ref == 'fix/summer-palace-background-refresh'
        shell: bash
        run: |
          set -euo pipefail
          target='app/assets/images/backgrounds/generated/beijing/summer-palace'
          expected=(
            01-dawn-kunming-lake.webp
            02-morning-long-corridor.webp
            03-misty-longevity-hill.webp
            04-bright-seventeen-arch-bridge.webp
            05-after-rain-pavilion.webp
            06-summer-lotus-lake.webp
            07-autumn-west-dike.webp
            08-golden-hour-tower.webp
            09-blue-hour-reflection.webp
            10-moonlit-lake-panorama.webp
          )
          mkdir -p "$target"
          rm -f "$target"/*.webp
          for name in "${expected[@]}"; do
            source_file="$(find /tmp/summer-palace -type f -name "$name" -print -quit)"
            test -n "$source_file"
            cp "$source_file" "$target/$name"
            test "$(head -c 4 "$target/$name")" = 'RIFF'
            test "$(dd if="$target/$name" bs=1 skip=8 count=4 status=none)" = 'WEBP'
            test "$(wc -c < "$target/$name")" -ge 20000
          done
          test "$(find "$target" -maxdepth 1 -name '*.webp' | wc -l)" -eq 10

          rm -rf .github/sp-upload .github/sp-upload-q5 .github/sp-upload-q10
          rm -rf .github/sp400-upload .github/sp400b-upload
          rm -f .github/direct-import-marker.txt
          rm -f .github/workflows/import-summer-palace-backgrounds.yml
          rm -f .github/workflows/import-refined-summer-palace-backgrounds.yml
          rm -f .github/workflows/finalize-summer-palace-backgrounds.yml
          rm -f .github/workflows/refresh-summer-palace-backgrounds.yml
          git checkout origin/main -- .github/workflows/preview-cloudflare.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: install approved Summer Palace background set'
          git push origin HEAD:fix/summer-palace-background-refresh

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          verified="false"
          for attempt in {1..18}; do
            response="$(curl --fail --silent --show-error "$health_url" || true)"
            echo "Preview release check ${attempt}/18: ${response:-no response}"
            if node -e '
              let health;
              try { health = JSON.parse(process.argv[1]); } catch (_) { process.exit(1); }
              const expectedRelease = process.argv[2];
              if (!health.ok || !health.ai || health.service !== "phoenix-journeys" || health.release !== expectedRelease) process.exit(1);
            ' "$response" "$PREVIEW_RELEASE"; then
              verified="true"
              break
            fi
            sleep 5
          done
          test "$verified" = 'true'

      - name: Publish preview status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload="$(node -e '
            const [url] = process.argv.slice(1);
            process.stdout.write(JSON.stringify({state:"success",description:"Isolated Phoenix preview is ready",context:"cloudflare/preview",target_url:url}));
          ' "$PREVIEW_URL")"
          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${PREVIEW_RELEASE}" \
            --data "$payload"

      - name: Add or update preview comment
        uses: actions/github-script@v7
        env:
          PHOENIX_PREVIEW_URL: ${{ env.PREVIEW_URL }}
          PHOENIX_PREVIEW_RELEASE: ${{ env.PREVIEW_RELEASE }}
        with:
          script: |
            const marker = '<!-- phoenix-pr-preview -->';
            const shortRelease = process.env.PHOENIX_PREVIEW_RELEASE.slice(0, 8);
            const body = `${marker}\n## Phoenix 独立体验版 ✅\n\n[打开 PR 体验链接](${process.env.PHOENIX_PREVIEW_URL}/?v=${shortRelease})\n\n- PR：#${context.issue.number}\n- Commit：\`${shortRelease}\`\n- 与正式版 main 完全隔离\n- 只有确认通过后才会合并上线`;
            const comments = await github.paginate(github.rest.issues.listComments, {owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, per_page: 100});
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            }

  remove-preview:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Delete isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Cloudflare credentials unavailable; preview cleanup skipped."
            exit 0
          fi
          printf 'y\n' | npx --yes wrangler@4 delete --name "$PREVIEW_WORKER" || true
