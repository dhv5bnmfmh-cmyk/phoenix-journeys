name: Cloudflare PR Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-${{ github.event.pull_request.number }}
  PREVIEW_URL: https://phoenix-journeys-pr-${{ github.event.pull_request.number }}.7hn5tyrjgh.workers.dev
  PREVIEW_RELEASE: ${{ github.event.pull_request.head.sha }}

jobs:
  apply-saved-vocabulary-fix:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply vocabulary persistence and layout fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected pattern not found in {path}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              'app/lib/data/daily_journey_catalog.dart',
              """  ...extendedJourneyExperiences,\n];\n\nDailyJourneyExperience requireDailyJourneyExperience(String id) {""",
              """  ...extendedJourneyExperiences,\n];\n\nfinal List<WordEntry> allDailyJourneyWords = List<WordEntry>.unmodifiable(\n  <String, WordEntry>{\n    for (final journey in dailyJourneyExperiences)\n      for (final entry in journey.words) entry.word: entry,\n  }.values,\n);\n\nDailyJourneyExperience requireDailyJourneyExperience(String id) {""",
          )

          replace_once(
              'app/lib/screens/me_screen.dart',
              """import '../data/journey_data.dart';\n""",
              """import '../data/daily_journey_catalog.dart';\nimport '../data/journey_data.dart';\n""",
          )
          replace_once(
              'app/lib/screens/me_screen.dart',
              """    final savedEntries = words\n        .where((entry) => state.savedWords.contains(entry.word))\n        .toList(growable: false);""",
              """    final savedEntries = allDailyJourneyWords\n        .where((entry) => state.savedWords.contains(entry.word))\n        .toList(growable: false);""",
          )

          replace_once(
              'app/lib/widgets/word_detail_sheet.dart',
              """                      label: Text(\n                        state.displayText(isSaved ? '已收藏' : '收藏生词'),\n                        style: const TextStyle(fontSize: 11),\n                      ),""",
              """                      label: FittedBox(\n                        fit: BoxFit.scaleDown,\n                        child: Text(\n                          state.displayText(isSaved ? '已收藏' : '收藏生词'),\n                          maxLines: 1,\n                          softWrap: false,\n                          style: const TextStyle(fontSize: 11),\n                        ),\n                      ),""",
          )

          Path('app/test/saved_vocabulary_library_test.dart').write_text(r'''import 'package:flutter/material.dart';
import 'package:flutter_test/flutter_test.dart';
import 'package:provider/provider.dart';
import 'package:shared_preferences/shared_preferences.dart';

import 'package:phoenix_journeys/data/daily_journey_catalog.dart';
import 'package:phoenix_journeys/screens/me_screen.dart';
import 'package:phoenix_journeys/state/app_state.dart';

void main() {
  TestWidgetsFlutterBinding.ensureInitialized();

  setUp(() {
    SharedPreferences.setMockInitialValues(<String, Object>{});
  });

  test('the shared vocabulary library contains words from every journey', () {
    final catalogWords = allDailyJourneyWords.map((entry) => entry.word).toSet();

    for (final journey in dailyJourneyExperiences) {
      for (final entry in journey.words) {
        expect(catalogWords, contains(entry.word));
      }
    }
    expect(catalogWords, contains('牌坊'));
    expect(catalogWords.length, allDailyJourneyWords.length);
  });

  testWidgets('a saved Nanjing word appears in My Vocabulary', (tester) async {
    final state = AppState(clock: () => DateTime(2026, 7, 21));
    await state.load();
    await state.toggleSavedWord('牌坊');

    await tester.pumpWidget(
      ChangeNotifierProvider.value(
        value: state,
        child: const MaterialApp(home: Scaffold(body: MeScreen())),
      ),
    );
    await tester.pumpAndSettle();

    expect(find.text('我的生词 · 1'), findsOneWidget);
    expect(find.text('牌坊'), findsOneWidget);
  });
}
''')

          Path('worker/saved_vocabulary_rule.test.mjs').write_text(r'''import test from 'node:test';
import assert from 'node:assert/strict';
import { readFileSync } from 'node:fs';

const catalog = readFileSync('app/lib/data/daily_journey_catalog.dart', 'utf8');
const meScreen = readFileSync('app/lib/screens/me_screen.dart', 'utf8');
const wordSheet = readFileSync('app/lib/widgets/word_detail_sheet.dart', 'utf8');

test('My Vocabulary uses the shared seven-city vocabulary catalog', () => {
  assert.match(catalog, /allDailyJourneyWords/);
  assert.match(catalog, /for \(final journey in dailyJourneyExperiences\)/);
  assert.match(meScreen, /final savedEntries = allDailyJourneyWords/);
  assert.doesNotMatch(meScreen, /final savedEntries = words\n/);
});

test('the save-vocabulary label is permanently constrained to one line', () => {
  assert.match(wordSheet, /state\.displayText\(isSaved \? '已收藏' : '收藏生词'\)/);
  assert.match(wordSheet, /maxLines: 1/);
  assert.match(wordSheet, /softWrap: false/);
  assert.match(wordSheet, /fit: BoxFit\.scaleDown/);
});
''')
          PY

      - name: Set up Flutter for formatting
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format changed Dart files
        working-directory: app
        run: dart format lib/data/daily_journey_catalog.dart lib/screens/me_screen.dart lib/widgets/word_detail_sheet.dart test/saved_vocabulary_library_test.dart

      - name: Commit fix and remove temporary workflow changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout HEAD^ -- .github/workflows/preview-cloudflare.yml
          git checkout 364022d1174a66c9a232c835c8ab511bfff352ca -- .github/workflows/flutter-ci.yml
          git rm -f .github/workflows/fix-saved-vocabulary-once.yml
          git add .github/workflows/preview-cloudflare.yml .github/workflows/flutter-ci.yml app/lib/data/daily_journey_catalog.dart app/lib/screens/me_screen.dart app/lib/widgets/word_detail_sheet.dart app/test/saved_vocabulary_library_test.dart worker/saved_vocabulary_rule.test.mjs
          git commit -m "fix: save vocabulary across every journey"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  deploy-preview:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          verified="false"

          for attempt in {1..18}; do
            response="$(curl --fail --silent --show-error "$health_url" || true)"
            echo "Preview release check ${attempt}/18: ${response:-no response}"

            if node -e '
              let health;
              try {
                health = JSON.parse(process.argv[1]);
              } catch (_) {
                process.exit(1);
              }
              const expectedRelease = process.argv[2];
              if (!health.ok ||
                  !health.ai ||
                  health.service !== "phoenix-journeys" ||
                  health.release !== expectedRelease) {
                process.exit(1);
              }
            ' "$response" "$PREVIEW_RELEASE"; then
              verified="true"
              break
            fi

            sleep 5
          done

          if [[ "$verified" != "true" ]]; then
            echo "Phoenix PR preview did not propagate the expected release."
            exit 1
          fi

      - name: Publish preview status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          payload="$(node -e '
            const [url] = process.argv.slice(1);
            process.stdout.write(JSON.stringify({
              state: "success",
              description: "Isolated Phoenix preview is ready",
              context: "cloudflare/preview",
              target_url: url
            }));
          ' "$PREVIEW_URL")"

          curl --fail --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GITHUB_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${PREVIEW_RELEASE}" \
            --data "$payload"

      - name: Add or update preview comment
        uses: actions/github-script@v7
        env:
          PHOENIX_PREVIEW_URL: ${{ env.PREVIEW_URL }}
          PHOENIX_PREVIEW_RELEASE: ${{ env.PREVIEW_RELEASE }}
        with:
          script: |
            const marker = '<!-- phoenix-pr-preview -->';
            const shortRelease = process.env.PHOENIX_PREVIEW_RELEASE.slice(0, 8);
            const body = `${marker}\n## Phoenix 独立体验版 ✅\n\n[打开 PR 体验链接](${process.env.PHOENIX_PREVIEW_URL}/?v=${shortRelease})\n\n- PR：#${context.issue.number}\n- Commit：\`${shortRelease}\`\n- 与正式版 main 完全隔离\n- 只有确认通过后才会合并上线`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  remove-preview:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Delete isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [[ -z "$CLOUDFLARE_API_TOKEN" || -z "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "Cloudflare credentials unavailable; preview cleanup skipped."
            exit 0
          fi
          printf 'y\n' | npx --yes wrangler@4 delete --name "$PREVIEW_WORKER" || true
