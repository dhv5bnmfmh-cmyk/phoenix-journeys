name: Apply PhoenixNarrationAgent integration

on:
  push:
    branches:
      - feature/interrupt-story-with-word

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/interrupt-story-with-word
          fetch-depth: 0

      - name: Connect story vocabulary to narration Agent
        run: |
          python3 - <<'PY'
          from pathlib import Path

          journey = Path('app/lib/screens/journey_screen.dart')
          text = journey.read_text()
          text = text.replace(
              'late final NarrationController _narration;',
              'late final PhoenixNarrationAgent _narration;',
          )
          text = text.replace(
              '_narration = NarrationController();',
              '_narration = PhoenixNarrationAgent();',
          )
          old = '''  Future<void> _openWord(WordEntry entry) async {
            await _narration.stop();
            if (!mounted) return;
            await showWordDetail(context, entry);
          }'''
          new = '''  Future<void> _openWord(WordEntry entry) async {
            final pronunciation =
                _narration.pronounceWordAndResume(entry.word);
            if (!mounted) return;
            await showWordDetail(context, entry, autoSpeak: false);
            await pronunciation;
          }'''
          if old not in text:
              raise SystemExit('Journey _openWord block not found')
          journey.write_text(text.replace(old, new))

          sheet = Path('app/lib/widgets/word_detail_sheet.dart')
          text = sheet.read_text()
          text = text.replace(
              'Future<void> showWordDetail(BuildContext context, WordEntry entry) {',
              'Future<void> showWordDetail(\n  BuildContext context,\n  WordEntry entry, {\n  bool autoSpeak = true,\n}) {',
          )
          text = text.replace(
              'builder: (_) => _WordDetailSheet(entry: entry),',
              'builder: (_) => _WordDetailSheet(\n      entry: entry,\n      autoSpeak: autoSpeak,\n    ),',
          )
          text = text.replace(
              'const _WordDetailSheet({required this.entry});',
              'const _WordDetailSheet({\n    required this.entry,\n    required this.autoSpeak,\n  });',
          )
          text = text.replace(
              'final WordEntry entry;\n',
              'final WordEntry entry;\n  final bool autoSpeak;\n',
              1,
          )
          old = '''    WidgetsBinding.instance.addPostFrameCallback((_) {
              unawaited(_speak());
            });'''
          new = '''    if (widget.autoSpeak) {
              WidgetsBinding.instance.addPostFrameCallback((_) {
                unawaited(_speak());
              });
            }'''
          if old not in text:
              raise SystemExit('Word detail auto-speak block not found')
          sheet.write_text(text.replace(old, new))
          PY

      - name: Remove temporary patch workflow
        run: rm .github/workflows/apply-narration-agent-patch.yml

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart app/lib/widgets/word_detail_sheet.dart .github/workflows/apply-narration-agent-patch.yml
          git commit -m "feat: route vocabulary interruptions through PhoenixNarrationAgent"
          git push origin HEAD:feature/interrupt-story-with-word
