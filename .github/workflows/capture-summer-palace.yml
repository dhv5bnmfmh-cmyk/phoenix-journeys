name: Capture Summer Palace verification

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  capture-summer-palace:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install image generator
        run: python3 -m pip install --quiet pillow

      - name: Reapply Summer Palace integration
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/add-summer-palace.yml').read_text()
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Set up Flutter"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          source = workflow[start:end]
          source = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in source.splitlines()
          )
          exec(compile(source, 'summer_palace_integration.py', 'exec'))
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/data/summer_palace_journey.dart \
            app/lib/data/daily_journey_catalog.dart \
            app/lib/data/world_geo_catalog.dart \
            app/lib/data/journey_background_generated.dart \
            app/test/journey_city_catalog_test.dart \
            app/test/journey_background_policy_test.dart

      - name: Capture full verification output
        shell: bash
        run: |
          set +e
          node --test worker/*.test.mjs > summer-palace-verify.log 2>&1
          agent_status=$?
          (
            cd app
            flutter analyze
          ) >> summer-palace-verify.log 2>&1
          analyze_status=$?
          (
            cd app
            flutter test
          ) >> summer-palace-verify.log 2>&1
          test_status=$?
          printf '\nAGENT_EXIT_CODE=%s\nANALYZE_EXIT_CODE=%s\nTEST_EXIT_CODE=%s\n' \
            "$agent_status" "$analyze_status" "$test_status" >> summer-palace-verify.log
          cat summer-palace-verify.log
          exit 0

      - name: Commit integration and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/add-summer-palace.yml
          git rm .github/workflows/capture-summer-palace.yml
          git add -A
          git commit -m "chore: capture Summer Palace destination verification"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
