name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Flutter web release
        working-directory: app
        run: flutter build web --release

      - name: Validate Worker bundle
        run: npx --yes wrangler@4 deploy --dry-run --outdir .wrangler-dry-run

      - name: Check Cloudflare credentials
        id: cloudflare_credentials
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare deployment skipped: add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID as repository secrets."
          fi

      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare_credentials.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy

      - name: Verify production Agent health
        if: steps.cloudflare_credentials.outputs.ready == 'true'
        shell: bash
        run: |
          health_url="https://phoenix-journeys-alpha.7hn5tyrjgh.workers.dev/api/health?commit=${GITHUB_SHA}"
          response="$(curl --fail --silent --show-error --retry 5 --retry-delay 3 "$health_url")"
          echo "$response"
          node -e '
            const health = JSON.parse(process.argv[1]);
            if (!health.ok || !health.ai || health.service !== "phoenix-journeys") {
              console.error("Phoenix Agent health check failed", health);
              process.exit(1);
            }
          ' "$response"
