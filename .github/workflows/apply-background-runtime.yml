name: Apply background runtime

on:
  push:
    branches:
      - feature/seven-day-journey-library
    paths:
      - worker/run-background-runtime.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out writable branch
        uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0

      - name: Install seed renderer
        run: python -m pip install pillow

      - name: Generate original seed backgrounds
        run: python tools/generate_seed_backgrounds.py

      - name: Patch Flutter runtime
        run: |
          python tools/patch_background_home.py
          python tools/patch_background_explore.py
          python tools/patch_background_journey.py

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format and validate
        working-directory: app
        run: |
          dart format lib/models/journey_background.dart lib/data/journey_background_catalog.dart lib/data/journey_background_generated.dart lib/services/journey_background_policy.dart lib/widgets/destination_background.dart lib/screens/home_shell.dart lib/screens/explore_screen.dart lib/screens/journey_screen.dart test/journey_background_policy_test.dart
          flutter pub get
          flutter analyze
          flutter test
          flutter build web --release

      - name: Validate background agents
        run: node --test worker/*.test.mjs

      - name: Remove installer and commit
        shell: bash
        run: |
          rm -f \
            .github/workflows/apply-background-runtime.yml \
            worker/run-background-runtime.txt \
            tools/generate_seed_backgrounds.py \
            tools/patch_background_home.py \
            tools/patch_background_explore.py \
            tools/patch_background_journey.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: add destination background agents and daily rotation'
          git push origin HEAD:feature/seven-day-journey-library
