name: Apply single TTS narration fix

on:
  push:
    branches:
      - fix/compact-nav-single-tts

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/compact-nav-single-tts
          fetch-depth: 0

      - name: Route word speech through NarrationController
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          controller_path = Path('app/lib/services/narration_controller.dart')
          controller = controller_path.read_text()

          controller = controller.replace(
              'enum NarrationStatus { idle, playing, paused, error }\n',
              'enum NarrationStatus { idle, playing, paused, error }\n\n'
              'enum _NarrationSpeechMode { idle, narration, word }\n',
              1,
          )

          field_anchor = '''  DateTime? _lastNativeProgressAt;\n'''
          field_replacement = '''  DateTime? _lastNativeProgressAt;
  _NarrationSpeechMode _speechMode = _NarrationSpeechMode.idle;
  bool _suppressEngineCallbacks = false;
  DateTime? _ignoreEngineCallbacksUntil;
  bool _isSpeakingWord = false;
  bool _wordSpeechUnavailable = false;
  String? _spokenWord;
  Completer<bool>? _wordSpeechCompleter;
'''
          if field_anchor not in controller:
              raise SystemExit('Narration fields anchor not found')
          controller = controller.replace(field_anchor, field_replacement, 1)

          getter_anchor = '''  int get totalCharacters => _plan.text.length;\n'''
          getter_replacement = '''  int get totalCharacters => _plan.text.length;
  bool get isSpeakingWord => _isSpeakingWord;
  bool get wordSpeechUnavailable => _wordSpeechUnavailable;
  String? get spokenWord => _spokenWord;
'''
          if getter_anchor not in controller:
              raise SystemExit('Narration getters anchor not found')
          controller = controller.replace(getter_anchor, getter_replacement, 1)

          new_handlers = '''  bool get _shouldIgnoreEngineCallback {
    if (_suppressEngineCallbacks) return true;
    final until = _ignoreEngineCallbacksUntil;
    return until != null && DateTime.now().isBefore(until);
  }

  void _bindHandlers() {
    _tts.setStartHandler(() {
      if (_shouldIgnoreEngineCallback) return;
      if (_speechMode == _NarrationSpeechMode.word) {
        _isSpeakingWord = true;
        _wordSpeechUnavailable = false;
        _safeNotify();
        return;
      }
      if (_speechMode != _NarrationSpeechMode.narration) return;
      _status = NarrationStatus.playing;
      _errorMessage = null;
      _startProgressClock(_currentOffset);
      _safeNotify();
    });
    _tts.setCompletionHandler(() {
      if (_shouldIgnoreEngineCallback) return;
      if (_speechMode == _NarrationSpeechMode.word) {
        _finishWordSpeech(success: true);
        return;
      }
      if (_speechMode != _NarrationSpeechMode.narration) return;
      _cancelProgressClock();
      _speechMode = _NarrationSpeechMode.idle;
      _status = NarrationStatus.idle;
      _currentOffset = _plan.text.length;
      _currentItemIndex = null;
      NarrationHighlightBus.instance.clear(contentId: _contentId);
      _safeNotify();
    });
    _tts.setCancelHandler(() {
      if (_shouldIgnoreEngineCallback) return;
      if (_speechMode == _NarrationSpeechMode.word) {
        _finishWordSpeech(success: true);
        return;
      }
      if (_status == NarrationStatus.paused ||
          _speechMode != _NarrationSpeechMode.narration) {
        return;
      }
      _cancelProgressClock();
      _speechMode = _NarrationSpeechMode.idle;
      _status = NarrationStatus.idle;
      _currentItemIndex = null;
      NarrationHighlightBus.instance.clear(contentId: _contentId);
      _safeNotify();
    });
    _tts.setProgressHandler((wordText, startOffset, endOffset, word) {
      if (_shouldIgnoreEngineCallback ||
          _speechMode != _NarrationSpeechMode.narration) {
        return;
      }
      final globalStart = _speechBaseOffset + startOffset;
      final globalEnd = _speechBaseOffset + endOffset;
      _lastNativeProgressAt = DateTime.now();
      _estimateAnchorTime = _lastNativeProgressAt;
      _estimateAnchorOffset = globalStart;
      _applyProgress(
        globalStart,
        endOffset: globalEnd,
        word: word.isNotEmpty ? word : wordText,
      );
    });
    _tts.setErrorHandler((message) {
      if (_speechMode == _NarrationSpeechMode.word) {
        debugPrint('Word narration error: $message');
        _finishWordSpeech(success: false);
        return;
      }
      _cancelProgressClock();
      _speechMode = _NarrationSpeechMode.idle;
      _status = NarrationStatus.error;
      _errorMessage = '当前设备暂时无法朗读，请检查声音设置后重试。';
      _currentItemIndex = null;
      NarrationHighlightBus.instance.clear(contentId: _contentId);
      debugPrint('Narration error: $message');
      _safeNotify();
    });
  }
'''
          controller, count = re.subn(
              r'  void _bindHandlers\(\) \{.*?\n  \}\n\n  Future<void> play\(',
              new_handlers + '\n  Future<void> play(',
              controller,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Narration handlers block not replaced')

          pause_resume_word = '''  Future<void> pause() async {
    if (_status != NarrationStatus.playing) return;

    _status = NarrationStatus.paused;
    _cancelProgressClock();
    _safeNotify();
    await _stopSpeechEngine();

    if (_disposed) return;
    _status = NarrationStatus.paused;
    _safeNotify();
  }

  Future<void> resume() async {
    if (_status != NarrationStatus.paused || _plan.isEmpty) return;

    final offset = _currentOffset >= _plan.text.length ? 0 : _currentOffset;
    await _speakFrom(offset);
  }

  Future<bool> speakWord(
    String word, {
    required String languageCode,
  }) async {
    final value = word.trim();
    if (value.isEmpty || _disposed) return false;

    if (_status == NarrationStatus.playing) {
      await pause();
    }
    await _stopSpeechEngine();
    if (_disposed) return false;

    _speechMode = _NarrationSpeechMode.word;
    _spokenWord = value;
    _isSpeakingWord = true;
    _wordSpeechUnavailable = false;
    final completer = Completer<bool>();
    _wordSpeechCompleter = completer;
    _safeNotify();

    try {
      await _tts.setLanguage(languageCode);
      await _tts.setSpeechRate(.42);
      await _tts.setPitch(1.0);
      await _tts.setVolume(1.0);
      final result = await _tts.speak(value);
      if (result != 1) {
        _finishWordSpeech(success: false);
      }
    } catch (error) {
      debugPrint('Unable to pronounce $value: $error');
      _finishWordSpeech(success: false);
    }

    try {
      return await completer.future.timeout(const Duration(seconds: 8));
    } on TimeoutException {
      await _stopSpeechEngine();
      return false;
    }
  }
'''
          controller, count = re.subn(
              r'  Future<void> pause\(\) async \{.*?\n  \}\n\n  Future<void> resume\(\) async \{.*?\n  \}',
              pause_resume_word,
              controller,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Pause/resume block not replaced')

          new_stop = '''  Future<void> stop({bool resetPosition = true}) async {
    _cancelProgressClock();
    _status = NarrationStatus.idle;
    _errorMessage = null;
    _currentItemIndex = null;
    NarrationHighlightBus.instance.clear(contentId: _contentId);
    if (resetPosition) {
      _currentOffset = 0;
      _speechBaseOffset = 0;
    }
    _safeNotify();

    await _stopSpeechEngine();
    if (_disposed) return;
    _status = NarrationStatus.idle;
    _currentItemIndex = null;
    _safeNotify();
  }
'''
          controller, count = re.subn(
              r'  Future<void> stop\(\{bool resetPosition = true\}\) async \{.*?\n  \}\n\n  Future<void> _speakFrom',
              new_stop + '\n  Future<void> _speakFrom',
              controller,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Stop block not replaced')

          new_speak_and_helpers = '''  Future<void> _speakFrom(int offset) async {
    final safeOffset = offset < 0
        ? 0
        : offset >= _plan.text.length
            ? 0
            : offset;
    final remainingText = _plan.text.substring(safeOffset);

    try {
      _cancelProgressClock();
      await _stopSpeechEngine();
      if (_disposed) return;

      _speechMode = _NarrationSpeechMode.narration;
      _speechBaseOffset = safeOffset;
      _currentOffset = safeOffset;
      _currentItemIndex = _plan.indexForOffset(safeOffset);
      _status = NarrationStatus.playing;
      _errorMessage = null;
      _startProgressClock(safeOffset);
      _applyProgress(safeOffset);
      _safeNotify();

      await _tts.setLanguage('zh-CN');
      await _tts.setSpeechRate(_speechRate);
      await _tts.setPitch(1.0);
      await _tts.setVolume(1.0);
      final result = await _tts.speak(remainingText);
      if (result != 1 && !_disposed) {
        _cancelProgressClock();
        _speechMode = _NarrationSpeechMode.idle;
        _status = NarrationStatus.error;
        _errorMessage = '没有找到可用的中文语音，请换用 Safari 或 Chrome 重试。';
        _currentItemIndex = null;
        NarrationHighlightBus.instance.clear(contentId: _contentId);
        _safeNotify();
      }
    } catch (error, stackTrace) {
      debugPrint('Unable to start narration: $error');
      debugPrintStack(stackTrace: stackTrace);
      if (_disposed) return;
      _cancelProgressClock();
      _speechMode = _NarrationSpeechMode.idle;
      _status = NarrationStatus.error;
      _errorMessage = '朗读启动失败，请检查设备音量或浏览器权限。';
      _currentItemIndex = null;
      NarrationHighlightBus.instance.clear(contentId: _contentId);
      _safeNotify();
    }
  }

  void _finishWordSpeech({required bool success}) {
    _isSpeakingWord = false;
    _wordSpeechUnavailable = !success;
    _spokenWord = null;
    _speechMode = _NarrationSpeechMode.idle;
    final completer = _wordSpeechCompleter;
    _wordSpeechCompleter = null;
    if (completer != null && !completer.isCompleted) {
      completer.complete(success);
    }
    _safeNotify();
  }

  Future<void> _stopSpeechEngine() async {
    _suppressEngineCallbacks = true;
    _ignoreEngineCallbacksUntil =
        DateTime.now().add(const Duration(milliseconds: 120));
    try {
      await _tts.stop();
      await Future<void>.delayed(const Duration(milliseconds: 30));
    } catch (error) {
      debugPrint('Unable to stop speech engine: $error');
    } finally {
      _suppressEngineCallbacks = false;
    }

    if (_speechMode == _NarrationSpeechMode.word) {
      _finishWordSpeech(success: true);
    } else {
      _speechMode = _NarrationSpeechMode.idle;
      _isSpeakingWord = false;
      _spokenWord = null;
    }
  }
'''
          controller, count = re.subn(
              r'  Future<void> _speakFrom\(int offset\) async \{.*?\n  \}\n\n  void _startProgressClock',
              new_speak_and_helpers + '\n  void _startProgressClock',
              controller,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('_speakFrom block not replaced')

          controller_path.write_text(controller)

          word_path = Path('app/lib/widgets/word_detail_sheet.dart')
          word = word_path.read_text()
          word = word.replace("import 'package:flutter_tts/flutter_tts.dart';\n", '', 1)

          word, count = re.subn(
              r'Future<void> showWordDetail\(BuildContext context, WordEntry entry\) \{.*?\n\}',
              '''Future<void> showWordDetail(
  BuildContext context,
  WordEntry entry, {
  required Future<bool> Function() onSpeak,
}) {
  return showModalBottomSheet<void>(
    context: context,
    showDragHandle: true,
    isScrollControlled: true,
    useSafeArea: true,
    builder: (_) => _WordDetailSheet(entry: entry, onSpeak: onSpeak),
  );
}''',
              word,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('showWordDetail signature not replaced')

          word = word.replace(
              '''class _WordDetailSheet extends StatefulWidget {
  const _WordDetailSheet({required this.entry});

  final WordEntry entry;
''',
              '''class _WordDetailSheet extends StatefulWidget {
  const _WordDetailSheet({required this.entry, required this.onSpeak});

  final WordEntry entry;
  final Future<bool> Function() onSpeak;
''',
              1,
          )

          word_state = '''class _WordDetailSheetState extends State<_WordDetailSheet> {
  bool _isSpeaking = false;
  bool _speechUnavailable = false;

  @override
  void initState() {
    super.initState();
    WidgetsBinding.instance.addPostFrameCallback((_) {
      if (mounted) unawaited(_speak());
    });
  }

  Future<void> _speak() async {
    if (_isSpeaking) return;
    setState(() {
      _isSpeaking = true;
      _speechUnavailable = false;
    });

    final success = await widget.onSpeak();
    if (!mounted) return;
    setState(() {
      _isSpeaking = false;
      _speechUnavailable = !success;
    });
  }

'''
          word, count = re.subn(
              r'class _WordDetailSheetState extends State<_WordDetailSheet> \{.*?\n  @override\n  Widget build',
              word_state + '  @override\n  Widget build',
              word,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('Word detail speech state not replaced')
          word_path.write_text(word)

          journey_path = Path('app/lib/screens/journey_screen.dart')
          journey = journey_path.read_text()
          new_open_word = '''  Future<void> _openWord(WordEntry entry) async {
    final shouldResume = _narration.status == NarrationStatus.playing;
    if (shouldResume) {
      await _narration.pause();
    }
    if (!mounted) return;

    await showWordDetail(
      context,
      entry,
      onSpeak: () => _narration.speakWord(
        _appState.displayText(entry.word),
        languageCode: _appState.isTraditional ? 'zh-TW' : 'zh-CN',
      ),
    );
    if (!mounted || !shouldResume) return;

    await _narration.resume();
  }

  bool _isNarrating'''
          journey, count = re.subn(
              r'  Future<void> _openWord\(WordEntry entry\) async \{.*?\n\s*\}\n\n\s*bool _isNarrating',
              new_open_word,
              journey,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit('_openWord block not replaced')
          journey_path.write_text(journey)
          PY

      - name: Format changed Dart files
        run: dart format app/lib/services/narration_controller.dart app/lib/widgets/word_detail_sheet.dart app/lib/screens/journey_screen.dart

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-single-tts-fix.yml

      - name: Commit single TTS fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart app/lib/widgets/word_detail_sheet.dart app/lib/screens/journey_screen.dart .github/workflows/apply-single-tts-fix.yml
          git commit -m "fix: share one TTS engine and resume narration reliably"
          git push origin HEAD:fix/compact-nav-single-tts
