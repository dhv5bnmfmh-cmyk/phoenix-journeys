name: Apply narration layout stability fix

on:
  push:
    branches:
      - feature/summer-palace-parallax-background
    paths:
      - .github/workflows/apply-narration-layout-stability-fix.yml

permissions:
  contents: write

concurrency:
  group: narration-layout-stability-fix
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/summer-palace-parallax-background
          fetch-depth: 0

      - name: Apply stable narration chrome fix
        run: |
          set -euo pipefail
          python3 tools/fix_narration_chrome_stability.py
          rm -f tools/fix_narration_chrome_stability.py
          rm -f .github/workflows/apply-narration-layout-stability-fix.yml
          git diff --check

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed Dart files
        run: |
          dart format \
            app/lib/screens/journey_screen.dart \
            app/lib/widgets/interactive_story_text.dart

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build web release
        working-directory: app
        run: flutter build web --release

      - name: Publish clean fix commit
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: keep narration side controls layout-stable'
          git push origin HEAD:feature/summer-palace-parallax-background
