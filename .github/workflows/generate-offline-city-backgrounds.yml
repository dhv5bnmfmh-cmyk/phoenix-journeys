name: Generate offline city backgrounds

on:
  push:
    branches:
      - feature/complete-seven-city-background-library
    paths:
      - .github/scripts/generate_offline_city_backgrounds.py
      - .github/workflows/generate-offline-city-backgrounds.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: phoenix-real-webp-backgrounds
  cancel-in-progress: true

jobs:
  generate-and-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: feature/complete-seven-city-background-library
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install image encoder
        run: python -m pip install --disable-pip-version-check pillow==11.3.0

      - name: Generate seventy real WebP files
        run: python .github/scripts/generate_offline_city_backgrounds.py

      - name: Verify generated inventory
        shell: bash
        run: |
          test "$(find app/assets/images/backgrounds/generated -maxdepth 1 -name '*.webp' | wc -l)" -eq 70
          test "$(grep -c '^assets/images/backgrounds/generated/.*\.webp$' app/assets/images/backgrounds/generated/manifest.txt)" -eq 70
          grep -q "assetPath: 'assets/images/backgrounds/generated/" app/lib/data/journey_background_generated.dart
          if grep -q 'svgData:' app/lib/data/journey_background_generated.dart; then
            echo 'SVG background data must not remain.'
            exit 1
          fi

      - name: Commit generated image library
        shell: bash
        run: |
          git config user.name 'phoenix-background-librarian[bot]'
          git config user.email 'phoenix-background-librarian[bot]@users.noreply.github.com'
          git add app/assets/images/backgrounds/generated app/lib/data/journey_background_generated.dart
          if git diff --cached --quiet; then
            echo 'WebP library already current.'
            exit 0
          fi
          git commit -m 'content: import seventy real offline WebP backgrounds'
          git push origin HEAD:feature/complete-seven-city-background-library
