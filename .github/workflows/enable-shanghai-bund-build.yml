name: Enable Shanghai Bund build

on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background

permissions:
  contents: write

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/shanghai-bund-dynamic-background
          fetch-depth: 0

      - name: Enable push trigger
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/build-shanghai-bund-motion.yml')
          text = path.read_text()
          old = """on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
"""
          new = """on:
  push:
    branches:
      - feature/shanghai-bund-dynamic-background
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
"""
          if old not in text:
              raise SystemExit('workflow trigger marker missing')
          text = text.replace(old, new, 1)
          text = text.replace(
              "    if: github.head_ref == 'feature/shanghai-bund-dynamic-background'",
              "    if: github.event_name == 'push' || github.head_ref == 'feature/shanghai-bund-dynamic-background'",
              1,
          )
          path.write_text(text)
          PY
          rm .github/workflows/enable-shanghai-bund-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-shanghai-bund-motion.yml .github/workflows/enable-shanghai-bund-build.yml
          git commit -m "chore: enable Shanghai Bund motion build"
          git push origin HEAD:feature/shanghai-bund-dynamic-background
