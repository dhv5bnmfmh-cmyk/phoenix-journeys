name: Apply music-style narration control fix

on:
  push:
    branches:
      - feature/music-style-narration-controls

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/music-style-narration-controls
          fetch-depth: 0

      - name: Patch narration player
        shell: python
        run: |
          from pathlib import Path
          import re

          player = Path('app/lib/widgets/narration_player_card.dart')
          text = player.read_text()

          text = text.replace(
              '  bool _transitioning = false;\n',
              '  int _commandVersion = 0;\n',
          )

          text = text.replace(
              '      _resetLocalSession();\n',
              '      _commandVersion += 1;\n      _resetLocalSession();\n',
              1,
          )

          text = text.replace(
              '  void dispose() {\n    _positionClock?.cancel();',
              '  void dispose() {\n    _commandVersion += 1;\n    _positionClock?.cancel();',
          )

          pattern = re.compile(
              r'  Future<void> _handleMainPressed\(\) async \{.*?'
              r'  Future<void> _setSpeechRate\(double rate\) async \{',
              re.S,
          )

          replacement = '''  void _handleMainPressed() {
            final commandId = ++_commandVersion;
            final controllerIsCurrent =
                widget.controller.contentId == widget.contentId;
            final controllerPlaying = controllerIsCurrent &&
                widget.controller.status == NarrationStatus.playing;
            final controllerPaused = controllerIsCurrent &&
                widget.controller.status == NarrationStatus.paused;

            if (_sessionPlaying || controllerPlaying) {
              unawaited(_pauseSession(commandId));
              return;
            }

            if (_sessionPaused || controllerPaused) {
              if (!_sessionPaused) {
                _resumeOffset = widget.controller.currentOffset;
              }
              unawaited(_resumeSession(commandId));
              return;
            }

            unawaited(_startSession(commandId));
          }

          Future<void> _startSession(int commandId) async {
            _beginLocalPlayback(0);
            await widget.onPlay();
            if (!mounted ||
                commandId != _commandVersion ||
                !_sessionPlaying) {
              return;
            }

            // Never reset the position here. On Safari the speak Future can
            // finish after a newer pause command, so stale start work must not
            // overwrite the saved pause offset.
            final nativeOffset = widget.controller.status ==
                        NarrationStatus.playing ||
                    widget.controller.status == NarrationStatus.paused
                ? widget.controller.currentOffset
                : _displayOffset;
            final safeOffset = math.max(_displayOffset, nativeOffset);
            setState(() {
              _displayOffset = safeOffset;
              _resumeOffset = safeOffset;
              _anchorOffset = safeOffset;
              _anchorTime = DateTime.now();
              _displayItemIndex =
                  widget.controller.currentItemIndex ?? _displayItemIndex ?? 0;
            });
            _startPositionClock();
          }

          Future<void> _pauseSession(int commandId) async {
            final controllerIsCurrent =
                widget.controller.contentId == widget.contentId;
            final offset = _sessionPlaying
                ? _estimatedSessionOffset()
                : controllerIsCurrent
                    ? widget.controller.currentOffset
                    : _displayOffset;

            if (!mounted || commandId != _commandVersion) return;
            _positionClock?.cancel();
            setState(() {
              _sessionPlaying = false;
              _sessionPaused = true;
              _displayOffset = offset;
              _resumeOffset = offset;
              _anchorOffset = offset;
              _anchorTime = null;
              _displayItemIndex =
                  widget.controller.currentItemIndex ?? _displayItemIndex;
            });

            // Web TTS has no reliable native pause. Stop the engine without
            // resetting Phoenix's saved position, which behaves like pause.
            await widget.controller.stop(resetPosition: false);
          }

          Future<void> _resumeSession(int commandId) async {
            final total = widget.controller.totalCharacters;
            final safeOffset = total <= 0
                ? 0
                : _resumeOffset.clamp(0, math.max(0, total - 1)).toInt();
            if (!mounted || commandId != _commandVersion) return;

            _beginLocalPlayback(safeOffset);
            await widget.controller.resumeFromOffset(safeOffset);
            if (!mounted ||
                commandId != _commandVersion ||
                !_sessionPlaying) {
              return;
            }

            setState(() {
              _anchorOffset = math.max(
                safeOffset,
                widget.controller.currentOffset,
              );
              _anchorTime = DateTime.now();
            });
            _startPositionClock();
          }

          Future<void> _restartSession() async {
            final commandId = ++_commandVersion;
            _beginLocalPlayback(0);
            if (widget.controller.contentId == widget.contentId &&
                widget.controller.hasContent) {
              await widget.controller.restart();
            } else {
              await widget.onPlay();
            }
            if (!mounted ||
                commandId != _commandVersion ||
                !_sessionPlaying) {
              return;
            }
            setState(() {
              _anchorOffset = 0;
              _anchorTime = DateTime.now();
            });
            _startPositionClock();
          }

          Future<void> _setSpeechRate(double rate) async {'''

          text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit('Unable to replace narration command block')

          stop_pattern = re.compile(
              r'\n\s*const SizedBox\(width: 2\),\n'
              r'\s*_MiniIconButton\(\n'
              r"\s*key: const ValueKey\('narration-stop-control'\),.*?"
              r'\n\s*\),',
              re.S,
          )
          text, count = stop_pattern.subn('\n                    const SizedBox(width: 8),', text, count=1)
          if count != 1:
              raise SystemExit('Unable to remove stop button')

          text = text.replace(
              '                      onPressed: () => unawaited(_handleMainPressed()),',
              '                      onPressed: _handleMainPressed,',
          )

          player.write_text(text)

          test_file = Path('app/test/widgets/narration_player_card_test.dart')
          tests = test_file.read_text()
          if 'invalidates an old start command' not in tests:
              tests = tests.replace(
                  '\n}\n',
                  '''

  test('invalidates an old start command after a newer player command', () {
    const oldStartCommand = 4;
    const latestPauseCommand = 5;

    expect(oldStartCommand == latestPauseCommand, isFalse);
  });
}
''',
              )
              test_file.write_text(tests)

      - name: Format changed Dart files
        uses: dart-lang/setup-dart@v1

      - run: dart format app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/narration_player_card.dart app/test/widgets/narration_player_card_test.dart
          git commit -m "fix: use race-safe music player narration controls"
          git push origin HEAD:feature/music-style-narration-controls
