name: Complete Summer Palace vocabulary pack

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  complete-summer-palace-vocabulary:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Add complete offline vocabulary examples
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('app/lib/data/summer_palace_journey.dart')
          text = path.read_text()

          replacements = {
              "    englishDefinition: 'a reflection in water or a mirror',\n    symbol: '🪞',":
              "    englishDefinition: 'a reflection in water or a mirror',\n"
              "    examples: const [\n"
              "      WordExample(\n"
              "        chinese: '昆明湖里有万寿山的倒影。',\n"
              "        pinyin: 'Kūnmíng Hú lǐ yǒu Wànshòu Shān de dàoyǐng.',\n"
              "        vietnamese: 'Trong hồ Côn Minh có hình phản chiếu của núi Vạn Thọ.',\n"
              "        english: 'Longevity Hill is reflected in Kunming Lake.',\n"
              "      ),\n"
              "    ],\n"
              "    symbol: '🪞',",
              "    englishDefinition: 'to blend or integrate into a whole',\n    symbol: '🧩',":
              "    englishDefinition: 'to blend or integrate into a whole',\n"
              "    examples: const [\n"
              "      WordExample(\n"
              "        chinese: '颐和园把山水和建筑融合在一起。',\n"
              "        pinyin: 'Yíhéyuán bǎ shānshuǐ hé jiànzhù rónghé zài yìqǐ.',\n"
              "        vietnamese: 'Di Hòa Viên hòa quyện cảnh quan núi nước với kiến trúc.',\n"
              "        english: 'The Summer Palace blends landscape and architecture together.',\n"
              "      ),\n"
              "    ],\n"
              "    symbol: '🧩',",
              "    englishDefinition: 'borrowed scenery in landscape design',\n    symbol: '🔭',":
              "    englishDefinition: 'borrowed scenery in landscape design',\n"
              "    examples: const [\n"
              "      WordExample(\n"
              "        chinese: '设计者用借景的方法把远山带进园林。',\n"
              "        pinyin: 'Shèjìzhě yòng jièjǐng de fāngfǎ bǎ yuǎnshān dài jìn yuánlín.',\n"
              "        vietnamese: 'Người thiết kế dùng phương pháp mượn cảnh để đưa núi xa vào khu vườn.',\n"
              "        english: 'The designer used borrowed scenery to bring distant hills into the garden.',\n"
              "      ),\n"
              "    ],\n"
              "    symbol: '🔭',",
              "    englishDefinition: 'beautiful scenery of lakes and mountains',\n    symbol: '🌄',":
              "    englishDefinition: 'beautiful scenery of lakes and mountains',\n"
              "    examples: const [\n"
              "      WordExample(\n"
              "        chinese: '站在长廊边可以欣赏湖光山色。',\n"
              "        pinyin: 'Zhàn zài Chángláng biān kěyǐ xīnshǎng húguāng shānsè.',\n"
              "        vietnamese: 'Đứng bên Trường Lang có thể thưởng ngoạn cảnh hồ và núi.',\n"
              "        english: 'From the Long Corridor, visitors can enjoy the lake-and-mountain scenery.',\n"
              "      ),\n"
              "    ],\n"
              "    symbol: '🌄',",
          }

          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Vocabulary insertion point not found: {old}')
              text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format vocabulary content
        run: dart format app/lib/data/summer_palace_journey.dart

      - name: Verify completed destination
        run: |
          node --test worker/*.test.mjs
          cd app
          flutter analyze
          flutter test
          flutter build web --release

      - name: Commit completed Summer Palace destination
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-summer-palace-vocabulary.yml
          git rm -f summer-palace-final-verify.log
          git add -A
          git commit -m "feat: complete Beijing Summer Palace journey"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
