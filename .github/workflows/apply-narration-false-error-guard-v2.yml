name: Apply narration false-error guard v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/music-style-narration-controls
          fetch-depth: 0

      - name: Patch false Safari error handling
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('app/lib/widgets/narration_player_card.dart')
          text = path.read_text()
          pattern = re.compile(
              r'(  void _startPositionClock\(\) \{.*?'
              r'if \(!mounted \|\| !_sessionPlaying\) return;)\n\n'
              r'\s*if \(widget\.controller\.status == NarrationStatus\.error\) \{.*?'
              r'\n\s*\}\n\n'
              r'(\s*final total = widget\.controller\.totalCharacters;)',
              re.S,
          )
          text, count = pattern.subn(r'\1\n\n\2', text, count=1)
          if count != 1:
              raise SystemExit('Unable to remove false Safari error branch')

          text, count = re.subn(
              r'        final hasError = controllerStatus == NarrationStatus\.error;',
              '''        final hasError = !_sessionPlaying &&
              !_sessionPaused &&
              controllerStatus == NarrationStatus.error;''',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Unable to guard displayed error state')
          path.write_text(text)

      - uses: dart-lang/setup-dart@v1
      - run: dart format app/lib/widgets/narration_player_card.dart

      - name: Commit guard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/narration_player_card.dart
          git commit -m "fix: keep active playback despite false Safari TTS errors"
          git push origin HEAD:feature/music-style-narration-controls
