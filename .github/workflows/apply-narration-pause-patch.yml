name: Apply narration pause patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'fix/narration-exact-pause-position' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out patch branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact pause-position patch
        run: python tools/apply_narration_pause_patch.py

      - name: Commit patched files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/widgets/narration_player_card.dart \
                  app/test/narration_resume_offset_test.dart \
                  worker/ios_narration_position_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Patch already applied."
            exit 0
          fi
          git commit -m "fix: resume narration without skipping text [narration-patch-applied]"
          git push origin HEAD:${{ github.head_ref }}
