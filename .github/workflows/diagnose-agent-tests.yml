name: Diagnose Phoenix agent tests

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feature/seven-day-journey-library'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/seven-day-journey-library
          fetch-depth: 0
      - name: Capture agent test output
        shell: bash
        run: |
          set +e
          node --test worker/*.test.mjs > worker/agent-test-diagnostic.txt 2>&1
          status=$?
          echo "exit_code=$status" >> worker/agent-test-diagnostic.txt
          rm -f .github/workflows/diagnose-agent-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture agent test diagnostics"
          git push origin HEAD:feature/seven-day-journey-library
