name: Fix Summer Palace catalog validation

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix-summer-palace-validation:
    if: >-
      github.event.pull_request.number == 83 &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'feat/two-level-journey-picker'
    runs-on: ubuntu-latest

    steps:
      - name: Check out writable feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Register Summer Palace and update eight-destination tests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'Expected pattern not found in {path}: {old!r}')
              file.write_text(text.replace(old, new, 1))

          replace_once(
              'app/lib/data/daily_journey_catalog.dart',
              "final dailyStorySources = <StorySourceRecord>[\n  ...beijingStorySources,\n",
              "final dailyStorySources = <StorySourceRecord>[\n"
              "  ...beijingStorySources,\n"
              "  ...summerPalaceStorySources,\n",
          )
          replace_once(
              'app/lib/data/daily_journey_catalog.dart',
              "final dailyJourneyRecords = <JourneyContentRecord>[\n  beijingForbiddenCityJourney,\n",
              "final dailyJourneyRecords = <JourneyContentRecord>[\n"
              "  beijingForbiddenCityJourney,\n"
              "  summerPalaceJourneyContent,\n",
          )

          feedback = Path('app/test/journey_feedback_persistence_test.dart')
          text = feedback.read_text()
          text = text.replace(
              "import 'package:phoenix_journeys/state/app_state.dart';\n",
              "import 'package:phoenix_journeys/data/daily_journey_catalog.dart';\n"
              "import 'package:phoenix_journeys/state/app_state.dart';\n",
              1,
          )
          text = text.replace(
              "    await restored.activateJourney('beijing-forbidden-city');\n",
              "    final otherJourneyId = dailyJourneyExperiences\n"
              "        .firstWhere((journey) => journey.id != restored.activeJourneyId)\n"
              "        .id;\n"
              "    await restored.activateJourney(otherJourneyId);\n",
              1,
          )
          feedback.write_text(text)

          cycle = Path('app/test/seven_day_journey_catalog_test.dart')
          text = cycle.read_text()
          text = text.replace(
              "test('seven reviewed journeys rotate without repeating during one week'",
              "test('eight reviewed destinations rotate without repeating during one cycle'",
              1,
          )
          text = text.replace(
              'expect(dailyJourneyExperiences, hasLength(7));',
              'expect(dailyJourneyExperiences, hasLength(8));',
              1,
          )
          text = text.replace(
              'expect(dailyJourneyExperiences.map((item) => item.id).toSet(), hasLength(7));',
              'expect(dailyJourneyExperiences.map((item) => item.id).toSet(), hasLength(8));',
              1,
          )
          text = text.replace('final week = List.generate(', 'final cycle = List.generate(', 1)
          text = text.replace('      7,', '      8,', 1)
          text = text.replace('expect(week.toSet(), hasLength(7));', 'expect(cycle.toSet(), hasLength(8));', 1)
          cycle.write_text(text)
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Format changed files
        run: |
          dart format \
            app/lib/data/daily_journey_catalog.dart \
            app/test/journey_feedback_persistence_test.dart \
            app/test/seven_day_journey_catalog_test.dart

      - name: Verify completed destination
        run: |
          node --test worker/*.test.mjs
          cd app
          flutter analyze
          flutter test
          flutter build web --release

      - name: Commit verified Summer Palace destination
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/fix-summer-palace-validation.yml
          git rm -f summer-palace-verify.log
          git add -A
          git commit -m "feat: publish Beijing Summer Palace destination"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
