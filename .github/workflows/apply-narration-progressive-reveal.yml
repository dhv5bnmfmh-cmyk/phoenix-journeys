name: Apply narration progressive reveal

on:
  push:
    branches:
      - feature/narration-progressive-reveal
    paths:
      - .github/workflows/apply-narration-progressive-reveal.yml

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: narration-progressive-reveal
  cancel-in-progress: true

env:
  PREVIEW_WORKER: phoenix-journeys-pr-95
  PREVIEW_URL: https://phoenix-journeys-pr-95.7hn5tyrjgh.workers.dev

jobs:
  apply-test-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out narration reveal branch
        uses: actions/checkout@v6
        with:
          ref: feature/narration-progressive-reveal
          fetch-depth: 0

      - name: Apply feature and publish clean head
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/apply_narration_progressive_reveal.py
          rm -f tools/apply_narration_progressive_reveal.py
          rm -f .github/workflows/apply-narration-progressive-reveal.yml
          node --test worker/narration_progressive_reveal_rule.test.mjs
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: reveal reading text with narration progress'
          git push origin HEAD:feature/narration-progressive-reveal
          echo "PREVIEW_RELEASE=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Test Phoenix agents
        run: node --test worker/*.test.mjs

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test Flutter app
        working-directory: app
        run: flutter test

      - name: Build preview web app
        working-directory: app
        run: flutter build web --release

      - name: Deploy isolated preview Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          npx --yes wrangler@4 deploy \
            --name "$PREVIEW_WORKER" \
            --var "PHOENIX_RELEASE:$PREVIEW_RELEASE"

      - name: Verify preview release
        shell: bash
        run: |
          set -euo pipefail
          health_url="${PREVIEW_URL}/api/health?commit=${PREVIEW_RELEASE}"
          for attempt in $(seq 1 20); do
            body="$(curl -fsS "$health_url" || true)"
            if printf '%s' "$body" | grep -Fq "$PREVIEW_RELEASE"; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Publish experience link
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          short_release="${PREVIEW_RELEASE:0:8}"
          body="<!-- phoenix-pr-preview -->
          ## Phoenix 逐字显现体验版 ✅

          [打开体验链接](${PREVIEW_URL}/?unlock=all&v=${short_release})

          - PR：#95
          - Commit：\`${short_release}\`
          - 全部旅程已开放
          - 与 main 隔离"
          gh api "repos/${GITHUB_REPOSITORY}/issues/95/comments" -f body="$body"
