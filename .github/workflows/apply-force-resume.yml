name: Apply force resume after word sheet

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reliable resume patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          journey_path = Path('app/lib/screens/journey_screen.dart')
          journey = journey_path.read_text()
          old_open_word = '''  Future<void> _openWord(WordEntry entry) async {
            final shouldResume = _narration.status == NarrationStatus.playing;
            if (shouldResume) {
              await _narration.pause();
            }
            if (!mounted) return;

            await showWordDetail(
              context,
              entry,
              onSpeak: () => _narration.speakWord(
                _appState.displayText(entry.word),
                languageCode: _appState.isTraditional ? 'zh-TW' : 'zh-CN',
              ),
            );
            if (!mounted || !shouldResume) return;

            await _narration.resume();
          }'''
          new_open_word = '''  Future<void> _openWord(WordEntry entry) async {
            final shouldResume = _narration.status == NarrationStatus.playing;
            if (shouldResume) {
              await _narration.pause();
            }
            final resumeOffset = _narration.currentOffset;
            if (!mounted) return;

            await showWordDetail(
              context,
              entry,
              onSpeak: () => _narration.speakWord(
                _appState.displayText(entry.word),
                languageCode: _appState.isTraditional ? 'zh-TW' : 'zh-CN',
              ),
            );
            if (!mounted || !shouldResume) return;

            // Wait for the bottom-sheet dismissal animation and iOS audio channel
            // release before force-starting narration at the saved character.
            await Future<void>.delayed(const Duration(milliseconds: 360));
            if (!mounted) return;
            await _narration.resumeFromOffset(resumeOffset);
          }'''
          if old_open_word not in journey:
              raise SystemExit('Expected _openWord block not found')
          journey_path.write_text(journey.replace(old_open_word, new_open_word, 1))

          controller_path = Path('app/lib/services/narration_controller.dart')
          controller = controller_path.read_text()
          old_resume = '''  Future<void> resume() async {
            if (_status != NarrationStatus.paused || _plan.isEmpty) return;

            final offset = _currentOffset >= _plan.text.length ? 0 : _currentOffset;
            await _speakFrom(offset);
          }'''
          new_resume = '''  Future<void> resume() async {
            if (_status != NarrationStatus.paused || _plan.isEmpty) return;

            final offset = _currentOffset >= _plan.text.length ? 0 : _currentOffset;
            await _speakFrom(offset);
          }

          Future<void> resumeFromOffset(int offset) async {
            if (_plan.isEmpty || _disposed) return;

            final maxOffset = _plan.text.isEmpty ? 0 : _plan.text.length - 1;
            final safeOffset = offset.clamp(0, maxOffset).toInt();
            _status = NarrationStatus.paused;
            _cancelProgressClock();
            _safeNotify();

            await _stopSpeechEngine();
            if (_disposed) return;

            // Safari/iOS needs a short quiet gap after stopping the word voice.
            await Future<void>.delayed(const Duration(milliseconds: 220));
            if (_disposed) return;
            _ignoreEngineCallbacksUntil = null;
            await _speakFrom(safeOffset, stopEngineFirst: false);
          }'''
          if old_resume not in controller:
              raise SystemExit('Expected resume block not found')
          controller = controller.replace(old_resume, new_resume, 1)

          old_signature = '  Future<void> _speakFrom(int offset) async {'
          new_signature = '''  Future<void> _speakFrom(
            int offset, {
            bool stopEngineFirst = true,
          }) async {'''
          if old_signature not in controller:
              raise SystemExit('Expected _speakFrom signature not found')
          controller = controller.replace(old_signature, new_signature, 1)

          method_start = controller.index(new_signature)
          stop_call = '      await _stopSpeechEngine();'
          stop_index = controller.index(stop_call, method_start)
          controller = (
              controller[:stop_index]
              + '''      if (stopEngineFirst) {
                await _stopSpeechEngine();
              }'''
              + controller[stop_index + len(stop_call):]
          )
          controller_path.write_text(controller)
          PY

      - name: Remove one-time workflow
        run: rm .github/workflows/apply-force-resume.yml

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart app/lib/services/narration_controller.dart .github/workflows/apply-force-resume.yml
          git commit -m "fix: force narration resume after word sheet dismissal"
          git push origin HEAD:${{ github.head_ref }}
