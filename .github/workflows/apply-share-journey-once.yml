name: Apply journey share feature once

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'feature/share-journey-passport' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply journey share screens
        run: python tools/apply_share_journey.py

      - name: Commit production changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/screens/journey_screen.dart \
                  app/lib/screens/passport_screen.dart \
                  worker/journey_share_rule.test.mjs
          if git diff --cached --quiet; then
            echo "Journey share patch already applied."
            exit 0
          fi
          git commit -m "feat: share completed Beijing journey [journey-share]"
          git push origin HEAD:${{ github.head_ref }}
