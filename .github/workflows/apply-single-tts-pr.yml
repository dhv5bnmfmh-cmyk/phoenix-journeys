name: Apply single TTS fix on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Execute migration script
        run: |
          python3 - <<'RUNNER'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-single-tts-fix.yml').read_text()
          marker = "python3 - <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in script.splitlines()
          )
          exec(compile(script, 'single_tts_migration.py', 'exec'))
          RUNNER

      - name: Remove one-time workflows
        run: rm .github/workflows/apply-single-tts-fix.yml .github/workflows/apply-single-tts-pr.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/lib/services/narration_controller.dart app/lib/widgets/word_detail_sheet.dart app/lib/screens/journey_screen.dart .github/workflows/apply-single-tts-fix.yml .github/workflows/apply-single-tts-pr.yml
          git commit -m "fix: share one TTS engine and resume narration reliably"
          git push origin HEAD:${{ github.head_ref }}
