name: phoenix_journeys
description: A language journey app for exploring Chinese through culture, stories, and memories.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.2.5
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  intl: ^0.19.0
  http: ^1.2.2
  pinyin: ^3.3.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/backgrounds/seed/
    - assets/images/backgrounds/generated/
    - assets/images/backgrounds/generated/beijing/forbidden-city/
    - assets/images/backgrounds/generated/shanghai/bund/
    - assets/images/backgrounds/generated/xian/city-wall/
    - assets/images/backgrounds/generated/hangzhou/west-lake/
