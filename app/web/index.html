<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <meta
    name="description"
    content="Phoenix Journeys — 通过语言、故事与文化探索世界。"
  >
  <meta name="theme-color" content="#9D1C20">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phoenix Journeys">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">

  <title>Phoenix Journeys</title>

  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff7ea;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      background: #fff7ea;
    }

    body {
      min-height: 100dvh;
    }

    #phoenix-loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0 70px, transparent 72px),
        radial-gradient(circle at 88% 70%, rgba(255,255,255,.72) 0 95px, transparent 97px),
        linear-gradient(145deg, #fff7ea, #f5e4cf);
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #phoenix-loading.phoenix-loading--hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .phoenix-loading__content {
      width: min(100%, 360px);
      text-align: center;
      color: #2d2421;
    }

    .phoenix-loading__mark {
      display: grid;
      place-items: center;
      width: 78px;
      height: 78px;
      margin: 0 auto 24px;
      border-radius: 26px;
      background: #9d1c20;
      box-shadow: 0 16px 32px rgba(61, 23, 20, .22);
      color: white;
      font-size: 38px;
    }

    .phoenix-loading__title {
      margin: 0;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .phoenix-loading__text {
      margin: 10px 0 20px;
      color: rgba(45, 36, 33, .68);
      line-height: 1.5;
    }

    .phoenix-loading__bar {
      width: 100%;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(157, 28, 32, .12);
    }

    .phoenix-loading__bar::after {
      content: "";
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: #9d1c20;
      animation: phoenix-loading 1.25s ease-in-out infinite;
    }

    @keyframes phoenix-loading {
      from { transform: translateX(-115%); }
      to { transform: translateX(340%); }
    }

    @media (prefers-reduced-motion: reduce) {
      .phoenix-loading__bar::after {
        animation-duration: 2.5s;
      }
    }
  </style>
</head>
<body>
  <div id="phoenix-loading" role="status" aria-live="polite">
    <div class="phoenix-loading__content">
      <div class="phoenix-loading__mark" aria-hidden="true">🔥</div>
      <p class="phoenix-loading__title">PHOENIX JOURNEYS</p>
      <p id="phoenix-loading-text" class="phoenix-loading__text">
        正在准备你的语言旅程…
      </p>
      <div class="phoenix-loading__bar" aria-hidden="true"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
